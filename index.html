<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Asistente para la creación de proyectos de investigación</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

/* ── TOKENS ──────────────────────────────────────────────────────── */
:root{
  --brand:#4F46E5;--brand-light:#EEF2FF;--brand-mid:#C7D2FE;--brand-dark:#3730A3;
  --green:#059669;--green-light:#ECFDF5;--green-mid:#A7F3D0;
  --amber:#D97706;--amber-light:#FFFBEB;
  --red:#DC2626;--red-light:#FEF2F2;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
  --gray-400:#9CA3AF;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.05);
  --shadow-lg:0 10px 40px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.06);
  --font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

/* ── RESET & BASE ────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font);
  background:linear-gradient(135deg,#EEF2FF 0%,#F0FDF4 50%,#FFF7ED 100%);
  min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
  padding:20px 16px 40px;
}

/* ── CARD ────────────────────────────────────────────────────────── */
.card{
  background:#fff;border-radius:var(--radius-xl);
  border:1px solid var(--gray-200);
  padding:28px 24px;width:100%;max-width:640px;
  box-shadow:var(--shadow-lg);
  height:fit-content;
  overflow:hidden;
}

/* ── HEADER ──────────────────────────────────────────────────────── */
h2{
  font-size:17px;font-weight:700;color:var(--gray-900);
  margin-bottom:6px;letter-spacing:-0.2px;line-height:1.3;
}

/* ── STEP BAR ────────────────────────────────────────────────────── */
.steps{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.step-circle{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;cursor:default;transition:all .25s;
}
.step-circle.done{background:var(--brand);color:#fff;cursor:pointer;box-shadow:0 2px 6px rgba(79,70,229,.35)}
.step-circle.active{background:var(--brand-light);color:var(--brand);border:2px solid var(--brand)}
.step-circle.pending{background:var(--gray-100);color:var(--gray-400)}
.step-line{height:2px;width:16px;border-radius:2px;transition:background .25s}
.step-line.done{background:var(--brand)}
.step-line.pending{background:var(--gray-200)}
.step-label{font-size:11px;color:var(--gray-400);margin-bottom:22px;font-weight:500;letter-spacing:.2px}

/* ── SECTION LABEL ───────────────────────────────────────────────── */
.section-label{
  font-size:13px;color:var(--gray-500);font-weight:600;
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
  text-transform:uppercase;letter-spacing:.5px;
}

/* ── TOOLTIP ─────────────────────────────────────────────────────── */
.tooltip{position:relative;display:inline-flex;cursor:help}
.tooltip-icon{
  width:16px;height:16px;background:var(--brand);color:#fff;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;
}
.tooltip-text{
  visibility:hidden;width:240px;background:var(--gray-900);color:#fff;
  text-align:left;border-radius:var(--radius-sm);padding:10px 12px;
  position:absolute;z-index:10;bottom:130%;left:50%;margin-left:-120px;
  opacity:0;transition:opacity .25s;font-size:12px;line-height:1.5;
  font-weight:400;box-shadow:var(--shadow-md);
}
.tooltip-text::after{
  content:"";position:absolute;top:100%;left:50%;margin-left:-5px;
  border-width:5px;border-style:solid;border-color:var(--gray-900) transparent transparent transparent;
}
.tooltip:hover .tooltip-text{visibility:visible;opacity:1}

/* ── GRID ────────────────────────────────────────────────────────── */
.options{display:flex;flex-direction:column;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ── AREA BADGES (paso 1) ────────────────────────────────────────── */
.badge-area{
  padding:14px 12px;border-radius:var(--radius-md);cursor:pointer;
  text-align:center;border:1.5px solid transparent;
  font-size:12px;font-weight:500;width:100%;
  transition:all .18s;position:relative;
  background:var(--gray-50);color:var(--gray-700);
  box-shadow:var(--shadow-sm);
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.badge-area .area-icon{font-size:22px;line-height:1}
.badge-area:hover{background:var(--brand-light);border-color:var(--brand-mid);color:var(--brand-dark);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.badge-area.active{
  border-color:var(--brand);background:var(--brand-light);
  color:var(--brand-dark);font-weight:600;
  box-shadow:0 0 0 3px rgba(79,70,229,.15),var(--shadow-md);
}

/* ── OPTION BADGES (pasos 2-4) ───────────────────────────────────── */
.badge{
  padding:12px 16px;border-radius:var(--radius-md);cursor:pointer;
  text-align:left;border:1.5px solid var(--gray-200);
  background:var(--gray-50);font-size:14px;font-weight:500;
  width:100%;transition:all .18s;position:relative;
  color:var(--gray-700);box-shadow:var(--shadow-sm);
  word-break:break-word;overflow-wrap:break-word;box-sizing:border-box;
}
.badge:hover{border-color:var(--brand-mid);background:var(--brand-light);color:var(--brand-dark);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.badge.active{
  border:2px solid var(--brand);background:var(--brand-light);
  color:var(--brand-dark);font-weight:600;
  box-shadow:0 0 0 3px rgba(79,70,229,.12),var(--shadow-md);
}
.badge-title{font-weight:600;margin-bottom:2px;color:inherit}
.badge-desc{font-size:12px;color:var(--gray-500);margin-top:3px;line-height:1.4}
.badge-hint{
  font-size:11px;color:var(--gray-500);margin-top:5px;
  font-style:italic;display:inline-flex;align-items:center;gap:3px;
}
.badge-hint.recommended{color:var(--green);font-weight:600}

/* ── CHIPS ───────────────────────────────────────────────────────── */
.chip{
  padding:8px 14px;border-radius:20px;cursor:pointer;font-size:13px;
  border:1.5px solid var(--gray-200);background:var(--gray-50);
  color:var(--gray-700);font-weight:500;transition:all .15s;
}
.chip:hover{border-color:var(--green-mid);background:var(--green-light);color:var(--green)}
.chip.active{
  border:2px solid var(--green);background:var(--green-light);
  color:var(--green);font-weight:600;
  box-shadow:0 0 0 3px rgba(5,150,105,.1);
}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}

/* ── HINTS ───────────────────────────────────────────────────────── */
.hint{
  background:var(--brand-light);border-radius:var(--radius-sm);
  padding:10px 14px;font-size:13px;color:var(--brand-dark);
  margin-top:6px;border:1px solid var(--brand-mid);
  display:block;line-height:1.6;
  word-break:break-word;overflow-wrap:break-word;
  width:100%;box-sizing:border-box;
}
.hint strong{font-weight:700;color:inherit}
.hint.warning{background:var(--amber-light);color:var(--amber);border-color:#FDE68A}
.hint.success{background:var(--green-light);color:var(--green);border-color:var(--green-mid)}

/* ── INPUTS ──────────────────────────────────────────────────────── */
input[type=text],textarea{
  width:100%;font-size:16px;padding:10px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--gray-200);font-family:var(--font);
  margin-top:6px;background:var(--gray-50);color:var(--gray-900);
  transition:all .2s;
}
input[type=text]:focus,textarea:focus{
  outline:none;border-color:var(--brand);background:#fff;
  box-shadow:0 0 0 3px rgba(79,70,229,.1);
}
textarea{min-height:70px;resize:vertical}
.otro-input{border-color:var(--brand)!important;background:#fff!important}

/* ── NAV BUTTONS ─────────────────────────────────────────────────── */
.nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:28px;padding-top:18px;border-top:1px solid var(--gray-100);
  gap:12px;
}
.btn{
  padding:11px 22px;border-radius:var(--radius-md);font-size:14px;
  cursor:pointer;font-family:var(--font);border:none;
  transition:all .2s;font-weight:600;letter-spacing:.1px;
}
.btn-back{
  border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-500);
}
.btn-back:hover{background:var(--gray-50);border-color:var(--gray-400);color:var(--gray-700)}
.btn-back:disabled{opacity:.35;cursor:not-allowed}
.btn-next{
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);
  color:#fff;padding:11px 28px;
  box-shadow:0 4px 14px rgba(79,70,229,.35);
}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,70,229,.4)}
.btn-next:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed;box-shadow:none;transform:none}

/* ── CONTENT AREA ────────────────────────────────────────────────── */
.content{min-height:280px}
.gap20{display:flex;flex-direction:column;gap:20px}

/* ── RESULT CARDS ────────────────────────────────────────────────── */
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.result-header p{font-size:13px;color:var(--gray-400);font-weight:500}
.result-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{
  padding:8px 14px;border-radius:var(--radius-sm);font-size:12px;
  cursor:pointer;font-family:var(--font);border:1.5px solid var(--gray-200);
  background:#fff;color:var(--gray-600);transition:all .15s;font-weight:600;
}
.btn-sm:hover{background:var(--gray-50);border-color:var(--gray-400)}
.btn-edit{border-color:var(--gray-200);color:var(--gray-600)}
.btn-regen{border-color:var(--brand-mid);color:var(--brand);background:var(--brand-light)}
.btn-regen:hover{background:var(--brand);color:#fff}
.btn-download{border-color:var(--green-mid);color:var(--green);background:var(--green-light)}
.btn-download:hover{background:var(--green);color:#fff}
.btn-download.loading{opacity:.6;pointer-events:none;cursor:wait}
.result-block{
  border-radius:var(--radius-md);padding:16px 18px;margin-bottom:12px;
  border:1px solid transparent;
}
.result-block-label{
  font-size:10px;font-weight:700;margin-bottom:8px;
  text-transform:uppercase;letter-spacing:1.2px;
}
.result-block p{font-size:15px;line-height:1.7;color:var(--gray-800)}
.result-block textarea{
  font-size:14px;padding:10px;border-radius:var(--radius-sm);
  min-height:70px;width:100%;border:1.5px solid rgba(0,0,0,.1);
  background:rgba(255,255,255,.6);font-family:var(--font);
}

/* ── SUMMARY ─────────────────────────────────────────────────────── */
.summary{
  margin-top:6px;padding:14px 18px;background:var(--gray-50);
  border-radius:var(--radius-md);border:1px solid var(--gray-200);
}
.summary p.title{font-size:11px;color:var(--gray-400);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.summary-grid p{font-size:12px;color:var(--gray-600);padding:4px 0}
.summary-grid span{color:var(--gray-400);font-weight:500}

/* ── LOADING ─────────────────────────────────────────────────────── */
.loading{text-align:center;padding:48px 0}
.loading .icon{font-size:36px;margin-bottom:14px;animation:pulse 1.5s ease-in-out infinite}
.loading p{color:var(--gray-400);font-size:14px;font-weight:500}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── GENERATE BOX ────────────────────────────────────────────────── */
.generate-box{text-align:center;padding:36px 0}
.generate-box p{margin-bottom:24px;font-size:15px;color:var(--gray-500);line-height:1.6}
.btn-generate{
  padding:14px 36px;border-radius:var(--radius-md);
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);
  color:#fff;border:none;font-size:15px;font-weight:700;
  cursor:pointer;font-family:var(--font);
  box-shadow:0 4px 18px rgba(79,70,229,.4);
  transition:all .2s;letter-spacing:.2px;
}
.btn-generate:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,70,229,.45)}

/* ── FOOTER ──────────────────────────────────────────────────────── */
.footer{
  text-align:center;margin-top:24px;padding-top:16px;
  border-top:1px solid var(--gray-100);font-size:12px;
  color:var(--gray-400);display:flex;justify-content:center;
  align-items:center;gap:8px;flex-wrap:wrap;
}
.footer strong{color:var(--brand)}
.footer a{color:var(--brand);text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}

/* ── NEXT STEPS ──────────────────────────────────────────────────── */
.next-steps{
  margin-top:16px;padding:18px;
  background:linear-gradient(135deg,#F0FDF4,#ECFDF5);
  border-radius:var(--radius-md);border:1px solid var(--green-mid);
}
.next-steps-title{font-size:14px;font-weight:700;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.next-steps ul{list-style:none;padding:0}
.next-steps li{padding:8px 0;font-size:13px;color:#065F46;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid rgba(5,150,105,.1)}
.next-steps li:last-child{border-bottom:none}
.next-steps li::before{content:"✓";color:var(--green);font-weight:700;font-size:14px;flex-shrink:0;margin-top:1px}

/* ── AUTO SAVE ───────────────────────────────────────────────────── */
.auto-save{
  position:fixed;bottom:20px;right:20px;background:#fff;
  border:1px solid var(--gray-200);padding:8px 14px;border-radius:20px;
  font-size:11px;color:var(--gray-500);font-family:var(--font);font-weight:600;
  box-shadow:var(--shadow-md);display:none;
}
.auto-save.show{display:flex;align-items:center;gap:6px;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── ERROR ───────────────────────────────────────────────────────── */
.error{color:var(--red);font-size:13px;font-weight:500}

/* ── REFERENCIAS ─────────────────────────────────────────────────── */
.refs{
  margin-top:20px;padding:18px;
  background:#F8FAFF;border-radius:var(--radius-md);
  border:1px solid var(--brand-mid);
}
.refs-title{font-size:12px;font-weight:700;color:var(--brand-dark);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.5px}
.refs-item{
  padding:9px 0;border-bottom:1px solid var(--brand-mid);
  font-size:12px;line-height:1.75;color:var(--gray-700);
}
.refs-item:last-child{border-bottom:none;padding-bottom:0}
.refs-item em{font-style:italic}
.refs-note{font-size:11px;color:var(--gray-400);margin-top:3px;font-style:italic;display:block}

/* ── TOUCH TARGETS BASE ──────────────────────────────────────────── */
.badge,.badge-area,.chip,.btn,.btn-sm,.btn-generate{
  min-height:44px;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

/* ── TABLET (≤768px) ─────────────────────────────────────────────── */
@media (max-width:768px){
  body{padding:12px 10px 32px}
  .card{padding:20px 16px;border-radius:var(--radius-lg)}
  h2{font-size:16px}
  .steps{gap:3px}
  .step-circle{width:26px;height:26px;font-size:11px}
  .step-line{width:10px}
  .grid2,.grid3{grid-template-columns:1fr;gap:10px}
  .badge-area{flex-direction:row;text-align:left;padding:12px 14px;gap:10px}
  .badge-area .area-icon{font-size:20px}
  .nav{flex-direction:column;gap:10px;margin-top:20px}
  .btn{width:100%;padding:14px 20px;font-size:15px}
  .btn-next{order:-1}
  .result-actions{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .btn-sm{padding:11px 8px;text-align:center;font-size:13px}
  .result-block p{font-size:14px}
  .summary-grid{grid-template-columns:1fr}
  .auto-save{bottom:12px;right:12px}
}

/* ── MÓVIL (≤480px) ──────────────────────────────────────────────── */
@media (max-width:480px){
  body{padding:8px 6px 28px}
  .card{padding:16px 14px;border-radius:var(--radius-md)}
  h2{font-size:15px}
  .steps{overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .result-actions{grid-template-columns:1fr}
  .btn-sm{width:100%;min-height:48px;font-size:14px}
  .result-block p{font-size:13px;line-height:1.7}
  .footer{font-size:11px}
}

/* ── MODAL DIAGRAMA ──────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.6);z-index:1000;
  display:flex;align-items:center;justify-content:center;
  padding:12px;box-sizing:border-box;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.modal-inner{
  background:#fff;border-radius:var(--radius-xl);padding:24px;
  width:100%;max-width:700px;
  box-shadow:0 32px 80px rgba(0,0,0,.25);
  max-height:92vh;overflow-y:auto;box-sizing:border-box;
  -webkit-overflow-scrolling:touch;
}
@media (max-width:480px){
  .modal-inner{padding:16px 14px;border-radius:var(--radius-lg);max-height:95vh}
}
</style>
</head>
<body>
<div class="card">
  <h2>Asistente para la creación de proyectos de investigación</h2>
  <div class="steps" id="steps-bar"></div>
  <p class="step-label" id="step-label"></p>
  <div class="content" id="content"></div>
  <div class="nav">
    <button class="btn btn-back" id="btn-back" onclick="prevStep()">Atras</button>
    <button class="btn btn-next" id="btn-next" onclick="nextStep()">Siguiente</button>
  </div>
  <div class="footer">
    Creado por: <strong>Alan A. Vega Jacome</strong>
  </div>
</div>
<div class="auto-save" id="auto-save">💾 Progreso guardado</div>

<script>

const AREAS = [

  {id:"educativa", label:"Psicología educativa", icon:"📚"},
  {id:"organizacional", label:"Psicología organizacional", icon:"🏢"},
  {id:"social", label:"Psicología social y comunitaria", icon:"🤝"},
  {id:"deporte", label:"Psicología del deporte", icon:"🏅"},
  {id:"consumidor", label:"Psicología del consumidor", icon:"🛒"},
  {id:"juridica", label:"Psicología jurídica/forense", icon:"⚖️"},
  {id:"ambiental", label:"Psicología ambiental", icon:"🌱"},

  {id:"pareja-familia", label:"Psicología de pareja y familia", icon:"🫂"},
  {id:"salud", label:"Psicología de la salud", icon:"🏥"},
  {id:"desarrollo", label:"Psicología del desarrollo", icon:"🍼"},
  {id:"neuropsicologia", label:"Neuropsicología", icon:"🧠"},
  {id:"adicciones", label:"Psicología de las adicciones", icon:"🚭"},
  {id:"digital", label:"Psicología digital/cibernética", icon:"📱"},
  {id:"emergencias", label:"Psicología de emergencias y desastres", icon:"🚨"},
  {id:"transcultural", label:"Psicología transcultural", icon:"🌍"},
  {id:"otro", label:"Otro", icon:"✏️"},
];

const POBLACIONES = {
  clinica:["Niños y adolescentes","Adultos en general","Adultos mayores","Personas con diagnóstico de trastornos específicos","Cuidadores y familias"],

// Función que devuelve las técnicas disponibles según nivel + diseño
function getTecnicasDisponibles(nivel, diseno) {
  // Experimental y cuasi-experimental: ANOVA/t-test, fuera del alcance
  if(diseno === 'experimental' || diseno === 'cuasiexperimental') return null;
  if(nivel === 'correlacional') {
    // Correlacional + longitudinal: las técnicas bivariadas estándar no son las apropiadas
    if(diseno === 'no-experimental-longitudinal') return 'correlacional_longitudinal';
    return TECNICAS_POR_NIVEL.correlacional;
  }
  if(nivel === 'explicativo') {
    if(diseno === 'no-experimental-longitudinal') return TECNICAS_POR_NIVEL.explicativo_longitudinal;
    return TECNICAS_POR_NIVEL.explicativo_transversal;
  }
  return null; // exploratorio y descriptivo: sin técnica avanzada
}

function findInstrumento(varName) {
  if(!varName) return null;
  const lower = varName.toLowerCase();
  // Exact match
  if(INSTRUMENTOS_DATA[varName]) return INSTRUMENTOS_DATA[varName];
  // Case-insensitive partial match
  const entry = Object.entries(INSTRUMENTOS_DATA).find(([k]) =>
    lower.includes(k.toLowerCase()) || k.toLowerCase().includes(lower)
  );
  return entry ? entry[1] : null;
}

async function generateAIInstruments(varsList) {
  if(!varsList || varsList.length === 0 || state.aiInstrumentsLoading) return;
  // Only run for qualitative (no standard scales) or vars not in static bank
  const sinInstrumento = varsList.filter(v => !findInstrumento(v));
  const isQual = state.enfoque === 'Cualitativo';

  // Skip if all vars found in static bank and not qualitative
  if(!isQual && sinInstrumento.length === 0) return;

  state.aiInstrumentsLoading = true;
  state.aiInstruments = null;
  if(state.step === 5 && state.result) renderContent();

  const targetVars = isQual ? varsList : sinInstrumento;
  const instrPrompt = `Eres un experto en psicometría y evaluación psicológica en el contexto peruano y latinoamericano.

Para el siguiente proyecto de investigación:
- Enfoque: ${state.enfoque}
- Diseño: ${DISENOS[state.enfoque.toLowerCase()]?.find(d=>d.id===state.diseno)?.label || state.diseno}
- Población: ${getPoblacionCompleta()}
- ${state.enfoque === 'Cualitativo' ? 'Categorías de análisis' : 'Variables sin instrumento identificado'}: ${targetVars.join(', ')}

${isQual ? `Para INVESTIGACIÓN CUALITATIVA no se usan escalas psicométricas. En cambio, sugiere:
- El tipo de instrumento de recolección adecuado para cada categoría (guía de entrevista semi-estructurada, grupo focal, etc.)
- Los ejes temáticos o preguntas orientadoras específicas para cada categoría
- Si aplica, algún referente teórico o metodológico para construir el instrumento` :
`Para cada variable, sugiere el instrumento de medición más apropiado con:
- Nombre completo del instrumento y autor(es) original(es)
- Versión en español o adaptación latinoamericana/peruana si existe
- Número de ítems y tipo de escala
- Propiedad psicométrica clave (alpha de Cronbach ≥ .70 o similar)
- Una nota sobre disponibilidad o acceso en Perú`}

Responde SOLO con JSON sin texto adicional:
[
  {
    "variable": "nombre exacto de la variable/categoría",
    "instrumento": "nombre completo del instrumento",
    "autores": "Autor(es), año",
    "descripcion": "ítems, escala, alpha o equivalente",
    "nota_peru": "disponibilidad o adaptación peruana/latinoamericana",
    "tipo": "${isQual ? 'cualitativo' : 'cuantitativo'}"
  }
]`;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 900,
        messages: [{role: 'user', content: instrPrompt}]
      })
    });
    if(!res.ok) throw new Error('API error');
    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || '';
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    if(Array.isArray(parsed) && parsed.length > 0) {
      state.aiInstruments = parsed;
    }
  } catch(e) {
    console.error('generateAIInstruments error:', e);
    state.aiInstruments = [];
  } finally {
    state.aiInstrumentsLoading = false;
    if(state.step === 5 && state.result) renderContent();
    saveState();
  }
}

    });
  } else if(!state.aiInstrumentsLoading && needsAI && (!state.aiInstruments || state.aiInstruments.length === 0)) {
    h += `<p style="font-size:11px;color:#9CA3AF;margin-top:8px">⚠️ No se encontraron instrumentos estándar para: ${(isQual ? varsList : sinStatic).join(', ')}. Busca en SCOPUS, PsycINFO o consulta el <em>Mental Measurements Yearbook</em>.</p>`;
  }

  h += `</div>`;
  return h;
}

function renderReferenciasHtml() {
  const refs = getRefsFiltradas();
  if(refs.length === 0) return '';
  let h = `<div class="refs">`;
  h += `<div class="refs-title">📚 Referencias metodológicas del proyecto <span style="font-weight:400;color:var(--gray-400);font-size:11px">(${refs.length} relevantes para tu diseño)</span></div>`;
  refs.forEach(r => {
    h += `<div class="refs-item">${r.cita}`;
    if(r.nota) h += `<span class="refs-note">${r.nota}</span>`;
    h += `</div>`;
  });
  h += `</div>`;
  return h;
}

// GUARDAR ESTADO AUTOMÁTICAMENTE
function saveState() {
  try {
    localStorage.setItem('investigacion_state', JSON.stringify(state));
    showAutoSave();
  } catch(e) {}
}

function showAutoSave() {
  const el = document.getElementById('auto-save');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function efectiveArea(){return state.area==="otro"?state.areaOtro:AREAS.find(a=>a.id===state.area)?.label||"";}
function efectivePoblacion(){return state.poblacion==="otro"?state.poblacionOtro:state.poblacion;}
function efectiveProblema(){return state.problema==="otro"?state.problemaOtro:state.problema;}

// Combina población + lugar para usar en el paso 6
function getPoblacionCompleta(){
  const pob = efectivePoblacion();
  const lugar = state.contexto ? state.contexto.trim() : "";
  if(lugar) return `${pob} de ${lugar}`;
  return pob;
}

function canNext(){
  const s=state.step;
  if(s===0){
    if(state.area==="otro") return state.areaOtro.trim()!=="";
    return state.area!=="";
  }
  if(s===1){
    if(state.poblacion==="otro") return state.poblacionOtro.trim()!=="";
    return state.poblacion!=="";
  }
  if(s===2){
    // Si problema es "otro", necesita problema especificado Y variables
    if(state.problema==="otro") {
      return state.problemaOtro.trim()!=="" && state.variablesOtro.trim()!=="";
    }
    // Si seleccionó "otro" en variables, necesita variables especificadas
    if(state.variables.includes('otro')) {
      return state.variables.length>0 && state.variablesOtro.trim()!=="";
    }
    // Caso normal: problema seleccionado y al menos una variable
    return state.problema!=="" && state.variables.length>0;
  }
  if(s===3){
    // Cualitativo: solo necesita diseño (no nivel)
    if(state.enfoque === "Cualitativo") {
      return state.diseno !== "";
    }
    if(!state.enfoque || !state.nivel || !state.diseno) return false;
    if(state.enfoque==="Cuantitativo"){
      // Experimental/cuasi: no requieren técnica del menú
      if(state.diseno==='experimental' || state.diseno==='cuasiexperimental') return true;
      // Correlacional + longitudinal: advertencia, puede continuar sin técnica
      if(state.nivel==='correlacional' && state.diseno==='no-experimental-longitudinal') return true;
      // Exploratorio/descriptivo: no requieren técnica avanzada
      if(state.nivel==='exploratorio' || state.nivel==='descriptivo') return true;
      // Correlacional/explicativo transversal: requieren técnica
      if(state.nivel==="correlacional" || state.nivel==="explicativo") return state.tecnica !== "";
    }
    return true;
  }
  if(s===4) return state.experiencia!=="" && state.viabilidad!=="";
  return true;
}

function badge(label, active, click){
  return `<button class="badge ${active?'active':''}" onclick="${click}">${label}</button>`;
}

function badgeWithDesc(title, desc, hint, active, click, recommended=false){
  const hintClass = recommended ? 'recommended' : '';
  return `<button class="badge ${active?'active':''}" onclick="${click}">
    <div class="badge-title">${title}</div>
    <div class="badge-desc">${desc}</div>
    ${hint ? `<div class="badge-hint ${hintClass}">${hint}</div>` : ''}
  </button>`;
}

function sectionLabel(t, tooltip=""){
  if(tooltip) {
    return `<p class="section-label">${t} <span class="tooltip"><span class="tooltip-icon">?</span><span class="tooltip-text">${tooltip}</span></span></p>`;
  }
  return `<p class="section-label">${t}</p>`;
}

function renderStepsBar(){
  let h="";
  STEPS.forEach((name,i)=>{
    const done=i<state.step;
    const active=i===state.step;
    const pending=i>state.step;
    let cls=done?"done":active?"active":"pending";
    h+=`<div class="step-circle ${cls}" onclick="${done?`state.step=${i};render()`:''}">${done?'✓':i+1}</div>`;
    if(i<STEPS.length-1){
      h+=`<div class="step-line ${done?'done':'pending'}"></div>`;
    }
  });
  document.getElementById("steps-bar").innerHTML=h;
  document.getElementById("step-label").textContent=`Paso ${state.step+1} de 6: ${STEPS[state.step]}`;
}

// SUGERENCIAS AUTOMÁTICAS
function getAutoSuggestion() {
  if(!state.enfoque || !state.variables.length) return "";
  
  const nv = state.variables.filter(v => v !== 'otro').length;
  const enfoque = state.enfoque.toLowerCase();
  
  // Validación: Cualitativo con muchas variables
  if(enfoque === "cualitativo" && nv >= 4) {
    return `<div class="hint warning">⚠️ Para enfoque cualitativo, usualmente se trabaja con menos variables (1-2) y se profundiza más en cada una. ¿Estás seguro de necesitar ${nv} variables?</div>`;
  }
  
  // Sugerencia automática según variables
  if(nv === 1) {
    return `<div class="hint success">💡 Con 1 variable → nivel descriptivo. Diseño recomendado: ${enfoque === 'cuantitativo' ? 'no experimental transversal' : 'estudio de caso'}.</div>`;
  }
  if(nv === 2) {
    if(enfoque === 'cuantitativo') return `<div class="hint success">💡 Con 2 variables → nivel correlacional. Diseño recomendado: no experimental transversal.</div>`;
    return `<div class="hint success">💡 Con 2 categorías de análisis → nivel descriptivo. Diseño recomendado: estudio de caso múltiple.</div>`;
  }
  if(nv >= 3 && enfoque === 'cuantitativo') {
    return `<div class="hint success">💡 Con ${nv} variables → nivel correlacional o explicativo. Diseño recomendado: no experimental transversal (o experimental si puedes manipular).</div>`;
  }
  
  return "";
}

  }

      });
      h+=badge("Otro", state.problema==="otro", `selectProblema('otro')`);
      h+=`</div>`;
    } else {
      h+=`<div class="options">`;
      h+=badge("Otro", state.problema==="otro", `selectProblema('otro')`);
      h+=`</div>`;
    }
    if(state.problema==="otro"){
      h+=`<input type="text" class="otro-input" placeholder="Especifica tu problema/fenomeno" value="${state.problemaOtro}" oninput="state.problemaOtro=this.value;updateNav();saveState()" onblur="renderContent()" onkeypress="if(event.key==='Enter'){renderContent()}"/>`;
    }
    
    // Mostrar campo de variables solo si ya confirmó el problema (tiene al menos 3 caracteres Y no está vacío después de trim)
    const problemaConfirmado = state.problema === "otro" && state.problemaOtro.trim().length >= 3;
    const mostrarVariables = (state.problema && state.problema !== "otro") || problemaConfirmado;
    
    if(mostrarVariables){
      const labelCategorias = state.enfoque === 'Cualitativo'
        ? "¿Qué categorías de análisis o ejes temáticos te interesan?"
        : "¿Qué variables quieres estudiar?";
      h+=sectionLabel(labelCategorias);
      // Merge static vars with AI-generated vars (AI vars take priority if available)
      const staticVars = state.problema!=="otro"&&VARIABLES[state.problema]?VARIABLES[state.problema]:[];
      const vars = state.aiVars.length > 0 ? state.aiVars : staticVars;

      // Show AI loading indicator
      if(state.aiVarsLoading){
        h+=`<div class="hint" style="display:flex;align-items:center;gap:8px;padding:10px 14px">
          <span style="animation:pulse 1s infinite;font-size:16px">🤖</span>
          <span>Generando variables personalizadas para tu proyecto...</span>
        </div>`;
      } else if(state.aiVars.length > 0){
        h+=`<div class="hint success" style="font-size:12px;padding:8px 12px;margin-bottom:4px">
          ✨ <strong>Variables generadas por IA</strong> para tu proyecto específico
          <button onclick="state.aiVars=[];renderContent()" style="margin-left:8px;font-size:11px;background:none;border:1px solid var(--green);border-radius:4px;padding:1px 6px;cursor:pointer;color:var(--green)">Ver estáticas</button>
        </div>`;
      }

      if(vars.length>0 && !state.aiVarsLoading){
        h+=`<div class="chips">`;
        vars.forEach(v=>{
          const esc=v.replace(/'/g,"\\'");

        });
        h+=`<button class="chip ${state.variables.includes('otro')?'active':''}" onclick="toggleVar('otro')">Otro</button>`;
        h+=`</div>`;
        const nv=state.variables.filter(v => v !== 'otro').length;
        if(nv>0){
          if(state.enfoque === 'Cualitativo') {
            h+=`<div class="hint success">💡 En investigación cualitativa se trabaja con <strong>categorías de análisis</strong> (ejes temáticos). Selecciona los fenómenos que deseas comprender en profundidad.</div>`;

  else if(s===3){

    // ── Enfoque ───────────────────────────────────────────────────
    h+=sectionLabel("¿Qué enfoque metodológico prefieres?");
    h+=`<div class="options">`;
    ENFOQUES.forEach(e=>{
      let desc="";
      if(e==="Cuantitativo") desc="Números, estadísticas, medición objetiva";
      if(e==="Cualitativo")  desc="Experiencias, significados, profundidad";
      if(e==="Mixto")        desc="Combina métodos cuantitativos y cualitativos";
      h+=badgeWithDesc(e, desc, null, state.enfoque===e, `selectEnfoque('${e}')`);
    });
    h+=`</div>`;


    // ── Nivel (cuantitativo/mixto) | directo al diseño (cualitativo) ──
    if(state.enfoque === "Cualitativo") {
      // Cualitativo: va directo al diseño, sin pasar por nivel
      h+=sectionLabel("¿Qué diseño de investigación utilizarás?",
        "El diseño define el método de recolección y análisis, y determina el tipo de pregunta cualitativa apropiada (Pistrang & Barker, 2012; CHIP-PUCP, 2017).");
      h+=`<div class="options">`;
      DISENOS.cualitativo.forEach(d=>{
        const esc=d.id.replace(/'/g,"\\'");
        h+=badgeWithDesc(d.label, d.desc, d.hint, state.diseno===d.id, `selectDiseno('${esc}')`);
      });
      h+=`</div>`;

    } else {
      // ── BLOQUE CUANTITATIVO / MIXTO: nivel → diseño ───────────────
      h+=sectionLabel("¿Qué nivel de investigación buscas?", "El nivel indica qué tan profundo quieres llegar: explorar un tema nuevo, describirlo, buscar relaciones entre variables, o explicar causas.");
      h+=`<div class="options">`;
      NIVELES.forEach(n=>{
        const esc=n.id.replace(/'/g,"\\'");
        h+=badgeWithDesc(n.label, n.desc, n.hint, state.nivel===n.id, `selectNivel('${esc}')`);
      });
      h+=`</div>`;
      if(state.diseno === 'cuasiexperimental' && state.nivel !== 'explicativo') {
        h+=`<div class="hint warning">⚠️ El diseño cuasi-experimental busca establecer relaciones causales (sin aleatorización), por lo que es coherente principalmente con nivel <strong>explicativo</strong>. Se recomienda ajustar el nivel de investigación.</div>`;
      }

      // ── Diseño cuantitativo/mixto ──────────────────────────────────
      if(state.nivel){
        h+=sectionLabel("¿Qué diseño de investigación utilizarás?", "El diseño es la estrategia de recolección: cómo y cuándo obtendrás los datos. Según Ato, López y Benavente (2013), los diseños se agrupan en tres estrategias: manipulativa, asociativa y descriptiva.");
        const enfoqueKey = state.enfoque.toLowerCase();
        const disenosDisponibles = DISENOS[enfoqueKey] || [];
        h+=`<div class="options">`;
        disenosDisponibles.forEach(d=>{
          const esc=d.id.replace(/'/g,"\'");
          h+=badgeWithDesc(d.label, d.desc, d.hint, state.diseno===d.id, `selectDiseno('${esc}')`);
        });
        h+=`</div>`;
      }
    }

    // ── Técnica de análisis ───────────────────────────────────────
    if(state.enfoque==="Cuantitativo" && state.diseno && state.nivel) {
      const tecnicasDisponibles = getTecnicasDisponibles(state.nivel, state.diseno);

      // Experimental / cuasi-experimental: ANOVA/t-test, fuera del alcance
      if(state.diseno==='experimental' || state.diseno==='cuasiexperimental'){
        h+=`<div class="hint warning">⚠️ Los diseños experimental y cuasi-experimental utilizan técnicas como ANOVA, t de Student o ANCOVA para comparar grupos. Estas técnicas están fuera del alcance de este asistente (orientado a correlación, regresión y modelos relacionales). Puedes continuar, pero el asistente generará una propuesta adaptada a tu diseño sin una técnica específica de comparación de grupos.</div>`;
      }
      // Correlacional + longitudinal: advertencia de técnica adecuada
      else if(tecnicasDisponibles === 'correlacional_longitudinal'){
        h+=`<div class="hint warning">⚠️ <strong>Combinación infrecuente:</strong> El nivel correlacional con diseño longitudinal requiere técnicas especializadas como <strong>correlaciones test-retest</strong>, <strong>modelos autorregresivos</strong> o <strong>modelos de efectos cruzados con rezago (cross-lagged)</strong>, que están fuera del alcance de este asistente. Se recomienda cambiar a nivel <strong>explicativo</strong> para aprovechar el potencial del diseño longitudinal, o usar diseño <strong>transversal</strong> si el objetivo es solo correlacional.</div>`;
      }
      // Exploratorio / descriptivo: sin técnica avanzada
      else if(state.nivel==='exploratorio' || state.nivel==='descriptivo'){
        h+=`<div class="hint success">✅ Para nivel ${state.nivel === 'exploratorio' ? 'exploratorio' : 'descriptivo'} se utilizan estadísticos descriptivos: frecuencias, medidas de tendencia central y dispersión. No se requieren técnicas avanzadas.</div>`;
      }
      // Técnicas disponibles según nivel + diseño
      else if(tecnicasDisponibles && tecnicasDisponibles.length > 0 && Array.isArray(tecnicasDisponibles)){
        h+=sectionLabel("¿Qué técnica de análisis estadístico planeas usar?",
          "Solo aparecen técnicas coherentes con tu nivel y diseño de investigación.");
        if(state.nivel==="correlacional"){
          h+=`<div class="hint">📌 Nivel correlacional/predictivo: estas técnicas miden asociaciones o predicciones, <strong>no</strong> establecen causalidad (Hernández & Mendoza, 2018). Equivalen al <em>diseño predictivo transversal — DPT</em> de Ato et al. (2013).</div>`;
        } else if(state.diseno==='no-experimental-longitudinal'){
          h+=`<div class="hint">📌 Diseño longitudinal: las técnicas disponibles son adecuadas para datos con mediciones repetidas o en distintos tiempos.</div>`;
        } else {
          h+=`<div class="hint">📌 Nivel explicativo + diseño transversal: puedes modelar relaciones causales entre variables observadas (DVO) o latentes (DVL) según Ato et al. (2013). Las opciones SEM son de uso avanzado y corresponden a posgrado.</div>`;
        }
        h+=`<div class="options">`;
        tecnicasDisponibles.forEach(t=>{
          const esc=t.id.replace(/'/g,"\'");
          h+=badgeWithDesc(t.label, t.desc, t.hint, state.tecnica===t.id, `selectTecnica('${esc}')`);
        });
        h+=`</div>`;
      }
    }

    h+=getAutoSuggestion();
    h+=`</div>`;
    el.innerHTML=h;
  }
  else if(s===4){
    let h=`<div class="gap20">`;
    h+=sectionLabel("¿Cuánta experiencia tienes con este tema o población?");
    h+=`<div class="options">`;

    h+=`<div class="options">`;
    VIABILIDADES.forEach(v=>{
      const esc=v.replace(/'/g,"\\'");
      h+=badge(v, state.viabilidad===v, `state.viabilidad='${esc}';updateNav();renderContent();saveState()`);
    });
    h+=`</div>`;
    h+=sectionLabel("¿En qué lugar realizarías tu investigación? — Especifica ciudad o región");
    h+=`<textarea placeholder="Ej: Lima, Perú — distrito de San Juan de Lurigancho; o Arequipa, en una institución educativa pública..." oninput="state.contexto=this.value;saveState()">${state.contexto}</textarea>`;
    h+=sectionLabel("¿Por qué te interesa este tema? — opcional");
    h+=`<textarea placeholder="Ej: Lo observé en mi práctica pre-profesional..." oninput="state.motivacion=this.value;saveState()">${state.motivacion}</textarea>`;
    h+=`</div>`;
    el.innerHTML=h;
  }

  else if(s===5){
    if(state.loading){
      el.innerHTML=`<div class="loading"><div class="icon">⏳</div><p>Generando tu propuesta de investigacion...</p></div>`;
      return;
    }
    if(!state.result){
      // Calcular advertencias antes de generar
      let warnHtml = '';
      const warns = getWarnings(
        state.variables.filter(v=>v!=='otro').concat(
          state.variables.includes('otro')&&state.variablesOtro.trim()

function updateNav(){
  document.getElementById("btn-back").disabled=state.step===0;
  const nb=document.getElementById("btn-next");
  nb.disabled=!canNext();
  nb.style.display=state.step===5?"none":"block";
}

function render(){
  renderStepsBar();
  renderContent();
  updateNav();
}

function nextStep(){if(canNext()&&state.step<5){state.step++;render();saveState();}}
function prevStep(){if(state.step>0){state.step--;render();saveState();}}

function selectArea(v){state.area=v;state.areaOtro="";state.poblacion="";state.poblacionOtro="";state.problema="";state.problemaOtro="";state.variables=[];updateNav();renderContent();saveState();}

function toggleVar(v){

  updateNav();renderContent();saveState();
}
function setVarsFromText(val){
  const vars = val.split(",").map(v=>v.trim()).filter(Boolean);
  state.variables = vars;
  state.variablesOtro = val;
  updateNav();
}
function toggleEdit(){
  const wasEditing = state.editMode;
  state.editMode = !state.editMode;
  if(wasEditing) {
    // User just exited edit mode — auto-validate
    state.editValidation = null;
    state.editValidating = true;
    renderContent();
    validateEdits(); // async, non-blocking
  } else {
    renderContent();
  }
}

  try {

// ── ADVERTENCIAS PREVENTIVAS ──────────────────────────────────────
function getWarnings(variablesList, tecnica, nivel, enfoque) {
  const warnings = [];
  const nv = variablesList.length;

  // Técnicas de mediación necesitan exactamente 3 variables (X, M, Y)
  if(tecnica === 'mediacion' || tecnica === 'sem-mediacion') {
    if(nv < 3) warnings.push(`⚠️ La mediación requiere exactamente 3 variables: X (predictor), M (mediador) e Y (criterio). Actualmente tienes ${nv}. Regresa al paso 3 y agrega las variables necesarias.`);
    if(nv > 3) warnings.push(`⚠️ Tienes ${nv} variables pero la mediación simple usa solo 3 (X, M, Y). Las variables extra no serán usadas en el modelo. Considera mediación múltiple o SEM completo.`);
  }
  // Moderación necesita exactamente 3 variables (X, W, Y)
  if(tecnica === 'moderacion' || tecnica === 'sem-moderacion') {
    if(nv < 3) warnings.push(`⚠️ La moderación requiere 3 variables: X (predictor), W (moderador) e Y (criterio). Actualmente tienes ${nv}.`);
  }
  // Mediación moderada necesita 4 variables
  if(tecnica === 'mediacion-moderada') {
    if(nv < 4) warnings.push(`⚠️ La mediación moderada requiere 4 variables: X, M (mediador), Y y W (moderador). Actualmente tienes ${nv}. Regresa al paso 3 y agrega la variable faltante.`);
  }
  // Regresión múltiple necesita al menos 3 variables (2 predictores + Y)
  if(tecnica === 'regresion-multiple') {
    if(nv < 3) warnings.push(`⚠️ La regresión múltiple requiere al menos 2 predictores y 1 variable dependiente (mínimo 3 variables). Actualmente tienes ${nv}.`);
  }
  // SEM con latentes: cada variable necesita ≥3 indicadores (advertencia conceptual)
  if(['sem-mediacion','sem-moderacion','sem-completo','path-analysis'].includes(tecnica)) {
    warnings.push(`📌 Recuerda: Para SEM con variables latentes, cada constructo debe medirse con al menos 3 indicadores observables (ítems de escala). Las variables que seleccionaste serán los constructos latentes del modelo.`);
  }
  // Correlación con más de 2 variables
  if(tecnica === 'correlacion' && nv > 2) {
    warnings.push(`💡 Tienes ${nv} variables. La correlación de Pearson/Spearman mide pares de variables. Para múltiples correlaciones simultáneas considera una matriz de correlaciones o regresión múltiple.`);
  }
  // Nivel descriptivo con técnica avanzada (no debería pasar, pero por si acaso)
  if((nivel === 'descriptivo' || nivel === 'exploratorio') && tecnica && tecnica !== '') {
    warnings.push(`⚠️ El nivel ${nivel} no es compatible con técnicas de análisis inferencial. Considera cambiar el nivel a correlacional o explicativo.`);
  }
  // Path analysis / SEM correlacional (incoherente)
  if(['path-analysis','sem-mediacion','sem-moderacion','sem-completo'].includes(tecnica) && nivel==='correlacional'){
    warnings.push(`⚠️ Las técnicas SEM/Path Analysis requieren nivel explicativo, no correlacional. Regresa al paso 3 y cambia el nivel.`);
  }
  // Cualitativo con nivel correlacional o explicativo (error metodológico)
  if(enfoque === 'Cualitativo' && (nivel === 'correlacional' || nivel === 'explicativo')) {
    warnings.push(`⚠️ Error metodológico: el enfoque cualitativo NO admite nivel correlacional ni explicativo/causal. Regresa al paso 4 y selecciona nivel "Exploratorio" o "Descriptivo" (Hernández et al., 2014).`);
  }
  return warnings;
}

// ── ZIP builder (sin librerías) ───────────────────────────────────
async function buildZip(files, pngBytes) {
  // Use fflate if available, otherwise simple store-only ZIP
  const entries = [];
  const enc = new TextEncoder();

  const crc32 = (buf) => {
    let c=0xFFFFFFFF;
    const t=new Uint8Array(256).map((_,i)=>{let n=i;for(let k=0;k<8;k++)n=n&1?(0xEDB88320^(n>>>1)):(n>>>1);return n;});
    for(let i=0;i<buf.length;i++)c=t[(c^buf[i])&0xFF]^(c>>>8);
    return (c^0xFFFFFFFF)>>>0;
  };

  const u32le=(n)=>{const b=new Uint8Array(4);new DataView(b.buffer).setUint32(0,n,true);return b;};
  const u16le=(n)=>{const b=new Uint8Array(2);new DataView(b.buffer).setUint16(0,n,true);return b;};

  // Add text files
  for(const [name, content] of Object.entries(files)){
    const nameBytes = enc.encode(name);
    const data = enc.encode(content);
    const crc  = crc32(data);
    entries.push({name:nameBytes, data, crc, size:data.length});
  }

  // Add PNG image if provided
  if(pngBytes){
    const nameBytes = enc.encode('word/media/diagram.png');
    const data = new Uint8Array(pngBytes);
    const crc  = crc32(data);
    entries.push({name:nameBytes, data, crc, size:data.length});
  }

  // Build ZIP
  const localHeaders = [];
  let offset = 0;
  const parts = [];

  for(const e of entries){
    const lh = new Uint8Array([
      0x50,0x4B,0x03,0x04, // signature
      20,0,                 // version needed
      0,0,                  // flags
      0,0,                  // compression (stored)
      0,0,0,0,              // mod time/date
      ...u32le(e.crc),
      ...u32le(e.size),
      ...u32le(e.size),
      ...u16le(e.name.length),
      0,0,                  // extra len
    ]);
    localHeaders.push({offset, nameLen:e.name.length, crc:e.crc, size:e.size, name:e.name});
    parts.push(lh, e.name, e.data);
    offset += lh.length + e.name.length + e.size;
  }

  // Central directory
  const cdParts = [];
  let cdSize = 0;
  for(let i=0;i<entries.length;i++){
    const e=entries[i], lh=localHeaders[i];
    const cd = new Uint8Array([
      0x50,0x4B,0x01,0x02, // signature
      20,0,20,0,            // version made/needed
      0,0,0,0,              // flags, compression
      0,0,0,0,              // mod time/date
      ...u32le(e.crc),
      ...u32le(e.size),
      ...u32le(e.size),
      ...u16le(e.name.length),
      0,0,0,0,0,0,          // extra, comment, disk
      0,0,                  // internal attr
      0,0,0,0,              // external attr
      ...u32le(lh.offset),
    ]);
    cdParts.push(cd, e.name);
    cdSize += cd.length + e.name.length;
  }

  // End of central directory
  const eocd = new Uint8Array([
    0x50,0x4B,0x05,0x06, // signature
    0,0,0,0,              // disk numbers
    ...u16le(entries.length),
    ...u16le(entries.length),
    ...u32le(cdSize),
    ...u32le(offset),
    0,0,                  // comment len
  ]);

  // Concatenate all parts
  const allParts = [...parts, ...cdParts, eocd];
  const totalSize = allParts.reduce((s,p)=>s+p.length, 0);
  const result = new Uint8Array(totalSize);
  let pos = 0;
  for(const p of allParts){ result.set(p, pos); pos += p.length; }
  return result.buffer;
}

// ── SVG → PNG via Canvas ──────────────────────────────────────────
async function svgToBase64Png(svgStr, w=600, h=300) {
  return new Promise((resolve, reject) => {
    const canvas = document.createElement('canvas');
    canvas.width = w*2; canvas.height = h*2;
    const ctx = canvas.getContext('2d');
    if(!ctx){ reject(new Error('Canvas not supported')); return; }
    ctx.scale(2,2);
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,w,h);

    // Encode SVG as data URI to avoid CORS/tainted canvas issues
    const svgClean = svgStr
      .replace(/&/g,'&amp;')
      .replace(/<br>/g,'<br/>')
      // Ensure proper XML namespace
      .replace('<svg ', '<svg xmlns="http://www.w3.org/2000/svg" ');
    const encoded = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);

    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob(b => {
          if(!b){ reject(new Error('toBlob returned null')); return; }
          b.arrayBuffer().then(resolve).catch(reject);
        }, 'image/png', 0.95);
      } catch(e) {
        reject(new Error('Canvas draw failed: ' + e.message));
      }
    };
    img.onerror = () => reject(new Error('SVG image load failed'));
    img.src = encoded;
  });
}

// ── SVG helpers ───────────────────────────────────────────────────────
function svgBox(x, y, w, h, label, stroke, fill, fontSize=11) {
  const words = label.split(' ');
  let lines = [], cur = '';
  words.forEach(wd => {
    const test = cur ? cur + ' ' + wd : wd;
    if (test.length > 17 && cur) { lines.push(cur); cur = wd; }
    else cur = test;
  });
  if (cur) lines.push(cur);
  lines = lines.slice(0, 2);
  const lh = 15, totalH = lines.length * lh;
  const startY = y + h/2 - totalH/2 + lh*0.75;
  const rects = `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="9" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
  const texts = lines.map((l,i) => `<text x="${x+w/2}" y="${startY+i*lh}" text-anchor="middle" font-size="${fontSize}" font-weight="600" fill="${stroke}" font-family="system-ui,sans-serif">${l}</text>`).join('');
  return rects + texts;
}

function svgEllipse(cx, cy, rx, ry, label, stroke, fill, fontSize=11) {
  const lines = label.length > 14 ? [label.substring(0,14), label.substring(14)] : [label];
  const lh = 15, startY = cy - (lines.length-1)*lh/2;
  return `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
    ${lines.map((l,i)=>`<text x="${cx}" y="${startY+i*lh}" text-anchor="middle" dominant-baseline="middle" font-size="${fontSize}" font-weight="700" fill="${stroke}" font-family="system-ui,sans-serif">${l}</text>`).join('')}`;
}

function svgArrow(x1,y1,x2,y2,color,label='',dashed=false,curved=false) {
  const id = 'ar'+Math.abs(x1*100+y1*10+x2+y2)|0;
  const marker = `<marker id="${id}" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 z" fill="${color}"/></marker>`;
  const dash = dashed ? 'stroke-dasharray="6,3"' : '';
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  let path;
  if(curved) {
    const cpx = mx, cpy = Math.min(y1,y2) - 50;
    path = `<path d="M${x1},${y1} Q${cpx},${cpy} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="2" ${dash} marker-end="url(#${id})"/>`;
  } else {
    path = `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="2" ${dash} marker-end="url(#${id})"/>`;
  }
  const lbl = label ? `<rect x="${mx-26}" y="${my-10}" width="52" height="16" rx="3" fill="white" opacity="0.92"/><text x="${mx}" y="${my+4}" text-anchor="middle" font-size="10" fill="${color}" font-weight="600" font-family="system-ui,sans-serif">${label}</text>` : '';
  return `<defs>${marker}</defs>${path}${lbl}`;
}

  const trunc = (s, n=16) => s.length > n ? s.substring(0,n-1)+'…' : s;

  // Box with 1-2 line label
  function box(x,y,w,h,label,sc,fc,fs=11){
    const words = trunc(label,20).split(' ');
    let L1='', L2='';

  // Color palette
  const Cx={s:"#4F46E5",f:"#EEF2FF"}, Cy={s:"#993C1D",f:"#FAECE7"},
        Cm={s:"#059669",f:"#ECFDF5"}, Cw={s:"#7C3AED",f:"#F3E8FF"},
        Cl={s:"#1D4ED8",f:"#EFF6FF"};

  // ── REGRESIÓN SIMPLE ─────────────────────────────────────────
  if(d==='regresion-simple'){
    titulo='Modelo de Regresión Simple';
    nivel='Pregrado · OLS';
    nota='X predice linealmente a Y. Se reporta β, R² y la significancia del modelo.';
    const X=vars[0]||'Predictor (X)', Y=vars[1]||'Criterio (Y)';
    const px=50, py=30, gh=H-py-40;
    // Axes
    svg+=`<line x1="${px}" y1="${py}" x2="${px}" y2="${py+gh}" stroke="#CBD5E1" stroke-width="2"/>`;
    svg+=`<line x1="${px}" y1="${py+gh}" x2="${W-30}" y2="${py+gh}" stroke="#CBD5E1" stroke-width="2"/>`;
    // Axis arrows
    svg+=arrow(px,py+gh,W-30,py+gh,'#94A3B8');
    svg+=arrow(px,py+gh,px,py,'#94A3B8');
    // Axis labels
    svg+=`<text x="${W-25}" y="${py+gh+5}" font-size="11" fill="${Cx.s}" font-weight="600" font-family="system-ui">${f(trunc(X,12))}</text>`;
    svg+=`<text x="${px-6}" y="${py-6}" text-anchor="middle" font-size="11" fill="${Cy.s}" font-weight="600" font-family="system-ui">${f(trunc(Y,12))}</text>`;
    // Scatter points
    [[75,220],[105,195],[130,210],[160,175],[185,180],[215,155],[245,145],[268,160],[295,130],[320,115],[350,130],[378,100],[405,92],[430,108],[460,80]].forEach(([px2,py2])=>{
      svg+=`<circle cx="${px2}" cy="${py2}" r="5" fill="${Cx.s}" opacity=".5"/>`;
    });
    // Regression line
    svg+=`<line x1="60" y1="228" x2="470" y2="68" stroke="${Cy.s}" stroke-width="2.5" stroke-linecap="round"/>`;
    // β label on line
    svg+=`<rect x="330" y="95" width="30" height="18" rx="3" fill="white" opacity=".9"/>`;
    svg+=`<text x="345" y="108" text-anchor="middle" font-size="11" fill="${Cy.s}" font-weight="700" font-family="system-ui">β₁</text>`;
    // Formula box bottom-center
    svg+=`<rect x="${W/2-78}" y="${H-32}" width="156" height="22" rx="5" fill="${Cy.f}" stroke="${Cy.s}" stroke-width="1.5"/>`;
    svg+=`<text x="${W/2}" y="${H-17}" text-anchor="middle" font-size="11" fill="${Cy.s}" font-weight="700" font-family="system-ui">Ŷ = β₀ + β₁X + ε</text>`;
    // R² top-right
    svg+=`<rect x="${W-100}" y="${py}" width="90" height="36" rx="6" fill="${Cm.f}" stroke="${Cm.s}" stroke-width="1.5"/>`;
    svg+=`<text x="${W-55}" y="${py+14}" text-anchor="middle" font-size="10" fill="${Cm.s}" font-weight="700" font-family="system-ui">R² = var.</text>`;
    svg+=`<text x="${W-55}" y="${py+28}" text-anchor="middle" font-size="10" fill="${Cm.s}" font-family="system-ui">explicada</text>`;
  }

  // ── REGRESIÓN MÚLTIPLE ────────────────────────────────────────
  else if(d==='regresion-multiple'){
    titulo='Modelo de Regresión Múltiple';
    nivel='Pregrado · OLS / Hayes';
    nota='Cada predictor aporta independientemente a explicar Y. Se reportan β estandarizados, R² y ΔR².';
    const preds=vars.length>=2?vars.slice(0,vars.length-1):[vars[0]||'Predictor 1','Predictor 2'];
    const Y=vars.length>=2?vars[vars.length-1]:'Variable Y';
    const n=Math.min(preds.length,5);
    const stepY=(H-20)/(n+1);
    for(let i=0;i<n;i++){
      const py2=10+stepY*(i+1)-20;
      svg+=box(10,py2,155,40,preds[i],Cx.s,Cx.f);
      svg+=arrow(165,py2+20,385,H/2-20,Cx.s,`β${i+1}`);
    }
    svg+=box(385,H/2-22,155,44,Y,Cy.s,Cy.f);
    svg+=`<text x="462" y="${H-8}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">R² = varianza total explicada</text>`;
    if(preds.length>5) svg+=`<text x="90" y="${H-8}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">+${preds.length-5} predictores más</text>`;
  }

  // ── MEDIACIÓN SIMPLE ──────────────────────────────────────────
  else if(d==='mediacion'){
    titulo='Modelo de Mediación Simple';
    nivel='Pregrado · Hayes PROCESS Modelo 4';
    nota="El efecto de X sobre Y opera directamente (c') e indirectamente a través de M. Efecto indirecto = a × b.";
    const X=vars[0]||'Variable X', M=vars[1]||'Mediador (M)', Y=vars[2]||'Variable Y';
    svg+=box(15,H/2-22,145,44,X,Cx.s,Cx.f);
    svg+=box(W/2-72,18,145,44,M,Cm.s,Cm.f);
    svg+=box(W-160,H/2-22,145,44,Y,Cy.s,Cy.f);
    svg+=arrow(160,H/2,W-160,H/2,Cx.s,"c' (directo)");
    svg+=arrow(160,H/2-14,W/2-72,40,Cm.s,'a');
    svg+=arrow(W/2+73,40,W-160,H/2-14,Cm.s,'b');
    svg+=`<rect x="${W/2-85}" y="${H-34}" width="170" height="22" rx="5" fill="${Cm.f}" stroke="${Cm.s}" stroke-width="1.5"/>`;
    svg+=`<text x="${W/2}" y="${H-19}" text-anchor="middle" font-size="10" fill="${Cm.s}" font-weight="700" font-family="system-ui">Efecto indirecto = a × b</text>`;
  }

  // ── MODERACIÓN SIMPLE ─────────────────────────────────────────
  else if(d==='moderacion'){
    titulo='Modelo de Moderación Simple';
    nivel='Pregrado · Hayes PROCESS Modelo 1';
    nota='W modifica la fuerza o dirección de X→Y. El término de interacción X×W es el componente clave.';
    const X=vars[0]||'Variable X', Wv=vars[1]||'Moderador (W)', Y=vars[2]||'Variable Y';
    // X box left, Y box right, W box top-center
    svg+=box(15,H/2-20,140,40,X,Cx.s,Cx.f);
    svg+=box(W-155,H/2-20,140,40,Y,Cy.s,Cy.f);
    svg+=box(W/2-72,22,145,40,Wv,Cw.s,Cw.f);
    // Main arrow X→Y
    svg+=arrow(155,H/2,W-155,H/2,Cx.s,'');
    // Moderator arrow (dashed, top-down to midpoint)
    const mid=W/2, midY=H/2;
    const id2='modArr';
    svg+=`<defs><marker id="${id2}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="${Cw.s}"/></marker></defs>`;
    svg+=`<line x1="${mid}" y1="62" x2="${mid}" y2="${midY-14}" stroke="${Cw.s}" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#${id2})"/>`;
    // Interaction label at midpoint of arrow
    svg+=`<rect x="${mid-52}" y="${midY-14}" width="104" height="20" rx="4" fill="white" stroke="${Cw.s}" stroke-width="1.5"/>`;
    svg+=`<text x="${mid}" y="${midY-1}" text-anchor="middle" font-size="10" fill="${Cw.s}" font-weight="700" font-family="system-ui">X × W (interacción)</text>`;
    // Bottom note
    svg+=`<rect x="${W/2-120}" y="${H-32}" width="240" height="20" rx="4" fill="${Cw.f}" stroke="${Cw.s}" stroke-width="1"/>`;
    svg+=`<text x="${W/2}" y="${H-18}" text-anchor="middle" font-size="10" fill="${Cw.s}" font-weight="600" font-family="system-ui">β(X×W) significativo → moderación confirmada</text>`;
  }

  // ── MEDIACIÓN MODERADA ────────────────────────────────────────
  else if(d==='mediacion-moderada'){
    titulo='Modelo de Mediación Moderada';
    nivel='Pregrado avanzado · Hayes PROCESS Modelos 7, 14 o 58';
    nota='W modera la ruta a (X→M) o b (M→Y). El índice de mediación moderada indica si el efecto indirecto varía según W.';
    const X=vars[0]||'X',M=vars[1]||'Mediador',Y=vars[2]||'Y',Wv=vars[3]||'Moderador';
    svg+=box(10,H/2-20,125,40,X,Cx.s,Cx.f);
    svg+=box(W/2-62,14,125,40,M,Cm.s,Cm.f);
    svg+=box(W-135,H/2-20,125,40,Y,Cy.s,Cy.f);
    svg+=box(W/2-62,H-55,125,40,Wv,Cw.s,Cw.f);
    svg+=arrow(135,H/2,W-135,H/2,Cx.s,"c'");
    svg+=arrow(135,H/2-12,W/2-62,34,Cm.s,'a');
    svg+=arrow(W/2+63,34,W-135,H/2-12,Cm.s,'b');
    const idw='mmArr';
    svg+=`<defs><marker id="${idw}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="${Cw.s}"/></marker></defs>`;
    svg+=`<line x1="${W/2}" y1="${H-55}" x2="${W/2}" y2="54" stroke="${Cw.s}" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#${idw})"/>`;
    svg+=`<text x="${W/2+6}" y="${H/2-32}" font-size="9" fill="${Cw.s}" font-family="system-ui" font-style="italic">modera a y/o b</text>`;
  }

  // ── PATH ANALYSIS ─────────────────────────────────────────────
  else if(d==='path-analysis'){
    titulo='Path Analysis — Variables Observadas';
    nivel='Posgrado · AMOS, lavaan, Mplus';
    nota='Variables observadas directamente. Se estiman efectos directos e indirectos. No requiere indicadores múltiples.';

    const nVars = vars.length;

    if(nVars <= 1) {
      // Solo 1 variable: advertencia
      svg+=box(W/2-80,H/2-22,160,44,vars[0]||'Variable',Cx.s,Cx.f);
      svg+=`<text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="10" fill="#D97706" font-family="system-ui">⚠️ Path Analysis requiere al menos 3 variables</text>`;

    } else if(nVars === 2) {
      // 2 variables: diagrama simple X → Y
      svg+=box(40,H/2-22,160,44,vars[0],Cx.s,Cx.f);
      svg+=box(W-200,H/2-22,160,44,vars[1],Cy.s,Cy.f);
      svg+=arrow(200,H/2,W-200,H/2,Cx.s,'β');
      svg+=`<text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">Path Analysis · 2 variables</text>`;

    } else if(nVars === 3) {
      // 3 variables: X₁ y X₂ → Y  (sin Var 4 inventado)
      svg+=box(10, 65,150,40,vars[0],Cx.s,Cx.f);
      svg+=box(10,175,150,40,vars[1],Cx.s,Cx.f);
      svg+=box(W-175,H/2-22,165,44,vars[2],Cy.s,Cy.f);
      svg+=arrow(160, 85,W-175,H/2-10,Cx.s,'β₁');
      svg+=arrow(160,195,W-175,H/2+10,Cx.s,'β₂');
      svg+=`<text x="${W/2}" y="${H-6}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">Índices: CFI, TLI, RMSEA, SRMR</text>`;

    } else {
      // 4+ variables: layout con mediador intermedio (usa solo primeras 4)
      const v = vars.slice(0,4);
      svg+=box(10, 45,130,40,v[0],Cx.s,Cx.f);
      svg+=box(10,170,130,40,v[1],Cx.s,Cx.f);
      svg+=box(225,108,130,40,v[2],Cm.s,Cm.f);
      svg+=box(430,108,130,40,v[3],Cy.s,Cy.f);
      svg+=arrow(140, 65,225,120,Cx.s,'β₁');
      svg+=arrow(140,190,225,136,Cx.s,'β₂');
      svg+=arrow(355,128,430,128,Cm.s,'β₃');
      svg+=arrow(140, 65,430,118,Cx.s,'',true);
      if(vars.length > 4) {
        svg+=`<text x="${W/2}" y="16" text-anchor="middle" font-size="9" fill="#D97706" font-family="system-ui">Mostrando 4 de ${vars.length} variables</text>`;
      }
      svg+=`<text x="${W/2}" y="${H-6}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">Índices: CFI, TLI, RMSEA, SRMR</text>`;
    }
  }

  // ── SEM MEDIACIÓN CON LATENTES ────────────────────────────────
  else if(d==='sem-mediacion'){
    titulo='SEM — Mediación con Latentes';
    nivel='Posgrado · AMOS, Mplus, lavaan';
    nota='X, M e Y son constructos latentes medidos por indicadores. Corrige el error de medición.';
    const X=vars[0]||'ξ (X)',M=vars[1]||'η₁ (M)',Y=vars[2]||'η₂ (Y)';
    // Three ellipses in triangle layout
    svg+=ellipse(110,155, 78,36,'ξ: '+trunc(X,9),Cl.s,Cl.f);
    svg+=ellipse(300, 65, 72,32,'η₁: '+trunc(M,8),Cm.s,Cm.f);
    svg+=ellipse(490,155, 75,36,'η₂: '+trunc(Y,9),Cy.s,Cy.f);
    // Indicators exogenous
    svg+=box(5, 40, 80,28,'x₁',Cl.s,'#F8FAFF',9);
    svg+=box(5,195, 80,28,'x₂',Cl.s,'#F8FAFF',9);
    svg+=arrow(85, 54,100,128,Cl.s,'λ₁');
    svg+=arrow(85,209,100,172,Cl.s,'λ₂');
    // Indicators mediator
    svg+=box(250, 10, 80,28,'m₁',Cm.s,'#F0FDF8',9);
    svg+=arrow(290, 38,292, 44,Cm.s,'λ₃');
    // Indicators outcome
    svg+=box(500, 55, 75,28,'y₁',Cy.s,'#FFF8F5',9);
    svg+=box(500,218, 75,28,'y₂',Cy.s,'#FFF8F5',9);
    svg+=arrow(500, 69,498,128,Cy.s,'λ₄');
    svg+=arrow(500,232,498,180,Cy.s,'λ₅');
    // Structural paths
    svg+=arrow(188,148,228, 88,Cm.s,'a');
    svg+=arrow(372, 82,418,138,Cm.s,'b');
    svg+=arrow(188,162,418,162,Cl.s,"c'",true);
    svg+=`<text x="${W/2}" y="${H-4}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">Efecto indirecto a×b — bootstrapping</text>`;
  }

  // ── SEM MODERACIÓN CON LATENTES ───────────────────────────────
  else if(d==='sem-moderacion'){
    titulo='SEM — Moderación con Latentes';
    nivel='Posgrado · Mplus (LMS), lavaan (modsem)';
    nota='Interacción entre constructos latentes ξ₁×ξ₂. Técnica LMS o PI. Mayor complejidad que moderación por regresión.';
    const X=vars[0]||'ξ₁ (X)',Wv=vars[1]||'ξ₂ (W)',Y=vars[2]||'η (Y)';
    svg+=ellipse(110, 95, 80,36,trunc(X,12),Cl.s,Cl.f);
    svg+=ellipse(110,210, 80,36,trunc(Wv,12),Cw.s,Cw.f);
    svg+=ellipse(460,152, 82,40,trunc(Y,12),Cy.s,Cy.f);
    svg+=ellipse(290,152, 72,32,'ξ₁ × ξ₂','#B45309','#FEF3E8');
    svg+=arrow(190,103,222,135,Cl.s,'γ₁');
    svg+=arrow(190,202,222,168,Cw.s,'γ₂');
    svg+=arrow(362,152,380,152,'#B45309','γ₃');
    svg+=`<rect x="${W/2-130}" y="${H-30}" width="260" height="20" rx="4" fill="#FEF3E8" stroke="#B45309" stroke-width="1"/>`;
    svg+=`<text x="${W/2}" y="${H-16}" text-anchor="middle" font-size="9" fill="#B45309" font-family="system-ui">γ₃ sig. → moderación entre latentes confirmada</text>`;
  }

  // ── SEM COMPLETO ──────────────────────────────────────────────
  else if(d==='sem-completo'){
    titulo='SEM — Modelo Estructural Completo';
    nivel='Posgrado · AMOS, Mplus, lavaan';
    nota='CFA (modelo de medición) + modelo estructural. Índices: CFI≥.95, TLI≥.95, RMSEA≤.06, SRMR≤.08.';
    // Use real variable names — assign roles: exógenas = primeras vars, endógena = última
    // Pad only with generic labels if truly needed (never "Var N")
    const vRaw=[...vars];
    while(vRaw.length<4) vRaw.push(vRaw.length===0?'Exógena 1':vRaw.length===1?'Exógena 2':vRaw.length===2?'Mediador':'Endógena');
    const v=vRaw;
    const ex1=v[0], ex2=v[1], end1=v[2], end2=v[v.length-1];

    // Measurement model left — exógenas
    svg+=`<rect x="8" y="8" width="138" height="${H-16}" rx="8" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="5,3"/>`;
    svg+=`<text x="73" y="22" text-anchor="middle" font-size="8" fill="#1D4ED8" font-weight="600" font-family="system-ui">VARIABLES EXÓGENAS</text>`;
    svg+=ellipse(73, 88,62,28,trunc(ex1,10),Cl.s,'white',10);
    svg+=ellipse(73,192,62,28,trunc(ex2,10),Cl.s,'white',10);
    svg+=box(10, 50,38,20,'x₁x₂',Cl.s,'#F8FAFF',8);
    svg+=box(10,155,38,20,'x₃x₄',Cl.s,'#F8FAFF',8);
    svg+=arrow(48, 60,52, 68,Cl.s,'');
    svg+=arrow(48,158,52,172,Cl.s,'');

    // Structural model center
    svg+=`<rect x="158" y="8" width="262" height="${H-16}" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1" stroke-dasharray="5,3"/>`;
    svg+=`<text x="289" y="22" text-anchor="middle" font-size="8" fill="#059669" font-weight="600" font-family="system-ui">MODELO ESTRUCTURAL</text>`;
    svg+=ellipse(205, 88,55,26,trunc(ex1,9),Cl.s,Cl.f,10);
    svg+=ellipse(205,192,55,26,trunc(ex2,9),Cl.s,Cl.f,10);
    svg+=ellipse(305,140,55,28,trunc(end1,9),Cm.s,Cm.f,10);
    svg+=ellipse(403,140,52,26,trunc(end2,9),Cy.s,Cy.f,10);
    svg+=arrow(136, 88,152, 88,Cl.s,'');
    svg+=arrow(136,182,152,188,Cl.s,'');
    svg+=arrow(260, 95,255,120,Cl.s,'γ₁');
    svg+=arrow(260,188,255,158,Cl.s,'γ₂');
    svg+=arrow(360,140,355,140,Cm.s,'β');

    // Output CFA right — endógena
    svg+=`<rect x="432" y="8" width="140" height="${H-16}" rx="8" fill="#FFF8F5" stroke="#993C1D" stroke-width="1" stroke-dasharray="5,3"/>`;
    svg+=`<text x="502" y="22" text-anchor="middle" font-size="8" fill="#993C1D" font-weight="600" font-family="system-ui">VARIABLE ENDÓGENA</text>`;
    svg+=ellipse(502, 80,58,26,trunc(end2,9),Cy.s,Cy.f,10);
    svg+=box(458,148,42,20,'y₁y₂',Cy.s,'#FFF8F5',8);
    svg+=box(508,148,42,20,'y₃y₄',Cy.s,'#FFF8F5',8);
    svg+=arrow(455,130,460,130,Cy.s,'');
    svg+=arrow(455,100,502, 68,Cy.s,'');

    svg+=`<text x="${W/2}" y="${H-4}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">CFI≥.95 · TLI≥.95 · RMSEA≤.06 · SRMR≤.08</text>`;
  }

  // Modal
  const isPost=['path-analysis','sem-mediacion','sem-moderacion','sem-completo'].includes(d);
  const badgeColor=isPost?'#1D4ED8':'#059669';
  const badgeLabel=isPost?'Posgrado':'Pregrado';

  const modalHtml=`
    <div id="modal-diagram" class="modal-overlay" onclick="if(event.target===this)this.remove()">
      <div class="modal-inner">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:12px">
          <div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span style="font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;background:${badgeColor}18;color:${badgeColor};border:1px solid ${badgeColor}40">${badgeLabel}</span>
              <span style="font-size:11px;color:#888">${f(nivel)}</span>
            </div>
            <h3 style="font-size:15px;font-weight:700;color:#111;margin:0">${f(titulo)}</h3>
          </div>
          <button onclick="document.getElementById('modal-diagram').remove()" style="border:none;background:#f5f5f5;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;flex-shrink:0">✕</button>
        </div>
        <p style="font-size:12px;color:#555;margin:0 0 14px;line-height:1.5">${f(nota)}</p>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;border:1px solid #eee;border-radius:10px;background:#fafafa" xmlns="http://www.w3.org/2000/svg">
          ${svg}
        </svg>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px">
          <p style="font-size:11px;color:#bbb;margin:0">Generado según técnica metodológica seleccionada</p>
          <button onclick="downloadDiagram()" style="padding:8px 18px;border-radius:8px;border:1.5px solid #4F46E5;color:#4F46E5;background:transparent;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;min-height:36px">📥 Descargar SVG</button>
        </div>
      </div>
    </div>`;

  document.body.insertAdjacentHTML('beforeend', modalHtml);
  window._lastDiagramSVG=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:#fafafa">${svg}</svg>`;
}

render();
</script>
</body>
</html>
