<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Asistente para la creación de proyectos de investigación</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

/* ── TOKENS ──────────────────────────────────────────────────────── */
:root{
  --brand:#4F46E5;--brand-light:#EEF2FF;--brand-mid:#C7D2FE;--brand-dark:#3730A3;
  --green:#059669;--green-light:#ECFDF5;--green-mid:#A7F3D0;
  --amber:#D97706;--amber-light:#FFFBEB;
  --red:#DC2626;--red-light:#FEF2F2;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
  --gray-400:#9CA3AF;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.05);
  --shadow-lg:0 10px 40px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.06);
  --font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

/* ── RESET & BASE ────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font);
  background:linear-gradient(135deg,#EEF2FF 0%,#F0FDF4 50%,#FFF7ED 100%);
  min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
  padding:20px 16px 40px;
}

/* ── CARD ────────────────────────────────────────────────────────── */
.card{
  background:#fff;border-radius:var(--radius-xl);
  border:1px solid var(--gray-200);
  padding:28px 24px;width:100%;max-width:640px;
  box-shadow:var(--shadow-lg);
  height:fit-content;
  overflow:hidden;
}

/* ── HEADER ──────────────────────────────────────────────────────── */
h2{
  font-size:17px;font-weight:700;color:var(--gray-900);
  margin-bottom:6px;letter-spacing:-0.2px;line-height:1.3;
}

/* ── STEP BAR ────────────────────────────────────────────────────── */
.steps{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.step-circle{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;cursor:default;transition:all .25s;
}
.step-circle.done{background:var(--brand);color:#fff;cursor:pointer;box-shadow:0 2px 6px rgba(79,70,229,.35)}
.step-circle.active{background:var(--brand-light);color:var(--brand);border:2px solid var(--brand)}
.step-circle.pending{background:var(--gray-100);color:var(--gray-400)}
.step-line{height:2px;width:16px;border-radius:2px;transition:background .25s}
.step-line.done{background:var(--brand)}
.step-line.pending{background:var(--gray-200)}
.step-label{font-size:11px;color:var(--gray-400);margin-bottom:22px;font-weight:500;letter-spacing:.2px}

/* ── SECTION LABEL ───────────────────────────────────────────────── */
.section-label{
  font-size:13px;color:var(--gray-500);font-weight:600;
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
  text-transform:uppercase;letter-spacing:.5px;
}

/* ── TOOLTIP ─────────────────────────────────────────────────────── */
.tooltip{position:relative;display:inline-flex;cursor:help}
.tooltip-icon{
  width:16px;height:16px;background:var(--brand);color:#fff;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;
}
.tooltip-text{
  visibility:hidden;width:240px;background:var(--gray-900);color:#fff;
  text-align:left;border-radius:var(--radius-sm);padding:10px 12px;
  position:absolute;z-index:10;bottom:130%;left:50%;margin-left:-120px;
  opacity:0;transition:opacity .25s;font-size:12px;line-height:1.5;
  font-weight:400;box-shadow:var(--shadow-md);
}
.tooltip-text::after{
  content:"";position:absolute;top:100%;left:50%;margin-left:-5px;
  border-width:5px;border-style:solid;border-color:var(--gray-900) transparent transparent transparent;
}
.tooltip:hover .tooltip-text{visibility:visible;opacity:1}

/* ── GRID ────────────────────────────────────────────────────────── */
.options{display:flex;flex-direction:column;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ── AREA BADGES (paso 1) ────────────────────────────────────────── */
.badge-area{
  padding:14px 12px;border-radius:var(--radius-md);cursor:pointer;
  text-align:center;border:1.5px solid transparent;
  font-size:12px;font-weight:500;width:100%;
  transition:all .18s;position:relative;
  background:var(--gray-50);color:var(--gray-700);
  box-shadow:var(--shadow-sm);
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.badge-area .area-icon{font-size:22px;line-height:1}
.badge-area:hover{background:var(--brand-light);border-color:var(--brand-mid);color:var(--brand-dark);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.badge-area.active{
  border-color:var(--brand);background:var(--brand-light);
  color:var(--brand-dark);font-weight:600;
  box-shadow:0 0 0 3px rgba(79,70,229,.15),var(--shadow-md);
}

/* ── OPTION BADGES (pasos 2-4) ───────────────────────────────────── */
.badge{
  padding:12px 16px;border-radius:var(--radius-md);cursor:pointer;
  text-align:left;border:1.5px solid var(--gray-200);
  background:var(--gray-50);font-size:14px;font-weight:500;
  width:100%;transition:all .18s;position:relative;
  color:var(--gray-700);box-shadow:var(--shadow-sm);
  word-break:break-word;overflow-wrap:break-word;box-sizing:border-box;
}
.badge:hover{border-color:var(--brand-mid);background:var(--brand-light);color:var(--brand-dark);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.badge.active{
  border:2px solid var(--brand);background:var(--brand-light);
  color:var(--brand-dark);font-weight:600;
  box-shadow:0 0 0 3px rgba(79,70,229,.12),var(--shadow-md);
}
.badge-title{font-weight:600;margin-bottom:2px;color:inherit}
.badge-desc{font-size:12px;color:var(--gray-500);margin-top:3px;line-height:1.4}
.badge-hint{
  font-size:11px;color:var(--gray-500);margin-top:5px;
  font-style:italic;display:inline-flex;align-items:center;gap:3px;
}
.badge-hint.recommended{color:var(--green);font-weight:600}

/* ── CHIPS ───────────────────────────────────────────────────────── */
.chip{
  padding:8px 14px;border-radius:20px;cursor:pointer;font-size:13px;
  border:1.5px solid var(--gray-200);background:var(--gray-50);
  color:var(--gray-700);font-weight:500;transition:all .15s;
}
.chip:hover{border-color:var(--green-mid);background:var(--green-light);color:var(--green)}
.chip.active{
  border:2px solid var(--green);background:var(--green-light);
  color:var(--green);font-weight:600;
  box-shadow:0 0 0 3px rgba(5,150,105,.1);
}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}

/* ── HINTS ───────────────────────────────────────────────────────── */
.hint{
  background:var(--brand-light);border-radius:var(--radius-sm);
  padding:10px 14px;font-size:13px;color:var(--brand-dark);
  margin-top:6px;border:1px solid var(--brand-mid);
  display:block;line-height:1.6;
  word-break:break-word;overflow-wrap:break-word;
  width:100%;box-sizing:border-box;
}
.hint strong{font-weight:700;color:inherit}
.hint.warning{background:var(--amber-light);color:var(--amber);border-color:#FDE68A}
.hint.success{background:var(--green-light);color:var(--green);border-color:var(--green-mid)}

/* ── INPUTS ──────────────────────────────────────────────────────── */
input[type=text],textarea{
  width:100%;font-size:16px;padding:10px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--gray-200);font-family:var(--font);
  margin-top:6px;background:var(--gray-50);color:var(--gray-900);
  transition:all .2s;
}
input[type=text]:focus,textarea:focus{
  outline:none;border-color:var(--brand);background:#fff;
  box-shadow:0 0 0 3px rgba(79,70,229,.1);
}
textarea{min-height:70px;resize:vertical}
.otro-input{border-color:var(--brand)!important;background:#fff!important}

/* ── NAV BUTTONS ─────────────────────────────────────────────────── */
.nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:28px;padding-top:18px;border-top:1px solid var(--gray-100);
  gap:12px;
}
.btn{
  padding:11px 22px;border-radius:var(--radius-md);font-size:14px;
  cursor:pointer;font-family:var(--font);border:none;
  transition:all .2s;font-weight:600;letter-spacing:.1px;
}
.btn-back{
  border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-500);
}
.btn-back:hover{background:var(--gray-50);border-color:var(--gray-400);color:var(--gray-700)}
.btn-back:disabled{opacity:.35;cursor:not-allowed}
.btn-next{
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);
  color:#fff;padding:11px 28px;
  box-shadow:0 4px 14px rgba(79,70,229,.35);
}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,70,229,.4)}
.btn-next:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed;box-shadow:none;transform:none}

/* ── CONTENT AREA ────────────────────────────────────────────────── */
.content{min-height:280px}
.gap20{display:flex;flex-direction:column;gap:20px}

/* ── RESULT CARDS ────────────────────────────────────────────────── */
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.result-header p{font-size:13px;color:var(--gray-400);font-weight:500}
.result-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{
  padding:8px 14px;border-radius:var(--radius-sm);font-size:12px;
  cursor:pointer;font-family:var(--font);border:1.5px solid var(--gray-200);
  background:#fff;color:var(--gray-600);transition:all .15s;font-weight:600;
}
.btn-sm:hover{background:var(--gray-50);border-color:var(--gray-400)}
.btn-edit{border-color:var(--gray-200);color:var(--gray-600)}
.btn-regen{border-color:var(--brand-mid);color:var(--brand);background:var(--brand-light)}
.btn-regen:hover{background:var(--brand);color:#fff}
.btn-download{border-color:var(--green-mid);color:var(--green);background:var(--green-light)}
.btn-download:hover{background:var(--green);color:#fff}
.btn-download.loading{opacity:.6;pointer-events:none;cursor:wait}
.result-block{
  border-radius:var(--radius-md);padding:16px 18px;margin-bottom:12px;
  border:1px solid transparent;
}
.result-block-label{
  font-size:10px;font-weight:700;margin-bottom:8px;
  text-transform:uppercase;letter-spacing:1.2px;
}
.result-block p{font-size:15px;line-height:1.7;color:var(--gray-800)}
.result-block textarea{
  font-size:14px;padding:10px;border-radius:var(--radius-sm);
  min-height:70px;width:100%;border:1.5px solid rgba(0,0,0,.1);
  background:rgba(255,255,255,.6);font-family:var(--font);
}

/* ── SUMMARY ─────────────────────────────────────────────────────── */
.summary{
  margin-top:6px;padding:14px 18px;background:var(--gray-50);
  border-radius:var(--radius-md);border:1px solid var(--gray-200);
}
.summary p.title{font-size:11px;color:var(--gray-400);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.summary-grid p{font-size:12px;color:var(--gray-600);padding:4px 0}
.summary-grid span{color:var(--gray-400);font-weight:500}

/* ── LOADING ─────────────────────────────────────────────────────── */
.loading{text-align:center;padding:48px 0}
.loading .icon{font-size:36px;margin-bottom:14px;animation:pulse 1.5s ease-in-out infinite}
.loading p{color:var(--gray-400);font-size:14px;font-weight:500}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── GENERATE BOX ────────────────────────────────────────────────── */
.generate-box{text-align:center;padding:36px 0}
.generate-box p{margin-bottom:24px;font-size:15px;color:var(--gray-500);line-height:1.6}
.btn-generate{
  padding:14px 36px;border-radius:var(--radius-md);
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);
  color:#fff;border:none;font-size:15px;font-weight:700;
  cursor:pointer;font-family:var(--font);
  box-shadow:0 4px 18px rgba(79,70,229,.4);
  transition:all .2s;letter-spacing:.2px;
}
.btn-generate:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,70,229,.45)}

/* ── FOOTER ──────────────────────────────────────────────────────── */
.footer{
  text-align:center;margin-top:24px;padding-top:16px;
  border-top:1px solid var(--gray-100);font-size:12px;
  color:var(--gray-400);display:flex;justify-content:center;
  align-items:center;gap:8px;flex-wrap:wrap;
}
.footer strong{color:var(--brand)}
.footer a{color:var(--brand);text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}

/* ── NEXT STEPS ──────────────────────────────────────────────────── */
.next-steps{
  margin-top:16px;padding:18px;
  background:linear-gradient(135deg,#F0FDF4,#ECFDF5);
  border-radius:var(--radius-md);border:1px solid var(--green-mid);
}
.next-steps-title{font-size:14px;font-weight:700;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.next-steps ul{list-style:none;padding:0}
.next-steps li{padding:8px 0;font-size:13px;color:#065F46;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid rgba(5,150,105,.1)}
.next-steps li:last-child{border-bottom:none}
.next-steps li::before{content:"✓";color:var(--green);font-weight:700;font-size:14px;flex-shrink:0;margin-top:1px}

/* ── AUTO SAVE ───────────────────────────────────────────────────── */
.auto-save{
  position:fixed;bottom:20px;right:20px;background:#fff;
  border:1px solid var(--gray-200);padding:8px 14px;border-radius:20px;
  font-size:11px;color:var(--gray-500);font-family:var(--font);font-weight:600;
  box-shadow:var(--shadow-md);display:none;
}
.auto-save.show{display:flex;align-items:center;gap:6px;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── ERROR ───────────────────────────────────────────────────────── */
.error{color:var(--red);font-size:13px;font-weight:500}

/* ── TOUCH TARGETS BASE ──────────────────────────────────────────── */
.badge,.badge-area,.chip,.btn,.btn-sm,.btn-generate{
  min-height:44px;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

/* ── TABLET (≤768px) ─────────────────────────────────────────────── */
@media (max-width:768px){
  body{padding:12px 10px 32px}
  .card{padding:20px 16px;border-radius:var(--radius-lg)}
  h2{font-size:16px}
  .steps{gap:3px}
  .step-circle{width:26px;height:26px;font-size:11px}
  .step-line{width:10px}
  .grid2,.grid3{grid-template-columns:1fr;gap:10px}
  .badge-area{flex-direction:row;text-align:left;padding:12px 14px;gap:10px}
  .badge-area .area-icon{font-size:20px}
  .nav{flex-direction:column;gap:10px;margin-top:20px}
  .btn{width:100%;padding:14px 20px;font-size:15px}
  .btn-next{order:-1}
  .result-actions{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .btn-sm{padding:11px 8px;text-align:center;font-size:13px}
  .result-block p{font-size:14px}
  .summary-grid{grid-template-columns:1fr}
  .auto-save{bottom:12px;right:12px}
}

/* ── MÓVIL (≤480px) ──────────────────────────────────────────────── */
@media (max-width:480px){
  body{padding:8px 6px 28px}
  .card{padding:16px 14px;border-radius:var(--radius-md)}
  h2{font-size:15px}
  .steps{overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .result-actions{grid-template-columns:1fr}
  .btn-sm{width:100%;min-height:48px;font-size:14px}
  .result-block p{font-size:13px;line-height:1.7}
  .footer{font-size:11px}
}

/* ── MODAL DIAGRAMA ──────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.6);z-index:1000;
  display:flex;align-items:center;justify-content:center;
  padding:12px;box-sizing:border-box;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.modal-inner{
  background:#fff;border-radius:var(--radius-xl);padding:24px;
  width:100%;max-width:700px;
  box-shadow:0 32px 80px rgba(0,0,0,.25);
  max-height:92vh;overflow-y:auto;box-sizing:border-box;
  -webkit-overflow-scrolling:touch;
}
@media (max-width:480px){
  .modal-inner{padding:16px 14px;border-radius:var(--radius-lg);max-height:95vh}
}
</style>
</head>
<body>
<div class="card">
  <h2>Asistente para la creación de proyectos de investigación</h2>
  <div class="steps" id="steps-bar"></div>
  <p class="step-label" id="step-label"></p>
  <div class="content" id="content"></div>
  <div class="nav">
    <button class="btn btn-back" id="btn-back" onclick="prevStep()">Atras</button>
    <button class="btn btn-next" id="btn-next" onclick="nextStep()">Siguiente</button>
  </div>
  <div class="footer">
    Creado por: <strong>Alan A. Vega Jacome</strong>
    <span style="margin:0 8px;color:#ddd">·</span>
    <span style="color:#aaa">Powered by </span><a href="https://claude.ai" target="_blank" style="color:#534AB7;text-decoration:none;font-weight:500">Claude</a>
  </div>
</div>
<div class="auto-save" id="auto-save">💾 Progreso guardado</div>

<script>
const STEPS = ["Area","Poblacion","Problema","Metodologia","Contexto","Resultado"];

const AREAS = [
  {id:"clinica", label:"Psicologia clinica y salud mental", icon:"🧠"},
  {id:"educativa", label:"Psicologia educativa", icon:"📚"},
  {id:"organizacional", label:"Psicologia organizacional", icon:"🏢"},
  {id:"social", label:"Psicologia social y comunitaria", icon:"🤝"},
  {id:"deporte", label:"Psicologia del deporte", icon:"🏃"},
  {id:"consumidor", label:"Psicologia del consumidor", icon:"🛒"},
  {id:"juridica", label:"Psicologia juridica/forense", icon:"⚖️"},
  {id:"ambiental", label:"Psicologia ambiental", icon:"🌱"},
  {id:"positiva", label:"Psicologia positiva", icon:"✨"},
  {id:"pareja-familia", label:"Psicologia de pareja y familia", icon:"💑"},
  {id:"salud", label:"Psicologia de la salud", icon:"🏥"},
  {id:"desarrollo", label:"Psicologia del desarrollo", icon:"👶"},
  {id:"neuropsicologia", label:"Neuropsicologia", icon:"🧠"},

const POBLACIONES = {

  educativa:["Ninos de educacion inicial","Estudiantes de primaria","Estudiantes de secundaria","Estudiantes universitarios","Docentes"],
  organizacional:["Trabajadores de empresas privadas","Trabajadores del sector publico","Lideres / jefes","Emprendedores","Personal de salud"],

  desarrollo:["Ninos (0-5 anos)","Ninos (6-11 anos)","Adolescentes","Adultos emergentes (18-25)","Adultos mayores"],
  neuropsicologia:["Pacientes con dano cerebral","Adultos mayores","Ninos con dificultades","Pacientes neurologicos","Estudiantes"],
  adicciones:["Personas en rehabilitacion","Consumidores activos","Familias de adictos","Jovenes en riesgo","Adultos con adicciones conductuales"],
  digital:["Adolescentes usuarios de redes","Jovenes gamers","Usuarios de apps","Estudiantes","Trabajadores remotos"],
  emergencias:["Sobrevivientes de desastres","Primeros respondientes","Victimas de violencia","Comunidades afectadas","Personal de emergencias"],
  transcultural:["Migrantes","Estudiantes internacionales","Comunidades indigenas","Grupos etnicos","Familias multiculturales"],
  otro:[],

// GUARDAR ESTADO AUTOMÁTICAMENTE
function saveState() {
  try {
    localStorage.setItem('investigacion_state', JSON.stringify(state));
    showAutoSave();
  } catch(e) {}
}

function showAutoSave() {
  const el = document.getElementById('auto-save');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function efectiveArea(){return state.area==="otro"?state.areaOtro:AREAS.find(a=>a.id===state.area)?.label||"";}
function efectivePoblacion(){return state.poblacion==="otro"?state.poblacionOtro:state.poblacion;}
function efectiveProblema(){return state.problema==="otro"?state.problemaOtro:state.problema;}

function canNext(){
  const s=state.step;
  if(s===0){
    if(state.area==="otro") return state.areaOtro.trim()!=="";
    return state.area!=="";
  }
  if(s===1){
    if(state.poblacion==="otro") return state.poblacionOtro.trim()!=="";
    return state.poblacion!=="";
  }
  if(s===2){
    // Si problema es "otro", necesita problema especificado Y variables
    if(state.problema==="otro") {
      return state.problemaOtro.trim()!=="" && state.variablesOtro.trim()!=="";
    }
    // Si seleccionó "otro" en variables, necesita variables especificadas
    if(state.variables.includes('otro')) {
      return state.variables.length>0 && state.variablesOtro.trim()!=="";
    }
    // Caso normal: problema seleccionado y al menos una variable
    return state.problema!=="" && state.variables.length>0;
  }
  if(s===3){
    if(!state.enfoque || !state.nivel || !state.diseno) return false;
    // Si cuantitativo + correlacional o explicativo → técnica requerida
    if(state.enfoque==="Cuantitativo" && (state.nivel==="correlacional" || state.nivel==="explicativo")){
      return state.tecnica !== "";
    }
    return true;
  }
  if(s===4) return state.experiencia!=="" && state.viabilidad!=="";
  return true;
}

function badge(label, active, click){
  return `<button class="badge ${active?'active':''}" onclick="${click}">${label}</button>`;
}

function badgeWithDesc(title, desc, hint, active, click, recommended=false){
  const hintClass = recommended ? 'recommended' : '';
  return `<button class="badge ${active?'active':''}" onclick="${click}">
    <div class="badge-title">${title}</div>
    <div class="badge-desc">${desc}</div>
    ${hint ? `<div class="badge-hint ${hintClass}">${hint}</div>` : ''}
  </button>`;
}

function sectionLabel(t, tooltip=""){
  if(tooltip) {
    return `<p class="section-label">${t} <span class="tooltip"><span class="tooltip-icon">?</span><span class="tooltip-text">${tooltip}</span></span></p>`;
  }
  return `<p class="section-label">${t}</p>`;
}

function renderStepsBar(){
  let h="";
  STEPS.forEach((name,i)=>{
    const done=i<state.step;
    const active=i===state.step;
    const pending=i>state.step;
    let cls=done?"done":active?"active":"pending";
    h+=`<div class="step-circle ${cls}" onclick="${done?`state.step=${i};render()`:''}">${done?'✓':i+1}</div>`;
    if(i<STEPS.length-1){
      h+=`<div class="step-line ${done?'done':'pending'}"></div>`;
    }
  });
  document.getElementById("steps-bar").innerHTML=h;
  document.getElementById("step-label").textContent=`Paso ${state.step+1} de 6: ${STEPS[state.step]}`;
}

// SUGERENCIAS AUTOMÁTICAS
function getAutoSuggestion() {
  if(!state.enfoque || !state.variables.length) return "";
  
  const nv = state.variables.filter(v => v !== 'otro').length;
  const enfoque = state.enfoque.toLowerCase();
  
  // Validación: Cualitativo con muchas variables
  if(enfoque === "cualitativo" && nv >= 4) {
    return `<div class="hint warning">⚠️ Para enfoque cualitativo, usualmente se trabaja con menos variables (1-2) y se profundiza más en cada una. ¿Estás seguro de necesitar ${nv} variables?</div>`;
  }
  
  // Sugerencia automática según variables
  if(nv === 1) {
    return `<div class="hint success">💡 Con 1 variable → nivel descriptivo. Diseño recomendado: ${enfoque === 'cuantitativo' ? 'no experimental transversal' : 'estudio de caso'}.</div>`;
  }
  if(nv === 2) {
    return `<div class="hint success">💡 Con 2 variables → nivel correlacional. Diseño recomendado: ${enfoque === 'cuantitativo' ? 'no experimental transversal' : 'estudio de caso múltiple'}.</div>`;
  }
  if(nv >= 3 && enfoque === 'cuantitativo') {
    return `<div class="hint success">💡 Con ${nv} variables → nivel correlacional o explicativo. Diseño recomendado: no experimental transversal (o experimental si puedes manipular).</div>`;
  }
  
  return "";
}

function renderContent(){
  const el=document.getElementById("content");
  const s=state.step;

  if(s===0){
    let h=sectionLabel("¿Que area de la psicologia te interesa?");
    h+=`<div class="grid3">`;
    AREAS.forEach(a=>{
      h+=`<button class="badge-area ${state.area===a.id?'active':''}" onclick="selectArea('${a.id}')"><span class="area-icon">${a.icon}</span><span>${a.label}</span></button>`;
    });
    h+=`</div>`;
    if(state.area==="otro"){
      h+=`<input type="text" class="otro-input" placeholder="Especifica tu area" value="${state.areaOtro}" oninput="state.areaOtro=this.value;updateNav();saveState()"/>`;
    }
    el.innerHTML=h;
  }

  else if(s===1){
    let h=sectionLabel("¿Con que poblacion quieres trabajar?");
    const pobs=state.area&&state.area!=="otro"?POBLACIONES[state.area]:[];
    if(pobs.length>0){
      h+=`<div class="options">`;
      pobs.forEach(p=>{
        const esc=p.replace(/'/g,"\\'");
        h+=badge(p, state.poblacion===p, `selectPoblacion('${esc}')`);
      });
      h+=badge("Otro", state.poblacion==="otro", `selectPoblacion('otro')`);
      h+=`</div>`;
    } else {
      h+=`<div class="options">`;
      h+=badge("Otro", state.poblacion==="otro", `selectPoblacion('otro')`);
      h+=`</div>`;
    }
    if(state.poblacion==="otro"){
      h+=`<input type="text" class="otro-input" placeholder="Especifica tu poblacion" value="${state.poblacionOtro}" oninput="state.poblacionOtro=this.value;updateNav();saveState()"/>`;
    }
    el.innerHTML=h;
  }

  else if(s===2){
    let h=sectionLabel("¿Que problema o fenomeno quieres investigar?");
    const probs=state.area&&state.area!=="otro"?PROBLEMAS[state.area]:[];
    if(probs.length>0){
      h+=`<div class="options">`;
      probs.forEach(p=>{
        const esc=p.replace(/'/g,"\\'");
        h+=badge(p, state.problema===p, `selectProblema('${esc}')`);
      });
      h+=badge("Otro", state.problema==="otro", `selectProblema('otro')`);
      h+=`</div>`;
    } else {
      h+=`<div class="options">`;
      h+=badge("Otro", state.problema==="otro", `selectProblema('otro')`);
      h+=`</div>`;
    }
    if(state.problema==="otro"){
      h+=`<input type="text" class="otro-input" placeholder="Especifica tu problema/fenomeno" value="${state.problemaOtro}" oninput="state.problemaOtro=this.value;updateNav();saveState()" onblur="renderContent()" onkeypress="if(event.key==='Enter'){renderContent()}"/>`;
    }
    
    // Mostrar campo de variables solo si ya confirmó el problema (tiene al menos 3 caracteres Y no está vacío después de trim)
    const problemaConfirmado = state.problema === "otro" && state.problemaOtro.trim().length >= 3;
    const mostrarVariables = (state.problema && state.problema !== "otro") || problemaConfirmado;
    
    if(mostrarVariables){
      h+=sectionLabel("¿Que variables quieres estudiar?");
      const vars=state.problema!=="otro"&&VARIABLES[state.problema]?VARIABLES[state.problema]:[];
      if(vars.length>0){
        h+=`<div class="chips">`;
        vars.forEach(v=>{
          const esc=v.replace(/'/g,"\\'");
          h+=`<button class="chip ${state.variables.includes(v)?'active':''}" onclick="toggleVar('${esc}')">${v}</button>`;
        });
        h+=`<button class="chip ${state.variables.includes('otro')?'active':''}" onclick="toggleVar('otro')">Otro</button>`;
        h+=`</div>`;
        const nv=state.variables.filter(v => v !== 'otro').length;
        if(nv>0&&NIVEL_HINT[nv]){
          h+=`<div class="hint">${NIVEL_HINT[nv]}</div>`;
        }
        if(state.variables.includes('otro')){
          h+=`<input type="text" class="otro-input" placeholder="Especifica tus variables separadas por comas" value="${state.variablesOtro}" oninput="state.variablesOtro=this.value;updateNav();saveState()"/>`;
        }
      } else {
        h+=`<textarea placeholder="Escribe las variables separadas por comas (Ej: Identidad comunitaria, Cohesion social, Participacion)" oninput="state.variablesOtro=this.value;setVarsFromText(this.value);saveState()">${state.variablesOtro}</textarea>`;
      }
    }
    el.innerHTML=h;
  }

  else if(s===3){
    let h=`<div class="gap20">`;

    // ── Enfoque ───────────────────────────────────────────────────
    h+=sectionLabel("¿Que enfoque metodologico prefieres?");
    h+=`<div class="options">`;
    ENFOQUES.forEach(e=>{
      let desc="";
      if(e==="Cuantitativo") desc="Números, estadísticas, medición objetiva";
      if(e==="Cualitativo")  desc="Experiencias, significados, profundidad";
      if(e==="Mixto")        desc="Combina métodos cuantitativos y cualitativos";
      h+=badgeWithDesc(e, desc, null, state.enfoque===e, `selectEnfoque('${e}')`);
    });
    h+=`</div>`;

    // ── Nivel ─────────────────────────────────────────────────────
    if(state.enfoque){
      h+=sectionLabel("¿Que nivel de investigacion buscas?", "El nivel indica qué tan profundo quieres llegar: explorar un tema nuevo, describirlo, buscar relaciones entre variables, o explicar causas.");
      h+=`<div class="options">`;
      NIVELES.forEach(n=>{
        const esc=n.id.replace(/'/g,"\'");
        h+=badgeWithDesc(n.label, n.desc, n.hint, state.nivel===n.id, `selectNivel('${esc}')`);
      });
      h+=`</div>`;
    }

    // ── Diseño (estrategia de recolección) ────────────────────────
    if(state.enfoque && state.nivel){
      h+=sectionLabel("¿Que diseño de investigacion utilizarás?", "El diseño es la estrategia de recolección: cómo y cuándo obtendrás los datos (experimental, observacional, longitudinal, etc.)");
      const enfoqueKey = state.enfoque.toLowerCase();
      const disenosDisponibles = DISENOS[enfoqueKey] || [];
      h+=`<div class="options">`;
      disenosDisponibles.forEach(d=>{
        const esc=d.id.replace(/'/g,"\'");
        h+=badgeWithDesc(d.label, d.desc, d.hint, state.diseno===d.id, `selectDiseno('${esc}')`);
      });
      h+=`</div>`;
    }

    // ── Técnica de análisis ───────────────────────────────────────
    // Solo aparece: cuantitativo + (correlacional o explicativo) + diseño seleccionado
    const mostrarTecnica = state.enfoque==="Cuantitativo" &&
                           (state.nivel==="correlacional" || state.nivel==="explicativo") &&
                           state.diseno !== "";

    if(mostrarTecnica){
      const tecnicasDisponibles = TECNICAS[state.nivel] || [];
      h+=sectionLabel("¿Qué técnica de análisis estadístico planeas usar?",
        "La técnica define cómo analizarás los datos. Solo aparecen opciones coherentes con tu nivel de investigación.");
      if(state.nivel==="correlacional"){
        h+=`<div class="hint">📌 Nivel correlacional: estas técnicas miden asociaciones entre variables, no establecen causalidad.</div>`;
      } else {
        h+=`<div class="hint">📌 Nivel explicativo: puedes modelar relaciones causales. Las opciones SEM son de uso avanzado (posgrado).</div>`;
      }
      h+=`<div class="options">`;
      tecnicasDisponibles.forEach(t=>{
        const esc=t.id.replace(/'/g,"\'");
        h+=badgeWithDesc(t.label, t.desc, t.hint, state.tecnica===t.id, `selectTecnica('${esc}')`);
      });
      h+=`</div>`;
    }

    // ── Nota para niveles sin técnica avanzada ────────────────────
    if(state.enfoque==="Cuantitativo" &&
       (state.nivel==="exploratorio" || state.nivel==="descriptivo") &&
       state.diseno){
      h+=`<div class="hint success">✅ Para nivel ${state.nivel} se usan estadísticos descriptivos (frecuencias, medias, dispersión). No se requieren técnicas avanzadas.</div>`;
    }

    h+=getAutoSuggestion();
    h+=`</div>`;
    el.innerHTML=h;
  }
  else if(s===4){
    let h=`<div class="gap20">`;
    h+=sectionLabel("¿Cuanta experiencia tienes con este tema o poblacion?");
    h+=`<div class="options">`;
    EXPERIENCIAS.forEach(e=>{
      const esc=e.replace(/'/g,"\\'");
      h+=badge(e, state.experiencia===e, `state.experiencia='${esc}';updateNav();renderContent();saveState()`);
    });
    h+=`</div>`;
    h+=sectionLabel("¿Tienes acceso a la poblacion que quieres estudiar?");
    h+=`<div class="options">`;
    VIABILIDADES.forEach(v=>{
      const esc=v.replace(/'/g,"\\'");
      h+=badge(v, state.viabilidad===v, `state.viabilidad='${esc}';updateNav();renderContent();saveState()`);
    });
    h+=`</div>`;
    h+=sectionLabel("¿En que contexto realizarias tu investigacion? — opcional");
    h+=`<textarea placeholder="Ej: Lima, en un colegio privado..." oninput="state.contexto=this.value;saveState()">${state.contexto}</textarea>`;
    h+=sectionLabel("¿Por que te interesa este tema? — opcional");
    h+=`<textarea placeholder="Ej: Lo observe en mi practica pre-profesional..." oninput="state.motivacion=this.value;saveState()">${state.motivacion}</textarea>`;
    h+=`</div>`;
    el.innerHTML=h;
  }

  else if(s===5){
    if(state.loading){
      el.innerHTML=`<div class="loading"><div class="icon">⏳</div><p>Generando tu propuesta de investigacion...</p></div>`;
      return;
    }
    if(!state.result){
      el.innerHTML=`<div class="generate-box"><p>Todo listo! Con tus respuestas generaremos un tema, pregunta de investigacion y objetivo general. Podras ajustarlos a tu criterio.</p><button class="btn-generate" onclick="generate()">Generar propuesta</button></div>`;
      return;
    }
    
    let errorMsg = "";
    if(state.result.error){
      errorMsg = `<div style="padding:20px;background:#FEF3E8;border:1px solid #F59E0B;border-radius:8px;margin-bottom:20px">
        <p style="color:#B45309;font-size:14px;line-height:1.6;margin:0">${state.result.error}</p>
      </div>`;
    }
    
    const fields=[
      {key:"tema", label:"Tema de investigacion", color:"#534AB7", bg:"#EEEDFE"},
      {key:"pregunta", label:"Pregunta de investigacion", color:"#0F6E56", bg:"#E1F5EE"},
      {key:"objetivo", label:"Objetivo general", color:"#993C1D", bg:"#FAECE7"},
      {key:"hipotesis", label: state.enfoque === "Cuantitativo" ? "Hipotesis de investigacion" : state.enfoque === "Cualitativo" ? "Hipotesis de trabajo" : "Hipotesis", color:"#7C3AED", bg:"#F3E8FF"},
    ];
    let h= errorMsg + `<div class="result-header"><p>Puedes editar los resultados directamente</p><div class="result-actions">`;
    h+=`<button class="btn-sm btn-edit" onclick="toggleEdit()">${state.editMode?"Ver resultado":"Editar"}</button>`;
    h+=`<button class="btn-sm btn-regen" onclick="generate()">Regenerar</button>`;
    h+=`<button class="btn-sm btn-download" onclick="downloadDoc()">📥 Descargar DOCX</button>`;
    // Mostrar diagrama según técnica seleccionada (no el diseño)
    const tecnicaParaDiagrama = ['regresion-multiple','mediacion','moderacion',
      'mediacion-moderada','path-analysis','sem-mediacion','sem-moderacion','sem-completo'];
    if(tecnicaParaDiagrama.includes(state.tecnica)) {
      h+=`<button class="btn-sm" onclick="showModelDiagram()" style="border-color:#7C3AED;color:#7C3AED">📊 Ver modelo teórico</button>`;
    }
    h+=`<button class="btn-sm btn-nuevo" onclick="nuevoProyecto()" style="border-color:#dc2626;color:#dc2626">🔄 Nuevo proyecto</button>`;
    h+=`</div></div>`;
    fields.forEach(f=>{
      h+=`<div class="result-block" style="background:${f.bg}">`;
      h+=`<p class="result-block-label" style="color:${f.color}">${f.label}</p>`;
      if(state.editMode){
        const esc=state.edited[f.key].replace(/"/g,"&quot;");
        h+=`<textarea style="border:1px solid ${f.color}" oninput="state.edited.${f.key}=this.value;saveState()">${state.edited[f.key]}</textarea>`;
      } else {
        h+=`<p>${state.edited[f.key]}</p>`;
      }
      h+=`</div>`;
    });
    h+=`<div class="summary"><p class="title">Resumen de tu perfil metodologico</p><div class="summary-grid">`;
    const nivelLabel = NIVELES.find(n => n.id === state.nivel)?.label || state.nivel;
    const enfoqueKey = state.enfoque.toLowerCase();
    const disenoObj = DISENOS[enfoqueKey]?.find(d => d.id === state.diseno);
    const disenoLabel = disenoObj?.label || state.diseno;
    
    let variablesDisplay = state.variables.filter(v => v !== 'otro');
    if(state.variables.includes('otro') && state.variablesOtro.trim()) {
      const otrasVars = state.variablesOtro.split(',').map(v => v.trim()).filter(Boolean);
      variablesDisplay = variablesDisplay.concat(otrasVars);
    }
    
    [["Area",efectiveArea()],["Poblacion",efectivePoblacion()],["Problema",efectiveProblema()],
     ["Variables",variablesDisplay.join(", ")],["Enfoque",state.enfoque],["Nivel",nivelLabel],["Diseño",disenoLabel],["Técnica",state.tecnica?(TECNICAS[state.nivel]?.find(t=>t.id===state.tecnica)?.label||state.tecnica):"N/A (descriptiva)"]].forEach(([k,v])=>{
      h+=`<p><span>${k}:</span> ${v}</p>`;
    });
    h+=`</div></div>`;

    // PRÓXIMOS PASOS
    h+=`<div class="next-steps">
      <div class="next-steps-title">🎯 Próximos pasos para tu proyecto</div>
      <ul>
        <li><strong>Justificación:</strong> Explica por qué es importante investigar este tema (relevancia teórica, práctica y social)</li>
        <li><strong>Marco teórico:</strong> Busca 5-10 artículos recientes (últimos 5 años) sobre tu tema en Google Académico, Redalyc o SciELO</li>
        <li><strong>Metodología:</strong> Define tu muestra, instrumentos de medición y procedimiento de recolección</li>
        <li><strong>Cronograma:</strong> Establece tiempos realistas para cada fase de tu investigación</li>
      </ul>
    </div>`;
    
    el.innerHTML=h;
  }
}

function updateNav(){
  document.getElementById("btn-back").disabled=state.step===0;
  const nb=document.getElementById("btn-next");
  nb.disabled=!canNext();
  nb.style.display=state.step===5?"none":"block";
}

function render(){
  renderStepsBar();
  renderContent();
  updateNav();
}

function nextStep(){if(canNext()&&state.step<5){state.step++;render();saveState();}}
function prevStep(){if(state.step>0){state.step--;render();saveState();}}

function selectArea(v){state.area=v;state.areaOtro="";state.poblacion="";state.poblacionOtro="";state.problema="";state.problemaOtro="";state.variables=[];updateNav();renderContent();saveState();}
function selectPoblacion(v){state.poblacion=v;state.poblacionOtro="";updateNav();renderContent();saveState();}
function selectProblema(v){state.problema=v;state.problemaOtro="";state.variables=[];state.variablesOtro="";updateNav();renderContent();saveState();}
function selectEnfoque(v){state.enfoque=v;state.nivel="";state.diseno="";updateNav();renderContent();saveState();}
function selectNivel(v){state.nivel=v;state.diseno='';state.tecnica='';updateNav();renderContent();saveState();}
function selectDiseno(v){state.diseno=v;state.tecnica="";updateNav();renderContent();saveState();}
function selectTecnica(v){state.tecnica=v;updateNav();renderContent();saveState();}

function toggleVar(v){
  const i=state.variables.indexOf(v);
  if(i>-1) state.variables.splice(i,1); else state.variables.push(v);
  updateNav();renderContent();saveState();
}
function setVarsFromText(val){
  const vars = val.split(",").map(v=>v.trim()).filter(Boolean);
  state.variables = vars;
  state.variablesOtro = val;
  updateNav();
}
function toggleEdit(){state.editMode=!state.editMode;renderContent();}

function nuevoProyecto(){
  if(confirm('¿Estás seguro de que quieres empezar un nuevo proyecto? Se perderá toda la información actual.')){
    // Limpiar localStorage
    localStorage.removeItem('investigacion_state');
    
    // Reiniciar estado
    state = {
      step:0,
      area:"",
      areaOtro:"",
      poblacion:"",
      poblacionOtro:"",
      problema:"",
      problemaOtro:"",
      variables:[],
      variablesOtro:"",
      enfoque:"",
      nivel:"",
      diseno:"",
      tecnica:"",
      experiencia:"",
      viabilidad:"",
      contexto:"",
      motivacion:"",
      result:null,
      loading:false,
      editMode:false,
      edited:{tema:"",pregunta:"",objetivo:"",hipotesis:""}
    };
    
    // Volver al inicio
    render();
  }
}

async function generate(){
  state.loading=true;state.result=null;renderContent();
  
  let variablesList = state.variables.filter(v => v !== 'otro');
  if(state.variables.includes('otro') && state.variablesOtro.trim()) {
    const otrasVars = state.variablesOtro.split(',').map(v => v.trim()).filter(Boolean);
    variablesList = variablesList.concat(otrasVars);
  }
  
  const nv = variablesList.length;
  const nivelLabel = NIVELES.find(n => n.id === state.nivel)?.label || state.nivel;
  const enfoqueKey = state.enfoque.toLowerCase();
  const disenoObj = DISENOS[enfoqueKey]?.find(d => d.id === state.diseno);
  const disenoLabel = disenoObj?.label || state.diseno;
  
  const prompt=`Eres un experto en metodologia de la investigacion en psicologia (Hernandez, Fernandez y Baptista, 2014; Hernandez y Mendoza, 2018).
Un estudiante de 9no ciclo de Psicologia respondio:
- Area: ${efectiveArea()}
- Poblacion: ${efectivePoblacion()}
- Problema/fenomeno: ${efectiveProblema()}
- Variables seleccionadas (${nv}): ${variablesList.join(", ")}
- Enfoque metodologico: ${state.enfoque}
- Nivel de investigacion: ${nivelLabel}
- Diseño de investigacion: ${disenoLabel}
- Técnica de análisis: ${state.tecnica ? (TECNICAS[state.nivel]?.find(t=>t.id===state.tecnica)?.label || state.tecnica) : 'No especificada'}
- Experiencia previa: ${state.experiencia}
- Viabilidad de acceso: ${state.viabilidad}
- Contexto: ${state.contexto||"No especificado"}
- Motivacion: ${state.motivacion||"No especificada"}

Genera:
1. TEMA DE INVESTIGACION delimitado (max 15 palabras), claro, coherente con el nivel y diseño, viable para pregrado.
2. PREGUNTA DE INVESTIGACION principal (interrogativa, coherente con enfoque, nivel, diseño y variables).
3. OBJETIVO GENERAL (verbo en infinitivo coherente con la pregunta, nivel y diseño; medible y alcanzable).
4. ${state.enfoque === "Cuantitativo" ? "HIPOTESIS DE INVESTIGACION: Enunciado afirmativo y específico que predice la relación entre las variables (ej: 'Existe una relación positiva entre X e Y en...')" : state.enfoque === "Cualitativo" ? "HIPOTESIS DE TRABAJO: Supuesto tentativo y flexible sobre el fenómeno (ej: 'Las experiencias de X influyen en...'). Si el nivel es exploratorio puro, usa: 'Se busca comprender...'" : "HIPOTESIS: Según tu diseño mixto, formula una hipótesis predictiva o tentativa"}

IMPORTANTE: Debes generar las 4 elementos. La hipótesis es OBLIGATORIA.

Responde SOLO en JSON exacto sin texto adicional ni markdown:
{"tema":"...","pregunta":"...","objetivo":"...","hipotesis":"..."}`;

  try{
    // Llamar a la API de Claude (requiere backend configurado)
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})
    });
    
    if (!res.ok) {
      throw new Error(`Error ${res.status}: La API no está disponible. Verifica que el servidor backend esté corriendo.`);
    }
    
    const data=await res.json();
    const text=data.content?.map(b=>b.text||"").join("")||"";
    const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
    
    // Asegurar que hipótesis existe
    if(!parsed.hipotesis) {
      if(state.enfoque === "Cuantitativo") {
        parsed.hipotesis = "Existe una relación significativa entre las variables seleccionadas.";
      } else if(state.enfoque === "Cualitativo") {
        parsed.hipotesis = "Se espera identificar patrones emergentes relacionados con el fenómeno de estudio.";
      } else {
        parsed.hipotesis = "Se plantean supuestos iniciales que guiarán la investigación mixta.";
      }
    }
    
    state.result=parsed;
    state.edited={...parsed};
    saveState();
  }catch(e){
    console.error("Error completo:", e);
    
    // Generar propuesta de ejemplo si falla la API
    const ejemploTema = `${efectiveProblema()} en ${efectivePoblacion()} - ${efectiveArea()}`;
    const ejemploPregunta = state.enfoque === "Cuantitativo" 
      ? `¿Cuál es la relación entre ${variablesList[0] || 'las variables'} y ${variablesList[1] || 'el fenómeno'} en ${efectivePoblacion()}?`
      : `¿Cómo se manifiesta ${efectiveProblema()} en las experiencias de ${efectivePoblacion()}?`;
    const ejemploObjetivo = state.enfoque === "Cuantitativo"
      ? `Determinar la relación entre ${variablesList.slice(0,2).join(' y ')} en ${efectivePoblacion()}.`
      : `Comprender el fenómeno de ${efectiveProblema()} en ${efectivePoblacion()}.`;
    const ejemploHipotesis = state.enfoque === "Cuantitativo"
      ? `Existe una relación positiva entre ${variablesList[0] || 'las variables seleccionadas'} y ${variablesList[1] || 'el fenómeno de estudio'} en ${efectivePoblacion()}.`
      : `Las experiencias de ${efectivePoblacion()} en relación a ${efectiveProblema()} están influenciadas por factores contextuales y personales.`;
    
    state.result={
      tema: ejemploTema.substring(0, 100),
      pregunta: ejemploPregunta,
      objetivo: ejemploObjetivo,
      hipotesis: ejemploHipotesis,
      error: `⚠️ API no disponible. Se generó un ejemplo basado en tus selecciones. IMPORTANTE: Debes configurar el backend (/api/chat) para usar la generación con IA. Mientras tanto, edita manualmente este ejemplo.`
    };
    state.edited={...state.result};
    delete state.edited.error;
    saveState();
  }
  state.loading=false;
  renderContent();
}

// ── HELPER: SVG → PNG ArrayBuffer via Canvas ─────────────────────
async function svgToPngBuffer(svgString, width=600, height=300) {
  return new Promise((resolve, reject) => {
    const canvas = document.createElement('canvas');
    canvas.width = width * 2; // retina
    canvas.height = height * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.fillStyle = '#fafafa';
    ctx.fillRect(0, 0, width, height);
    const img = new Image();
    const blob = new Blob([svgString], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      ctx.drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(url);
      canvas.toBlob(b => {
        b.arrayBuffer().then(resolve).catch(reject);
      }, 'image/png');
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('SVG load failed')); };
    img.src = url;
  });
}

// ── BUILD DIAGRAM SVG STRING (reutiliza lógica de showModelDiagram) ──
function buildDiagramSVG() {
  if(!DISENOS_CON_DIAGRAMA.includes(state.tecnica)) return null;
  // Ejecuta showModelDiagram en modo "silencioso" para obtener el SVG
  // Primero guardamos el último SVG generado
  if(window._lastDiagramSVG) return window._lastDiagramSVG;
  // Si no existe, generamos uno nuevo sin mostrar el modal
  showModelDiagram();
  const modal = document.getElementById('modal-diagram');
  if(modal) modal.remove(); // cerramos inmediatamente
  return window._lastDiagramSVG || null;
}

// ── SVG helpers ───────────────────────────────────────────────────────
function svgBox(x, y, w, h, label, stroke, fill, fontSize=11) {
  const words = label.split(' ');
  let lines = [], cur = '';
  words.forEach(wd => {
    const test = cur ? cur + ' ' + wd : wd;
    if (test.length > 17 && cur) { lines.push(cur); cur = wd; }
    else cur = test;
  });
  if (cur) lines.push(cur);
  lines = lines.slice(0, 2);
  const lh = 15, totalH = lines.length * lh;
  const startY = y + h/2 - totalH/2 + lh*0.75;
  const rects = `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="9" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
  const texts = lines.map((l,i) => `<text x="${x+w/2}" y="${startY+i*lh}" text-anchor="middle" font-size="${fontSize}" font-weight="600" fill="${stroke}" font-family="system-ui,sans-serif">${l}</text>`).join('');
  return rects + texts;
}

function svgEllipse(cx, cy, rx, ry, label, stroke, fill, fontSize=11) {
  const lines = label.length > 14 ? [label.substring(0,14), label.substring(14)] : [label];
  const lh = 15, startY = cy - (lines.length-1)*lh/2;
  return `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
    ${lines.map((l,i)=>`<text x="${cx}" y="${startY+i*lh}" text-anchor="middle" dominant-baseline="middle" font-size="${fontSize}" font-weight="700" fill="${stroke}" font-family="system-ui,sans-serif">${l}</text>`).join('')}`;
}

function svgArrow(x1,y1,x2,y2,color,label='',dashed=false,curved=false) {
  const id = 'ar'+Math.abs(x1*100+y1*10+x2+y2)|0;
  const marker = `<marker id="${id}" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 z" fill="${color}"/></marker>`;
  const dash = dashed ? 'stroke-dasharray="6,3"' : '';
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  let path;
  if(curved) {
    const cpx = mx, cpy = Math.min(y1,y2) - 50;
    path = `<path d="M${x1},${y1} Q${cpx},${cpy} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="2" ${dash} marker-end="url(#${id})"/>`;
  } else {
    path = `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="2" ${dash} marker-end="url(#${id})"/>`;
  }
  const lbl = label ? `<rect x="${mx-26}" y="${my-10}" width="52" height="16" rx="3" fill="white" opacity="0.92"/><text x="${mx}" y="${my+4}" text-anchor="middle" font-size="10" fill="${color}" font-weight="600" font-family="system-ui,sans-serif">${label}</text>` : '';
  return `<defs>${marker}</defs>${path}${lbl}`;
}

    // Indicadores ξ
    svg += svgBox(5, 55, 90, 34, 'x₁', DC.lat.s, '#F8FAFF', 10);
    svg += svgBox(5, 200, 90, 34, 'x₂', DC.lat.s, '#F8FAFF', 10);
    svg += svgArrow(95, 72, 110, 115, DC.lat.s, 'λ₁');
    svg += svgArrow(95, 217, 110, 170, DC.lat.s, 'λ₂');
    // Indicadores η₁
    svg += svgBox(240, 15, 90, 30, 'm₁', DC.m.s, '#F0FDF8', 10);
    svg += svgArrow(285, 45, 290, 55, DC.m.s, 'λ₃');
    // Indicadores η₂
    svg += svgBox(505, 55, 88, 32, 'y₁', DC.y.s, '#FFF8F5', 10);
    svg += svgBox(505, 195, 88, 32, 'y₂', DC.y.s, '#FFF8F5', 10);
    svg += svgArrow(505, 71, 500, 118, DC.y.s, 'λ₄');
    svg += svgArrow(505, 211, 500, 170, DC.y.s, 'λ₅');
    // Rutas estructurales
    svg += svgArrow(190, 145, 225, 100, DC.m.s, 'a');
    svg += svgArrow(375, 95, 415, 130, DC.m.s, 'b');
    svg += svgArrow(190, 155, 415, 155, DC.lat.s, "c'", true);
    svg += `<text x="${W/2}" y="${H-3}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">Efecto indirecto = a×b (bootstrapping)</text>`;
  }

  // ── SEM MODERACIÓN CON LATENTES ─────────────────────────────────────
  else if(d === 'sem-moderacion') {
    titulo = 'SEM — Moderación con Variables Latentes';
    nivel = 'Posgrado · Software: Mplus (LMS), lavaan (modsem)';
    nota = 'Se estima la interacción entre dos latentes (ξ₁ × ξ₂). Técnicas: LMS (Mplus) o PI (indicadores de producto). Mayor complejidad que moderación por regresión.';
    const X=vars[0]||'ξ₁ (X latente)', W=vars[1]||'ξ₂ (Moderador)', Y=vars[2]||'η (Y latente)';
    svg += svgEllipse(110, 100, 85, 38, X.substring(0,14), DC.lat.s, DC.lat.f);
    svg += svgEllipse(110, 210, 85, 38, W.substring(0,14), DC.w.s, DC.w.f);
    svg += svgEllipse(470, 150, 90, 42, Y.substring(0,14), DC.y.s, DC.y.f);
    // Interaction latent
    svg += svgEllipse(300, 150, 80, 34, 'ξ₁ × ξ₂', '#B45309', '#FEF3E8');
    svg += svgArrow(195, 108, 225, 135, DC.lat.s, 'γ₁');
    svg += svgArrow(195, 202, 225, 165, DC.w.s, 'γ₂');
    svg += svgArrow(380, 150, 383, 150, '#B45309', 'γ₃ (interac.)');
    svg += `<rect x="${W/2-130}" y="${H-32}" width="260" height="20" rx="4" fill="#FEF3E8" stroke="#B45309" stroke-width="1"/>`;
    svg += `<text x="${W/2}" y="${H-18}" text-anchor="middle" font-size="9" fill="#B45309" font-family="system-ui">γ₃ significativo → moderación entre latentes confirmada</text>`;
  }

  // ── SEM COMPLETO ─────────────────────────────────────────────────────
  else if(d === 'sem-completo') {
    titulo = 'SEM — Modelo Estructural Completo';
    nivel = 'Posgrado · Software: AMOS, Mplus, lavaan';
    nota = 'Incluye modelo de medición (CFA) y modelo estructural. Se reportan índices de ajuste: CFI ≥ .95, TLI ≥ .95, RMSEA ≤ .06, SRMR ≤ .08.';
    const v=[...vars]; while(v.length<4) v.push(`η${v.length}`);
    // CFA bloques
    svg += `<rect x="10" y="10" width="130" height="${H-20}" rx="8" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="5,3"/>`;
    svg += `<text x="75" y="26" text-anchor="middle" font-size="9" fill="#1D4ED8" font-family="system-ui" font-weight="600">MODELO DE MEDICIÓN</text>`;
    svg += svgEllipse(75, 90, 52, 30, 'ξ₁', DC.lat.s, 'white', 13);
    svg += svgEllipse(75, 180, 52, 30, 'ξ₂', DC.lat.s, 'white', 13);
    svg += svgBox(18, 55, 45, 24, 'x₁x₂', DC.lat.s, '#F8FAFF', 9);
    svg += svgBox(18, 155, 45, 24, 'x₃x₄', DC.lat.s, '#F8FAFF', 9);
    svg += svgArrow(63, 70, 63, 67, DC.lat.s, '');
    svg += svgArrow(63, 162, 63, 160, DC.lat.s, '');
    // Structural
    svg += `<rect x="155" y="10" width="290" height="${H-20}" rx="8" fill="#F0FDF4" stroke="#0F6E56" stroke-width="1" stroke-dasharray="5,3"/>`;
    svg += `<text x="300" y="26" text-anchor="middle" font-size="9" fill="#0F6E56" font-family="system-ui" font-weight="600">MODELO ESTRUCTURAL</text>`;
    svg += svgEllipse(210, 90, 45, 28, 'ξ₁', DC.lat.s, DC.lat.f, 12);
    svg += svgEllipse(210, 195, 45, 28, 'ξ₂', DC.lat.s, DC.lat.f, 12);
    svg += svgEllipse(310, 140, 50, 30, 'η₁', DC.m.s, DC.m.f, 12);
    svg += svgEllipse(415, 140, 50, 30, 'η₂', DC.y.s, DC.y.f, 12);
    svg += svgArrow(127, 90, 168, 90, DC.lat.s, '');
    svg += svgArrow(127, 180, 168, 190, DC.lat.s, '');
    svg += svgArrow(255, 95, 268, 120, DC.lat.s, 'γ₁');
    svg += svgArrow(255, 188, 268, 155, DC.lat.s, 'γ₂');
    svg += svgArrow(360, 140, 368, 140, DC.m.s, 'β');
    // Output CFA
    svg += `<rect x="458" y="10" width="132" height="${H-20}" rx="8" fill="#FFF8F5" stroke="#993C1D" stroke-width="1" stroke-dasharray="5,3"/>`;
    svg += `<text x="524" y="26" text-anchor="middle" font-size="9" fill="#993C1D" font-family="system-ui" font-weight="600">INDICADORES Y</text>`;
    svg += svgEllipse(524, 90, 50, 28, 'η₂', DC.y.s, DC.y.f, 12);
    svg += svgBox(478, 150, 45, 24, 'y₁y₂', DC.y.s, '#FFF8F5', 9);
    svg += svgBox(535, 150, 45, 24, 'y₃y₄', DC.y.s, '#FFF8F5', 9);
    svg += svgArrow(465, 140, 468, 140, DC.y.s, '');
    svg += svgArrow(465, 100, 524, 68, DC.y.s, '');
    svg += `<text x="${W/2}" y="${H-3}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">CFI≥.95 · TLI≥.95 · RMSEA≤.06 · SRMR≤.08</text>`;
  }

  // Modal
  const badgeColor = ['path-analysis','sem-mediacion','sem-moderacion','sem-completo'].includes(d) ? '#1D4ED8' : '#0F6E56';
  const badgeLabel = ['path-analysis','sem-mediacion','sem-moderacion','sem-completo'].includes(d) ? 'Posgrado' : 'Pregrado';

  const modalHtml = `
    <div id="modal-diagram" class="modal-overlay" onclick="if(event.target===this)this.remove()">
      <div class="modal-inner">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:12px">
          <div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${badgeColor}18;color:${badgeColor};border:1px solid ${badgeColor}40">${badgeLabel}</span>
              <span style="font-size:11px;color:#888">${nivel}</span>
            </div>
            <h3 style="font-size:15px;font-weight:700;color:#111;margin:0">${titulo}</h3>
          </div>
          <button onclick="document.getElementById('modal-diagram').remove()" style="border:none;background:#f5f5f5;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;flex-shrink:0">✕</button>
        </div>
        <p style="font-size:12px;color:#666;margin:0 0 14px;line-height:1.5">${nota}</p>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;border:1px solid #eee;border-radius:10px;background:#fafafa" xmlns="http://www.w3.org/2000/svg">
          ${svg}
        </svg>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px">
          <p style="font-size:11px;color:#bbb;margin:0">Generado según diseño metodológico seleccionado</p>
          <button onclick="downloadDiagram()" style="padding:12px 20px;border-radius:8px;border:1.5px solid #534AB7;color:#534AB7;background:transparent;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;min-height:44px;touch-action:manipulation">📥 Descargar SVG</button>
        </div>
      </div>
    </div>`;

  document.body.insertAdjacentHTML('beforeend', modalHtml);
  window._lastDiagramSVG = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:#fafafa">${svg}</svg>`;
}

function downloadDiagram() {
  const blob = new Blob([window._lastDiagramSVG], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='modelo_teorico.svg'; a.click();
  URL.revokeObjectURL(url);
}


render();
</script>
</body>
</html>
