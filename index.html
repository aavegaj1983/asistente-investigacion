    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%) rotate(-35deg);
    font-size:52pt; font-weight:800; letter-spacing:6px;
    color:rgba(79,70,229,0.07); text-transform:uppercase;
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    white-space:nowrap; pointer-events:none;
    z-index:0; user-select:none;
  }
  .watermark-logo {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:220px; height:auto;
    opacity:0.045; pointer-events:none;
    z-index:0; user-select:none;
  }

  /* Header */
  .page-header { display:flex; justify-content:space-between; align-items:center;
    padding-bottom:10px; margin-bottom:24px; border-bottom:2px solid #E5E7EB; }
  .header-logo { height:36px; }
  .header-right { font-size:9pt; color:#9CA3AF; }

  /* Cover page */
  .cover-page { text-align:center; min-height:80vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:40px 20px;
    border-bottom:2px solid #E5E7EB; margin-bottom:30px; }
  .doc-title { font-size:20pt; font-weight:800; color:#1E1B4B; text-transform:uppercase;
    letter-spacing:.5px; margin-bottom:10px; }
  .doc-area { font-size:12pt; color:#4F46E5; font-weight:600; margin-bottom:6px; }
  .doc-sub { font-size:9pt; color:#9CA3AF; font-style:italic; margin-bottom:40px; }
  .cover-titulo-label { font-size:9pt; font-weight:700; color:#374151; text-transform:uppercase;
    letter-spacing:.6px; margin-bottom:10px; margin-top:30px; }
  .cover-titulo { font-size:16pt; font-weight:700; color:#111827; line-height:1.4;
    max-width:80%; }
  .page-break-before { page-break-before:always; }
  @media print { .cover-page { min-height:0; } }

  /* Sections */
  .section { margin-bottom:20px; }
  h2 { font-size:10pt; font-weight:700; color:#4F46E5; text-transform:uppercase; letter-spacing:.5px;
    border-bottom:1.5px solid #4F46E5; padding-bottom:4px; margin-bottom:12px; }
  h2.green { color:#059669; border-color:#059669; }
  h2.amber { color:#D97706; border-color:#D97706; }
  h2.purple { color:#7C3AED; border-color:#7C3AED; }

  /* Fields */
  .field { margin-bottom:12px; }
  .field-label { font-size:9pt; font-weight:700; color:#374151; text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
  .field-value { font-size:10.5pt; line-height:1.7; color:#111827; }

  /* Diagram */
  .diagram-box { margin:16px 0; padding:12px; background:#F8FAFF; border:1px solid #C7D2FE; border-radius:8px; }
  .diagram-caption { font-size:8.5pt; color:#4F46E5; font-weight:600; text-align:center; margin-top:8px; }
  .diagram-box svg { width:100%; height:auto; display:block; }

  /* Table */
  table { width:100%; border-collapse:collapse; font-size:9.5pt; margin-bottom:4px; }
  td { padding:5px 8px; border:1px solid #E5E7EB; }
  td:first-child { background:#EEF2FF; font-weight:600; color:#4F46E5; width:32%; }

  /* Lists */
  ol { padding-left:20px; display:flex; flex-direction:column; gap:10px; }
  ol li { line-height:1.7; }
  .steps-list { list-style:decimal; padding-left:20px; }
  .steps-list li { margin-bottom:8px; line-height:1.65; }

  /* Refs */
  .ref-item { margin-bottom:8px; padding-left:20px; text-indent:-20px; font-size:9.5pt; line-height:1.6; }
  .ref-note { color:#7C3AED; font-style:italic; font-size:8.5pt; text-indent:0; padding-left:0; margin-top:2px; }
  .ref-cat { font-weight:700; color:#7C3AED; font-size:9pt; text-transform:uppercase; margin:10px 0 4px; }
  .warn-box { background:#FEF2F2; border-left:3px solid #DC2626; padding:6px 10px; font-size:8.5pt;
    color:#DC2626; font-weight:600; margin-bottom:10px; }

  /* Footer */
  .page-footer { text-align:center; font-size:8pt; color:#D1D5DB; margin-top:30px;
    padding-top:10px; border-top:1px solid #F3F4F6; }
  .print-btn { position:fixed; bottom:24px; right:24px; background:#4F46E5; color:#fff;
    border:none; padding:12px 24px; border-radius:10px; font-size:14px; font-weight:600;
    cursor:pointer; box-shadow:0 4px 20px rgba(79,70,229,.4); font-family:inherit; }
</style>
</head>

// ── DOCX GENERATOR — sin librerías externas ─────────────────────
// Genera un .docx real usando ZIP + Open XML directamente en el browser

// Returns diagram title based on current tecnica
function titulo_diagrama() {
  const map = {
    'regresion-simple':   'Modelo de Regresión Simple',
    'regresion-multiple': 'Modelo de Regresión Múltiple',
    'mediacion':          'Modelo de Mediación Simple',
    'moderacion':         'Modelo de Moderación Simple',
    'mediacion-moderada': 'Modelo de Mediación Moderada',
    'path-analysis':      'Diagrama de Rutas (Path Analysis)',
    'sem-mediacion':      'SEM — Mediación con Variables Latentes',
    'sem-moderacion':     'SEM — Moderación con Variables Latentes',
    'sem-completo':       'SEM — Modelo Estructural Completo',
  };
  return map[state.tecnica] || 'Modelo Teórico';
}

async function downloadDoc() {
  const btn = document.querySelector('.btn-download');
  if(btn){ btn.classList.add('loading'); btn.innerHTML='⏳ Generando...'; }

  try {
    // ── Datos ─────────────────────────────────────────────────────
    const nivelLabel  = NIVELES.find(n=>n.id===state.nivel)?.label || state.nivel;
    const enfoqueKey  = state.enfoque.toLowerCase();
    const disenoObj   = DISENOS[enfoqueKey]?.find(d=>d.id===state.diseno);
    const disenoLabel = disenoObj?.label || state.diseno;
    const tecnicaLabel = state.tecnica
      ? (TECNICAS[state.nivel]?.find(t=>t.id===state.tecnica)?.label || state.tecnica)
      : state.enfoque === 'Cualitativo'
        ? `Análisis ${disenoLabel}`
        : state.enfoque === 'Mixto'
          ? `Análisis mixto (${disenoLabel})`
          : 'Estadística descriptiva';
    let vars = state.variables.filter(v=>v!=='otro');
    if(state.variables.includes('otro')&&state.variablesOtro.trim())
      state.variablesOtro.split(',').map(v=>v.trim()).filter(Boolean).forEach(v=>vars.push(v));
    const hipLabel = state.enfoque==="Cuantitativo"?"HIPÓTESIS DE INVESTIGACIÓN"
                   : state.enfoque==="Cualitativo" ?"SUPUESTOS DE INVESTIGACIÓN":"HIPÓTESIS";

    // ── Escapar XML ───────────────────────────────────────────────
    const xe = s => {
      // Normalize special chars that break Word XML rendering
      const normalized = (s||'')
        .replace(/[\u2018\u2019]/g, "'")   // smart single quotes → '
        .replace(/[\u201C\u201D]/g, '"')   // smart double quotes → "
        .replace(/\u2013/g, '-')            // en dash → -
        .replace(/\u2014/g, '--')           // em dash → --
        .replace(/\u2026/g, '...')          // ellipsis → ...
        .replace(/\u00B0/g, 'grados')      // degree symbol
        .replace(/[\u0080-\u009F]/g, '')   // strip control chars
        .replace(/<[^>]+>/g, '');           // strip any HTML tags
      return normalized
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    };

    // ── Helpers Open XML ─────────────────────────────────────────
    const heading = (text, color='4F46E5') =>
      `<w:p><w:pPr><w:spacing w:before="320" w:after="120"/>
        <w:pBdr><w:bottom w:val="single" w:sz="8" w:space="1" w:color="${color}"/></w:pBdr></w:pPr>
        <w:r><w:rPr><w:b/><w:sz w:val="26"/><w:color w:val="${color}"/><w:caps/></w:rPr>
          <w:t>${xe(text)}</w:t></w:r></w:p>`;

    const fieldLabel = (text) =>
      `<w:p><w:pPr><w:spacing w:before="240" w:after="60"/></w:pPr>
        <w:r><w:rPr><w:b/><w:sz w:val="20"/><w:color w:val="4F46E5"/><w:caps/></w:rPr>
          <w:t>${xe(text)}</w:t></w:r></w:p>`;

    const cleanSep = (t) => (t||'').split('|||PARRAFO|||').join(' ');
    const fieldValue = (text) =>
      `<w:p><w:pPr><w:ind w:left="240"/><w:spacing w:after="120"/></w:pPr>
        <w:r><w:rPr><w:sz w:val="22"/><w:color w:val="111827"/></w:rPr>
          <w:t xml:space="preserve">${xe(cleanSep(text)||'—')}</w:t></w:r></w:p>`;

    const tableRow = (label, value, shade=true) =>
      `<w:tr>
        <w:tc><w:tcPr><w:tcW w:w="2000" w:type="dxa"/>
          ${shade?'<w:shd w:val="clear" w:color="auto" w:fill="EEF2FF"/>':''}
        </w:tcPr>
          <w:p><w:r><w:rPr><w:b/><w:sz w:val="18"/><w:color w:val="4F46E5"/></w:rPr>
            <w:t>${xe(label)}</w:t></w:r></w:p></w:tc>
        <w:tc><w:tcPr><w:tcW w:w="5000" w:type="dxa"/></w:tcPr>
          <w:p><w:r><w:rPr><w:sz w:val="18"/><w:color w:val="111827"/></w:rPr>
            <w:t xml:space="preserve">${xe(value||'—')}</w:t></w:r></w:p></w:tc>
      </w:tr>`;

    const stepItem = (num, text) =>
      `<w:p><w:pPr><w:ind w:left="240"/><w:spacing w:before="120" w:after="60"/></w:pPr>
        <w:r><w:rPr><w:b/><w:sz w:val="20"/><w:color w:val="D97706"/></w:rPr>
          <w:t xml:space="preserve">${num}.  </w:t></w:r>
        <w:r><w:rPr><w:sz w:val="20"/><w:color w:val="111827"/></w:rPr>
          <w:t>${xe(text)}</w:t></w:r></w:p>`;

    const emptyPara = (before=200) =>
      `<w:p><w:pPr><w:spacing w:before="${before}" w:after="0"/></w:pPr></w:p>`;

    // ── Section numbers fixed per spec ──────────────────────────
    // 1.Elementos  2.Perfil(+diagrama si aplica)  3.Pasos  4.Técnicas(opt)  5.Referencias

    // ── Imagen del diagrama ───────────────────────────────────────
    const tecnicasConDiagrama = ['regresion-multiple','mediacion','moderacion',
      'mediacion-moderada','path-analysis','sem-mediacion','sem-moderacion','sem-completo'];
    let imageRels = '';
    let imageXml  = '';
    let imageBytes = null;

    if(tecnicasConDiagrama.includes(state.tecnica)){
      try {
        // Siempre generar SVG fresco — no depender de si el modal fue abierto antes
        window._lastDiagramSVG = null; // forzar regeneración
        showModelDiagram();
        document.getElementById('modal-diagram')?.remove();
        const svgStr = window._lastDiagramSVG;

        if(svgStr && svgStr.length > 50){
          // Convertir SVG a PNG via Canvas
          imageBytes = await svgToBase64Png(svgStr, 600, 300);

          if(imageBytes && imageBytes.byteLength > 100){
            imageRels = `<Relationship Id="rId10" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/diagram.png"/>`;
            imageXml  = `
              ${heading('2.1 MODELO TEÓRICO PROPUESTO','059669')}
              <w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="160" w:after="80"/></w:pPr>
                <w:r>
                  <w:drawing>
                    <wp:inline xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" distT="0" distB="0" distL="0" distR="0">
                      <wp:extent cx="5486400" cy="2743200"/>
                      <wp:docPr id="1" name="ModeloDiagrama"/>
                      <a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">
                        <a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">
                          <pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">
                            <pic:nvPicPr>
                              <pic:cNvPr id="1" name="ModeloDiagrama"/>
                              <pic:cNvPicPr/>
                            </pic:nvPicPr>
                            <pic:blipFill>
                              <a:blip r:embed="rId10" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/>
                              <a:stretch><a:fillRect/></a:stretch>
                            </pic:blipFill>
                            <pic:spPr>
                              <a:xfrm><a:off x="0" y="0"/><a:ext cx="5486400" cy="2743200"/></a:xfrm>
                              <a:prstGeom prst="rect"><a:avLst/></a:prstGeom>
                            </pic:spPr>
                          </pic:pic>
                        </a:graphicData>
                      </a:graphic>
                    </wp:inline>
                  </w:drawing>
                </w:r>
              </w:p>
              <w:p><w:pPr><w:jc w:val="center"/><w:spacing w:after="160"/></w:pPr>
                <w:r><w:rPr><w:i/><w:sz w:val="16"/><w:color w:val="9CA3AF"/></w:rPr>
                  <w:t>Figura 1. ${xe(titulo_diagrama())}. Técnica: ${xe(tecnicaLabel)}</w:t></w:r></w:p>`;
          } else {
            // PNG falló pero tenemos SVG — incluir nota
            imageXml = `
              ${heading('2.1 MODELO TEÓRICO PROPUESTO','059669')}
              <w:p><w:pPr><w:ind w:left="240"/><w:spacing w:after="120"/></w:pPr>
                <w:r><w:rPr><w:sz w:val="20"/><w:color w:val="374151"/><w:i/></w:rPr>
                  <w:t>Ver diagrama en la aplicación web: ${xe(tecnicaLabel)}. El diagrama no pudo incluirse como imagen en este dispositivo.</w:t></w:r></w:p>`;
          }
        }
      } catch(e){
        console.warn('Diagram generation failed:', e.message);
        imageXml = `
          ${heading('2.1 MODELO TEÓRICO PROPUESTO','059669')}
          <w:p><w:pPr><w:ind w:left="240"/><w:spacing w:after="120"/></w:pPr>
            <w:r><w:rPr><w:sz w:val="20"/><w:color w:val="374151"/><w:i/></w:rPr>
              <w:t>Ver diagrama en la aplicación web usando el botón "Ver modelo teórico". Técnica: ${xe(tecnicaLabel)}</w:t></w:r></w:p>`;
      }
    }

    // ── Instrumentos sugeridos por variable ─────────────────────
    // Usa INSTRUMENTOS_DATA global y findInstrumento()

    // Find instruments for selected variables
    const instrXml_list = vars.map(v => {
      let instr = findInstrumento(v);
      if(!instr) return null;
      return `
        ${tableRow(xe(v), xe(instr.nombre))}`;
    }).filter(Boolean);

    // Combine static instruments + AI-generated instruments for PDF
    const aiInstrList = (state.aiInstruments && state.aiInstruments.length > 0) ? state.aiInstruments : [];

    const instrDetailXml = vars.map(v => {
      // First try static bank
      let instr = findInstrumento(v);
      if(instr) {
        return `
        ${fieldLabel('Variable: '+v)}
        <w:p><w:pPr><w:ind w:left="240"/><w:spacing w:after="40"/></w:pPr>
          <w:r><w:rPr><w:b/><w:sz w:val="19"/><w:color w:val="059669"/></w:rPr><w:t>Instrumento: </w:t></w:r>
          <w:r><w:rPr><w:sz w:val="19"/><w:color w:val="111827"/></w:rPr><w:t>${xe(instr.nombre)}</w:t></w:r></w:p>
        <w:p><w:pPr><w:ind w:left="240"/><w:spacing w:after="40"/></w:pPr>
          <w:r><w:rPr><w:sz w:val="18"/><w:color w:val="6B7280"/></w:rPr><w:t>Formato: ${xe(instr.items)}</w:t></w:r></w:p>
        <w:p><w:pPr><w:ind w:left="240"/><w:spacing w:after="120"/></w:pPr>
          <w:r><w:rPr><w:i/><w:sz w:val="18"/><w:color w:val="6B7280"/></w:rPr><w:t>Ejemplo: "${xe(instr.ejemplo)}"</w:t></w:r></w:p>`;
      }
      // Try AI-generated instruments — include ALL instruments for this variable
      const aiInstrs = aiInstrList.filter(i => i.variable && i.variable.toLowerCase().trim() === v.toLowerCase().trim());
      if(aiInstrs.length > 0) {
        const varLabel = state.enfoque==='Cualitativo' ? 'Categoría: ' : 'Variable: ';
        const instrLabel = state.enfoque==='Cualitativo' ? 'Técnica/Guion: ' : 'Instrumento: ';
        return fieldLabel(varLabel+v) +
          aiInstrs.map((aiInstr, idx) => {
            const optLabel = aiInstrs.length > 1 ? ' (Opción '+(idx+1)+')' : '';
            return `
        <w:p><w:pPr><w:ind w:left="240"/><w:spacing w:after="40"/></w:pPr>
          <w:r><w:rPr><w:b/><w:sz w:val="19"/><w:color w:val="059669"/></w:rPr><w:t>${xe(instrLabel+optLabel+' ')}</w:t></w:r>
          <w:r><w:rPr><w:sz w:val="19"/><w:color w:val="111827"/></w:rPr><w:t>${xe(aiInstr.instrumento||'')}</w:t></w:r></w:p>
        ${aiInstr.autores ? `<w:p><w:pPr><w:ind w:left="240"/><w:spacing w:after="40"/></w:pPr>
          <w:r><w:rPr><w:sz w:val="18"/><w:color w:val="6B7280"/></w:rPr><w:t>Autores: ${xe(aiInstr.autores)}</w:t></w:r></w:p>` : ''}
        ${aiInstr.descripcion ? `<w:p><w:pPr><w:ind w:left="240"/><w:spacing w:after="40"/></w:pPr>
          <w:r><w:rPr><w:sz w:val="18"/><w:color w:val="6B7280"/></w:rPr><w:t>${xe(aiInstr.descripcion)}</w:t></w:r></w:p>` : ''}
        ${aiInstr.nota_peru ? `<w:p><w:pPr><w:ind w:left="240"/><w:spacing w:after="120"/></w:pPr>
          <w:r><w:rPr><w:i/><w:sz w:val="18"/><w:color w:val="059669"/></w:rPr><w:t>🇵🇪 ${xe(aiInstr.nota_peru)}</w:t></w:r></w:p>` : '<w:p><w:pPr><w:spacing w:after="60"/></w:pPr></w:p>'}`;
          }).join('');
      }
      return '';
    }).join('');

    const hasInstruments = instrDetailXml.trim().length > 0;

    // ── Section numbers (continued — secN already has 2+diagram+pasos) ─
    // secPasos already set from early calculation above
    const secInstr  = hasInstruments ? (++secN) : 0;
    const secRefs   = ++secN;


    // Build summary table: variable → instrument name (static + AI)
    const allInstrRows = vars.map(v => {
      const staticI = findInstrumento(v);
      if(staticI) return tableRow(xe(v), xe(staticI.nombre));
      const aiI = aiInstrList.find(i => i.variable && i.variable.toLowerCase().trim() === v.toLowerCase().trim());
      if(aiI) return tableRow(xe(v), xe(aiI.instrumento||''));
      return null;
    }).filter(Boolean);
    const instrResumenTable = allInstrRows.length > 0 ? `
      <w:tbl>
        <w:tblPr><w:tblW w:w="7000" w:type="dxa"/>
          <w:tblBorders>
            <w:top w:val="single" w:sz="4" w:color="DDD6FE"/>
            <w:left w:val="single" w:sz="4" w:color="DDD6FE"/>
            <w:bottom w:val="single" w:sz="4" w:color="DDD6FE"/>
            <w:right w:val="single" w:sz="4" w:color="DDD6FE"/>
            <w:insideH w:val="single" w:sz="4" w:color="DDD6FE"/>
            <w:insideV w:val="single" w:sz="4" w:color="DDD6FE"/>
          </w:tblBorders>
        </w:tblPr>
        ${tableRow(state.enfoque==='Cualitativo'?'Categoría':'Variable', 'Instrumento / Técnica')}
        ${allInstrRows.join('')}
      </w:tbl>
      ${emptyPara(80)}` : '';

    const instrSectionXml = hasInstruments ? `
      ${heading(secInstr+'. TÉCNICAS E INSTRUMENTOS DE RECOLECCIÓN','7C3AED')}
      <w:p><w:pPr><w:ind w:left="0"/><w:spacing w:after="120"/></w:pPr>
        <w:r><w:rPr><w:sz w:val="20"/><w:color w:val="374151"/></w:rPr>
          <w:t>Los siguientes instrumentos han sido identificados para las variables del proyecto. Verifique disponibilidad y propiedades psicométricas para su contexto específico antes de aplicar.</w:t></w:r></w:p>
      ${instrResumenTable}
      ${instrDetailXml}` : '';
    const nextN = secPasos;

    // ── Referencias bibliográficas XML ──────────────────────────
    const refItem = (cita, nota) => {
      const citaClean = cita.replace(/<em>/g,'').replace(/<\/em>/g,'').replace(/&amp;/g,'&');
      const citaXe = xe(citaClean);
      const notaXe = nota ? xe(nota) : '';
      return `
        <w:p><w:pPr><w:ind w:left="360" w:hanging="360"/><w:spacing w:before="100" w:after="40"/></w:pPr>
          <w:r><w:rPr><w:sz w:val="18"/><w:color w:val="374151"/></w:rPr>
            <w:t xml:space="preserve">${citaXe}</w:t></w:r></w:p>
        ${nota ? `<w:p><w:pPr><w:ind w:left="360"/><w:spacing w:after="120"/></w:pPr>
          <w:r><w:rPr><w:i/><w:sz w:val="16"/><w:color w:val="9CA3AF"/></w:rPr>
            <w:t xml:space="preserve">${notaXe}</w:t></w:r></w:p>` : ''}`;
    };

    // AI thematic references for DOCX
    const aiRefItemXml = (ref) => {
      const apaClean = xe(ref.apa || '');
      const relev = ref.relevancia ? xe('→ ' + ref.relevancia) : '';
      return `
        <w:p><w:pPr><w:ind w:left="360" w:hanging="360"/><w:spacing w:before="100" w:after="40"/></w:pPr>
          <w:r><w:rPr><w:sz w:val="18"/><w:color w:val="374151"/></w:rPr>
            <w:t xml:space="preserve">${apaClean}</w:t></w:r></w:p>
        ${relev ? `<w:p><w:pPr><w:ind w:left="360"/><w:spacing w:after="80"/></w:pPr>
          <w:r><w:rPr><w:i/><w:sz w:val="16"/><w:color w:val="7C3AED"/></w:rPr>
            <w:t xml:space="preserve">${relev}</w:t></w:r></w:p>` : ''}`;
    };

    const aiRefsSection = (state.aiReferencias && state.aiReferencias.length > 0) ? (() => {
      let cats = [...new Set(state.aiReferencias.map(r => r.categoria).filter(Boolean))];
      let xml = `
        ${emptyPara(160)}
        ${heading((secRefs+1)+'. REFERENCIAS TEMÁTICAS SUGERIDAS POR IA','7C3AED')}
        <w:p><w:pPr><w:spacing w:after="120"/></w:pPr>
          <w:r><w:rPr><w:sz w:val="19"/><w:color w:val="374151"/></w:rPr>
            <w:t>Referencias organizadas por categoría según las variables y población del proyecto. Cite en formato APA 7ª edición.</w:t></w:r></w:p><w:p><w:pPr><w:spacing w:after="120"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="18"/><w:color w:val="DC2626"/></w:rPr><w:t>IMPORTANTE: Verifique CADA referencia en SCOPUS o Google Scholar — la IA puede generar datos incorrectos.</w:t></w:r></w:p>`;
      cats.forEach(cat => {
        xml += `
          <w:p><w:pPr><w:spacing w:before="200" w:after="80"/></w:pPr>
            <w:r><w:rPr><w:b/><w:sz w:val="20"/><w:color w:val="7C3AED"/></w:rPr>
              <w:t>${xe(cat)}</w:t></w:r></w:p>`;
        state.aiReferencias.filter(r => r.categoria === cat).forEach(r => {
          xml += aiRefItemXml(r);
        });
      });
      return xml;
    })() : '';

    const refsXml = `
      ${emptyPara(200)}
      ${heading(secRefs+'. REFERENCIAS METODOLÓGICAS','4F46E5')}
      <w:p><w:pPr><w:spacing w:after="120"/></w:pPr>
        <w:r><w:rPr><w:sz w:val="19"/><w:color w:val="374151"/></w:rPr>
          <w:t>Las siguientes referencias sustentan el marco metodológico del proyecto de investigación.</w:t></w:r></w:p>
      ${getRefsFiltradas().map(r => refItem(r.cita, r.nota)).join('')}
      ${aiRefsSection}`;

    // Sin logo — Word no puede cargar imágenes desde ZIP generado en browser

    // ── document.xml ─────────────────────────────────────────────
    const docXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<w:body>
  <w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="0" w:after="60"/></w:pPr>
    <w:r><w:rPr><w:rFonts w:ascii="Plus Jakarta Sans" w:hAnsi="Plus Jakarta Sans"/><w:b/><w:sz w:val="36"/><w:color w:val="1E1B4B"/><w:caps/></w:rPr>
      <w:t>PROPUESTA DE PROYECTO DE INVESTIGACIÓN</w:t></w:r></w:p>
  <w:p><w:pPr><w:jc w:val="center"/><w:spacing w:after="60"/></w:pPr>

// ── ZIP builder (sin librerías) ───────────────────────────────────
async function buildZip(files, pngBytes) {
  // Use fflate if available, otherwise simple store-only ZIP
  const entries = [];
  const enc = new TextEncoder();

  const crc32 = (buf) => {
    let c=0xFFFFFFFF;
    const t=new Uint8Array(256).map((_,i)=>{let n=i;for(let k=0;k<8;k++)n=n&1?(0xEDB88320^(n>>>1)):(n>>>1);return n;});
    for(let i=0;i<buf.length;i++)c=t[(c^buf[i])&0xFF]^(c>>>8);
    return (c^0xFFFFFFFF)>>>0;
  };

  const u32le=(n)=>{const b=new Uint8Array(4);new DataView(b.buffer).setUint32(0,n,true);return b;};
  const u16le=(n)=>{const b=new Uint8Array(2);new DataView(b.buffer).setUint16(0,n,true);return b;};

  // Add text files
  for(const [name, content] of Object.entries(files)){
    const nameBytes = enc.encode(name);
    const data = enc.encode(content);
    const crc  = crc32(data);
    entries.push({name:nameBytes, data, crc, size:data.length});
  }

  // Add PNG image if provided
  if(pngBytes){
    const nameBytes = enc.encode('word/media/diagram.png');
    const data = new Uint8Array(pngBytes);
    const crc  = crc32(data);
    entries.push({name:nameBytes, data, crc, size:data.length});
  }


  // Build ZIP
  const localHeaders = [];
  let offset = 0;
  const parts = [];

  for(const e of entries){
    const lh = new Uint8Array([
      0x50,0x4B,0x03,0x04, // signature
      20,0,                 // version needed
      0,0,                  // flags
      0,0,                  // compression (stored)
      0,0,0,0,              // mod time/date
      ...u32le(e.crc),
      ...u32le(e.size),
      ...u32le(e.size),
      ...u16le(e.name.length),
      0,0,                  // extra len
    ]);
    localHeaders.push({offset, nameLen:e.name.length, crc:e.crc, size:e.size, name:e.name});
    parts.push(lh, e.name, e.data);
    offset += lh.length + e.name.length + e.size;
  }

  // Central directory
  const cdParts = [];
  let cdSize = 0;
  for(let i=0;i<entries.length;i++){
    const e=entries[i], lh=localHeaders[i];
    const cd = new Uint8Array([
      0x50,0x4B,0x01,0x02, // signature
      20,0,20,0,            // version made/needed
      0,0,0,0,              // flags, compression
      0,0,0,0,              // mod time/date
      ...u32le(e.crc),
      ...u32le(e.size),
      ...u32le(e.size),
      ...u16le(e.name.length),
      0,0,0,0,0,0,          // extra, comment, disk
      0,0,                  // internal attr
      0,0,0,0,              // external attr
      ...u32le(lh.offset),
    ]);
    cdParts.push(cd, e.name);
    cdSize += cd.length + e.name.length;
  }

  // End of central directory
  const eocd = new Uint8Array([
    0x50,0x4B,0x05,0x06, // signature
    0,0,0,0,              // disk numbers
    ...u16le(entries.length),
    ...u16le(entries.length),
    ...u32le(cdSize),
    ...u32le(offset),
    0,0,                  // comment len
  ]);

  // Concatenate all parts
  const allParts = [...parts, ...cdParts, eocd];
  const totalSize = allParts.reduce((s,p)=>s+p.length, 0);
  const result = new Uint8Array(totalSize);
  let pos = 0;
  for(const p of allParts){ result.set(p, pos); pos += p.length; }
  return result.buffer;
}

// ── SVG → PNG via Canvas ──────────────────────────────────────────
async function svgToBase64Png(svgStr, w=600, h=300) {
  return new Promise((resolve, reject) => {
    const canvas = document.createElement('canvas');
    canvas.width = w*2; canvas.height = h*2;
    const ctx = canvas.getContext('2d');
    if(!ctx){ reject(new Error('Canvas not supported')); return; }
    ctx.scale(2,2);
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,w,h);

    // Encode SVG as data URI to avoid CORS/tainted canvas issues
    const svgClean = svgStr
      .replace(/&/g,'&amp;')
      .replace(/<br>/g,'<br/>')
      // Ensure proper XML namespace
      .replace('<svg ', '<svg xmlns="http://www.w3.org/2000/svg" ');
    const encoded = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);

    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob(b => {
          if(!b){ reject(new Error('toBlob returned null')); return; }
          b.arrayBuffer().then(resolve).catch(reject);
        }, 'image/png', 0.95);
      } catch(e) {
        reject(new Error('Canvas draw failed: ' + e.message));
      }
    };
    img.onerror = () => reject(new Error('SVG image load failed'));
    img.src = encoded;
  });
}

// ── SVG helpers ───────────────────────────────────────────────────────
function svgBox(x, y, w, h, label, stroke, fill, fontSize=11) {
  const words = label.split(' ');
  let lines = [], cur = '';
  words.forEach(wd => {
    const test = cur ? cur + ' ' + wd : wd;
    if (test.length > 17 && cur) { lines.push(cur); cur = wd; }
    else cur = test;
  });
  if (cur) lines.push(cur);
  lines = lines.slice(0, 2);
  const lh = 15, totalH = lines.length * lh;
  const startY = y + h/2 - totalH/2 + lh*0.75;
  const rects = `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="9" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
  const texts = lines.map((l,i) => `<text x="${x+w/2}" y="${startY+i*lh}" text-anchor="middle" font-size="${fontSize}" font-weight="600" fill="${stroke}" font-family="system-ui,sans-serif">${l}</text>`).join('');
  return rects + texts;
}

function svgEllipse(cx, cy, rx, ry, label, stroke, fill, fontSize=11) {
  const lines = label.length > 14 ? [label.substring(0,14), label.substring(14)] : [label];
  const lh = 15, startY = cy - (lines.length-1)*lh/2;
  return `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
    ${lines.map((l,i)=>`<text x="${cx}" y="${startY+i*lh}" text-anchor="middle" dominant-baseline="middle" font-size="${fontSize}" font-weight="700" fill="${stroke}" font-family="system-ui,sans-serif">${l}</text>`).join('')}`;
}

function svgArrow(x1,y1,x2,y2,color,label='',dashed=false,curved=false) {
  const id = 'ar'+Math.abs(x1*100+y1*10+x2+y2)|0;
  const marker = `<marker id="${id}" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 z" fill="${color}"/></marker>`;
  const dash = dashed ? 'stroke-dasharray="6,3"' : '';
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  let path;
  if(curved) {
    const cpx = mx, cpy = Math.min(y1,y2) - 50;
    path = `<path d="M${x1},${y1} Q${cpx},${cpy} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="2" ${dash} marker-end="url(#${id})"/>`;
  } else {
    path = `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="2" ${dash} marker-end="url(#${id})"/>`;
  }
  const lbl = label ? `<rect x="${mx-26}" y="${my-10}" width="52" height="16" rx="3" fill="white" opacity="0.92"/><text x="${mx}" y="${my+4}" text-anchor="middle" font-size="10" fill="${color}" font-weight="600" font-family="system-ui,sans-serif">${label}</text>` : '';
  return `<defs>${marker}</defs>${path}${lbl}`;
}

function showModelDiagram() {
  const vars = getVarsList();
  const d = state.tecnica;
  const W=580, H=290;
  let svg='', titulo='', nota='', nivel='';

  // ── Shared helpers ────────────────────────────────────────────
  const f = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Truncate label to fit in box
  const trunc = (s, n=16) => s.length > n ? s.substring(0,n-1)+'…' : s;

  // Box with 1-2 line label
  function box(x,y,w,h,label,sc,fc,fs=11){
    const words = trunc(label,20).split(' ');
    let L1='', L2='';
    for(const w of words){
      if((L1+' '+w).trim().length<=16) L1=(L1+' '+w).trim();
      else { L2=(L2+' '+w).trim(); }
    }
    const tY = L2 ? y+h/2-7 : y+h/2+4;
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="${fc}" stroke="${sc}" stroke-width="2"/>
      <text x="${x+w/2}" y="${tY}" text-anchor="middle" font-size="${fs}" font-weight="600" fill="${sc}" font-family="system-ui,sans-serif">${f(L1)}</text>
      ${L2?`<text x="${x+w/2}" y="${tY+14}" text-anchor="middle" font-size="${fs}" font-weight="600" fill="${sc}" font-family="system-ui,sans-serif">${f(L2)}</text>`:''}`;
  }

  // Ellipse with label
  function ellipse(cx,cy,rx,ry,label,sc,fc,fs=11){
    const t = trunc(label,18);
    return `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${fc}" stroke="${sc}" stroke-width="2"/>
      <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="${fs}" font-weight="700" fill="${sc}" font-family="system-ui,sans-serif">${f(t)}</text>`;
  }

  // Arrow with label
  function arrow(x1,y1,x2,y2,sc,lbl='',dashed=false){
    const id='ar'+((x1*7+y1*13+x2*5+y2*3)&0xFFFF);
    const mk=`<marker id="${id}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="${sc}"/></marker>`;
    const dash=dashed?'stroke-dasharray="6,3"':'';
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const line=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${sc}" stroke-width="2" ${dash} marker-end="url(#${id})"/>`;
    const tag=lbl?`<rect x="${mx-22}" y="${my-9}" width="44" height="16" rx="3" fill="white" opacity=".9"/>
      <text x="${mx}" y="${my+4}" text-anchor="middle" font-size="10" fill="${sc}" font-weight="600" font-family="system-ui">${f(lbl)}</text>`:'';
    return `<defs>${mk}</defs>${line}${tag}`;
  }

  // Color palette
  const Cx={s:"#4F46E5",f:"#EEF2FF"}, Cy={s:"#993C1D",f:"#FAECE7"},
        Cm={s:"#059669",f:"#ECFDF5"}, Cw={s:"#7C3AED",f:"#F3E8FF"},
        Cl={s:"#1D4ED8",f:"#EFF6FF"};

  // ── REGRESIÓN SIMPLE ─────────────────────────────────────────
  if(d==='regresion-simple'){
    titulo='Modelo de Regresión Simple';
    nivel='Pregrado · OLS';
    nota='X predice linealmente a Y. Se reporta β, R² y la significancia del modelo.';
    const X=vars[0]||'Predictor (X)', Y=vars[1]||'Criterio (Y)';
    const px=50, py=30, gh=H-py-40;
    // Axes
    svg+=`<line x1="${px}" y1="${py}" x2="${px}" y2="${py+gh}" stroke="#CBD5E1" stroke-width="2"/>`;
    svg+=`<line x1="${px}" y1="${py+gh}" x2="${W-30}" y2="${py+gh}" stroke="#CBD5E1" stroke-width="2"/>`;
    // Axis arrows
    svg+=arrow(px,py+gh,W-30,py+gh,'#94A3B8');
    svg+=arrow(px,py+gh,px,py,'#94A3B8');
    // Axis labels
    svg+=`<text x="${W-25}" y="${py+gh+5}" font-size="11" fill="${Cx.s}" font-weight="600" font-family="system-ui">${f(trunc(X,12))}</text>`;
    svg+=`<text x="${px-6}" y="${py-6}" text-anchor="middle" font-size="11" fill="${Cy.s}" font-weight="600" font-family="system-ui">${f(trunc(Y,12))}</text>`;
    // Scatter points
    [[75,220],[105,195],[130,210],[160,175],[185,180],[215,155],[245,145],[268,160],[295,130],[320,115],[350,130],[378,100],[405,92],[430,108],[460,80]].forEach(([px2,py2])=>{
      svg+=`<circle cx="${px2}" cy="${py2}" r="5" fill="${Cx.s}" opacity=".5"/>`;
    });
    // Regression line
    svg+=`<line x1="60" y1="228" x2="470" y2="68" stroke="${Cy.s}" stroke-width="2.5" stroke-linecap="round"/>`;
    // β label on line
    svg+=`<rect x="330" y="95" width="30" height="18" rx="3" fill="white" opacity=".9"/>`;
    svg+=`<text x="345" y="108" text-anchor="middle" font-size="11" fill="${Cy.s}" font-weight="700" font-family="system-ui">β₁</text>`;
    // Formula box bottom-center
    svg+=`<rect x="${W/2-78}" y="${H-32}" width="156" height="22" rx="5" fill="${Cy.f}" stroke="${Cy.s}" stroke-width="1.5"/>`;
    svg+=`<text x="${W/2}" y="${H-17}" text-anchor="middle" font-size="11" fill="${Cy.s}" font-weight="700" font-family="system-ui">Ŷ = β₀ + β₁X + ε</text>`;
    // R² top-right
    svg+=`<rect x="${W-100}" y="${py}" width="90" height="36" rx="6" fill="${Cm.f}" stroke="${Cm.s}" stroke-width="1.5"/>`;
    svg+=`<text x="${W-55}" y="${py+14}" text-anchor="middle" font-size="10" fill="${Cm.s}" font-weight="700" font-family="system-ui">R² = var.</text>`;
    svg+=`<text x="${W-55}" y="${py+28}" text-anchor="middle" font-size="10" fill="${Cm.s}" font-family="system-ui">explicada</text>`;
  }

  // ── REGRESIÓN MÚLTIPLE ────────────────────────────────────────
  else if(d==='regresion-multiple'){
    titulo='Modelo de Regresión Múltiple';
    nivel='Pregrado · OLS / Hayes';
    nota='Cada predictor aporta independientemente a explicar Y. Se reportan β estandarizados, R² y ΔR².';
    const preds=vars.length>=2?vars.slice(0,vars.length-1):[vars[0]||'Predictor 1','Predictor 2'];
    const Y=vars.length>=2?vars[vars.length-1]:'Variable Y';
    const n=Math.min(preds.length,5);
    const stepY=(H-20)/(n+1);
    for(let i=0;i<n;i++){
      const py2=10+stepY*(i+1)-20;
      svg+=box(10,py2,155,40,preds[i],Cx.s,Cx.f);
      svg+=arrow(165,py2+20,385,H/2-20,Cx.s,`β${i+1}`);
    }
    svg+=box(385,H/2-22,155,44,Y,Cy.s,Cy.f);
    svg+=`<text x="462" y="${H-8}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">R² = varianza total explicada</text>`;
    if(preds.length>5) svg+=`<text x="90" y="${H-8}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">+${preds.length-5} predictores más</text>`;
  }

  // ── MEDIACIÓN SIMPLE ──────────────────────────────────────────
  else if(d==='mediacion'){
    titulo='Modelo de Mediación Simple';
    nivel='Pregrado · Hayes PROCESS Modelo 4';
    nota="El efecto de X sobre Y opera directamente (c') e indirectamente a través de M. Efecto indirecto = a × b.";
    const X=vars[0]||'Variable X', M=vars[1]||'Mediador (M)', Y=vars[2]||'Variable Y';
    svg+=box(15,H/2-22,145,44,X,Cx.s,Cx.f);
    svg+=box(W/2-72,18,145,44,M,Cm.s,Cm.f);
    svg+=box(W-160,H/2-22,145,44,Y,Cy.s,Cy.f);
    svg+=arrow(160,H/2,W-160,H/2,Cx.s,"c' (directo)");
    svg+=arrow(160,H/2-14,W/2-72,40,Cm.s,'a');
    svg+=arrow(W/2+73,40,W-160,H/2-14,Cm.s,'b');
    svg+=`<rect x="${W/2-85}" y="${H-34}" width="170" height="22" rx="5" fill="${Cm.f}" stroke="${Cm.s}" stroke-width="1.5"/>`;
    svg+=`<text x="${W/2}" y="${H-19}" text-anchor="middle" font-size="10" fill="${Cm.s}" font-weight="700" font-family="system-ui">Efecto indirecto = a × b</text>`;
  }

  // ── MODERACIÓN SIMPLE ─────────────────────────────────────────
  else if(d==='moderacion'){
    titulo='Modelo de Moderación Simple';
    nivel='Pregrado · Hayes PROCESS Modelo 1';
    nota='W modifica la fuerza o dirección de X→Y. El término de interacción X×W es el componente clave.';
    const X=vars[0]||'Variable X', Wv=vars[1]||'Moderador (W)', Y=vars[2]||'Variable Y';
    // X box left, Y box right, W box top-center
    svg+=box(15,H/2-20,140,40,X,Cx.s,Cx.f);
    svg+=box(W-155,H/2-20,140,40,Y,Cy.s,Cy.f);
    svg+=box(W/2-72,22,145,40,Wv,Cw.s,Cw.f);
    // Main arrow X→Y
    svg+=arrow(155,H/2,W-155,H/2,Cx.s,'');
    // Moderator arrow (dashed, top-down to midpoint)
    const mid=W/2, midY=H/2;
    const id2='modArr';
    svg+=`<defs><marker id="${id2}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="${Cw.s}"/></marker></defs>`;
    svg+=`<line x1="${mid}" y1="62" x2="${mid}" y2="${midY-14}" stroke="${Cw.s}" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#${id2})"/>`;
    // Interaction label at midpoint of arrow
    svg+=`<rect x="${mid-52}" y="${midY-14}" width="104" height="20" rx="4" fill="white" stroke="${Cw.s}" stroke-width="1.5"/>`;
    svg+=`<text x="${mid}" y="${midY-1}" text-anchor="middle" font-size="10" fill="${Cw.s}" font-weight="700" font-family="system-ui">X × W (interacción)</text>`;
    // Bottom note
    svg+=`<rect x="${W/2-120}" y="${H-32}" width="240" height="20" rx="4" fill="${Cw.f}" stroke="${Cw.s}" stroke-width="1"/>`;
    svg+=`<text x="${W/2}" y="${H-18}" text-anchor="middle" font-size="10" fill="${Cw.s}" font-weight="600" font-family="system-ui">β(X×W) significativo → moderación confirmada</text>`;
  }

  // ── MEDIACIÓN MODERADA ────────────────────────────────────────
  else if(d==='mediacion-moderada'){
    titulo='Modelo de Mediación Moderada';
    nivel='Pregrado avanzado · Hayes PROCESS Modelos 7, 14 o 58';
    nota='W modera la ruta a (X→M) o b (M→Y). El índice de mediación moderada indica si el efecto indirecto varía según W.';
    const X=vars[0]||'X',M=vars[1]||'Mediador',Y=vars[2]||'Y',Wv=vars[3]||'Moderador';
    svg+=box(10,H/2-20,125,40,X,Cx.s,Cx.f);
    svg+=box(W/2-62,14,125,40,M,Cm.s,Cm.f);
    svg+=box(W-135,H/2-20,125,40,Y,Cy.s,Cy.f);
    svg+=box(W/2-62,H-55,125,40,Wv,Cw.s,Cw.f);
    svg+=arrow(135,H/2,W-135,H/2,Cx.s,"c'");
    svg+=arrow(135,H/2-12,W/2-62,34,Cm.s,'a');
    svg+=arrow(W/2+63,34,W-135,H/2-12,Cm.s,'b');
    const idw='mmArr';
    svg+=`<defs><marker id="${idw}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="${Cw.s}"/></marker></defs>`;
    svg+=`<line x1="${W/2}" y1="${H-55}" x2="${W/2}" y2="54" stroke="${Cw.s}" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#${idw})"/>`;
    svg+=`<text x="${W/2+6}" y="${H/2-32}" font-size="9" fill="${Cw.s}" font-family="system-ui" font-style="italic">modera a y/o b</text>`;
  }

  // ── PATH ANALYSIS ─────────────────────────────────────────────
  else if(d==='path-analysis'){
    titulo='Path Analysis — Variables Observadas';
    nivel='Posgrado · AMOS, lavaan, Mplus';
    nota='Variables observadas directamente. Se estiman efectos directos e indirectos. No requiere indicadores múltiples.';

    const nVars = vars.length;

    if(nVars <= 1) {
      // Solo 1 variable: advertencia
      svg+=box(W/2-80,H/2-22,160,44,vars[0]||'Variable',Cx.s,Cx.f);
      svg+=`<text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="10" fill="#D97706" font-family="system-ui">⚠️ Path Analysis requiere al menos 3 variables</text>`;

    } else if(nVars === 2) {
      // 2 variables: diagrama simple X → Y
      svg+=box(40,H/2-22,160,44,vars[0],Cx.s,Cx.f);
      svg+=box(W-200,H/2-22,160,44,vars[1],Cy.s,Cy.f);
      svg+=arrow(200,H/2,W-200,H/2,Cx.s,'β');
      svg+=`<text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">Path Analysis · 2 variables</text>`;

    } else if(nVars === 3) {
      // 3 variables: X₁ y X₂ → Y  (sin Var 4 inventado)
      svg+=box(10, 65,150,40,vars[0],Cx.s,Cx.f);
      svg+=box(10,175,150,40,vars[1],Cx.s,Cx.f);
      svg+=box(W-175,H/2-22,165,44,vars[2],Cy.s,Cy.f);
      svg+=arrow(160, 85,W-175,H/2-10,Cx.s,'β₁');
      svg+=arrow(160,195,W-175,H/2+10,Cx.s,'β₂');
      svg+=`<text x="${W/2}" y="${H-6}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">Índices: CFI, TLI, RMSEA, SRMR</text>`;

    } else {
      // 4+ variables: layout con mediador intermedio (usa solo primeras 4)
      const v = vars.slice(0,4);
      svg+=box(10, 45,130,40,v[0],Cx.s,Cx.f);
      svg+=box(10,170,130,40,v[1],Cx.s,Cx.f);
      svg+=box(225,108,130,40,v[2],Cm.s,Cm.f);
      svg+=box(430,108,130,40,v[3],Cy.s,Cy.f);
      svg+=arrow(140, 65,225,120,Cx.s,'β₁');
      svg+=arrow(140,190,225,136,Cx.s,'β₂');
      svg+=arrow(355,128,430,128,Cm.s,'β₃');
      svg+=arrow(140, 65,430,118,Cx.s,'',true);
      if(vars.length > 4) {
        svg+=`<text x="${W/2}" y="16" text-anchor="middle" font-size="9" fill="#D97706" font-family="system-ui">Mostrando 4 de ${vars.length} variables</text>`;
      }
      svg+=`<text x="${W/2}" y="${H-6}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">Índices: CFI, TLI, RMSEA, SRMR</text>`;
    }
  }

  // ── SEM MEDIACIÓN CON LATENTES ────────────────────────────────
  else if(d==='sem-mediacion'){
    titulo='SEM — Mediación con Latentes';
    nivel='Posgrado · AMOS, Mplus, lavaan';
    nota='X, M e Y son constructos latentes medidos por indicadores. Corrige el error de medición.';
    const X=vars[0]||'ξ (X)',M=vars[1]||'η₁ (M)',Y=vars[2]||'η₂ (Y)';
    // Three ellipses in triangle layout
    svg+=ellipse(110,155, 78,36,'ξ: '+trunc(X,9),Cl.s,Cl.f);
    svg+=ellipse(300, 65, 72,32,'η₁: '+trunc(M,8),Cm.s,Cm.f);
    svg+=ellipse(490,155, 75,36,'η₂: '+trunc(Y,9),Cy.s,Cy.f);
    // Indicators exogenous
    svg+=box(5, 40, 80,28,'x₁',Cl.s,'#F8FAFF',9);
    svg+=box(5,195, 80,28,'x₂',Cl.s,'#F8FAFF',9);
    svg+=arrow(85, 54,100,128,Cl.s,'λ₁');
    svg+=arrow(85,209,100,172,Cl.s,'λ₂');
    // Indicators mediator
    svg+=box(250, 10, 80,28,'m₁',Cm.s,'#F0FDF8',9);
    svg+=arrow(290, 38,292, 44,Cm.s,'λ₃');
    // Indicators outcome
    svg+=box(500, 55, 75,28,'y₁',Cy.s,'#FFF8F5',9);
    svg+=box(500,218, 75,28,'y₂',Cy.s,'#FFF8F5',9);
    svg+=arrow(500, 69,498,128,Cy.s,'λ₄');
    svg+=arrow(500,232,498,180,Cy.s,'λ₅');
    // Structural paths
    svg+=arrow(188,148,228, 88,Cm.s,'a');
    svg+=arrow(372, 82,418,138,Cm.s,'b');
    svg+=arrow(188,162,418,162,Cl.s,"c'",true);
    svg+=`<text x="${W/2}" y="${H-4}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">Efecto indirecto a×b — bootstrapping</text>`;
  }

  // ── SEM MODERACIÓN CON LATENTES ───────────────────────────────
  else if(d==='sem-moderacion'){
    titulo='SEM — Moderación con Latentes';
    nivel='Posgrado · Mplus (LMS), lavaan (modsem)';
    nota='Interacción entre constructos latentes ξ₁×ξ₂. Técnica LMS o PI. Mayor complejidad que moderación por regresión.';
    const X=vars[0]||'ξ₁ (X)',Wv=vars[1]||'ξ₂ (W)',Y=vars[2]||'η (Y)';
    svg+=ellipse(110, 95, 80,36,trunc(X,12),Cl.s,Cl.f);
    svg+=ellipse(110,210, 80,36,trunc(Wv,12),Cw.s,Cw.f);
    svg+=ellipse(460,152, 82,40,trunc(Y,12),Cy.s,Cy.f);
    svg+=ellipse(290,152, 72,32,'ξ₁ × ξ₂','#B45309','#FEF3E8');
    svg+=arrow(190,103,222,135,Cl.s,'γ₁');
    svg+=arrow(190,202,222,168,Cw.s,'γ₂');
    svg+=arrow(362,152,380,152,'#B45309','γ₃');
    svg+=`<rect x="${W/2-130}" y="${H-30}" width="260" height="20" rx="4" fill="#FEF3E8" stroke="#B45309" stroke-width="1"/>`;
    svg+=`<text x="${W/2}" y="${H-16}" text-anchor="middle" font-size="9" fill="#B45309" font-family="system-ui">γ₃ sig. → moderación entre latentes confirmada</text>`;
  }

  // ── SEM COMPLETO ──────────────────────────────────────────────
  else if(d==='sem-completo'){
    titulo='SEM — Modelo Estructural Completo';
    nivel='Posgrado · AMOS, Mplus, lavaan';
    nota='CFA (modelo de medición) + modelo estructural. Índices: CFI≥.95, TLI≥.95, RMSEA≤.06, SRMR≤.08.';
    // Use real variable names — assign roles: exógenas = primeras vars, endógena = última
    // Pad only with generic labels if truly needed (never "Var N")
    const vRaw=[...vars];
    while(vRaw.length<4) vRaw.push(vRaw.length===0?'Exógena 1':vRaw.length===1?'Exógena 2':vRaw.length===2?'Mediador':'Endógena');
    const v=vRaw;
    const ex1=v[0], ex2=v[1], end1=v[2], end2=v[v.length-1];

    // Measurement model left — exógenas
    svg+=`<rect x="8" y="8" width="138" height="${H-16}" rx="8" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="5,3"/>`;
    svg+=`<text x="73" y="22" text-anchor="middle" font-size="8" fill="#1D4ED8" font-weight="600" font-family="system-ui">VARIABLES EXÓGENAS</text>`;
    svg+=ellipse(73, 88,62,28,trunc(ex1,10),Cl.s,'white',10);
    svg+=ellipse(73,192,62,28,trunc(ex2,10),Cl.s,'white',10);
    svg+=box(10, 50,38,20,'x₁x₂',Cl.s,'#F8FAFF',8);
    svg+=box(10,155,38,20,'x₃x₄',Cl.s,'#F8FAFF',8);
    svg+=arrow(48, 60,52, 68,Cl.s,'');
    svg+=arrow(48,158,52,172,Cl.s,'');

    // Structural model center
    svg+=`<rect x="158" y="8" width="262" height="${H-16}" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1" stroke-dasharray="5,3"/>`;
    svg+=`<text x="289" y="22" text-anchor="middle" font-size="8" fill="#059669" font-weight="600" font-family="system-ui">MODELO ESTRUCTURAL</text>`;
    svg+=ellipse(205, 88,55,26,trunc(ex1,9),Cl.s,Cl.f,10);
    svg+=ellipse(205,192,55,26,trunc(ex2,9),Cl.s,Cl.f,10);
    svg+=ellipse(305,140,55,28,trunc(end1,9),Cm.s,Cm.f,10);
    svg+=ellipse(403,140,52,26,trunc(end2,9),Cy.s,Cy.f,10);
    svg+=arrow(136, 88,152, 88,Cl.s,'');
    svg+=arrow(136,182,152,188,Cl.s,'');
    svg+=arrow(260, 95,255,120,Cl.s,'γ₁');
    svg+=arrow(260,188,255,158,Cl.s,'γ₂');
    svg+=arrow(360,140,355,140,Cm.s,'β');

    // Output CFA right — endógena
    svg+=`<rect x="432" y="8" width="140" height="${H-16}" rx="8" fill="#FFF8F5" stroke="#993C1D" stroke-width="1" stroke-dasharray="5,3"/>`;
    svg+=`<text x="502" y="22" text-anchor="middle" font-size="8" fill="#993C1D" font-weight="600" font-family="system-ui">VARIABLE ENDÓGENA</text>`;
    svg+=ellipse(502, 80,58,26,trunc(end2,9),Cy.s,Cy.f,10);
    svg+=box(458,148,42,20,'y₁y₂',Cy.s,'#FFF8F5',8);
    svg+=box(508,148,42,20,'y₃y₄',Cy.s,'#FFF8F5',8);
    svg+=arrow(455,130,460,130,Cy.s,'');
    svg+=arrow(455,100,502, 68,Cy.s,'');

    svg+=`<text x="${W/2}" y="${H-4}" text-anchor="middle" font-size="9" fill="#aaa" font-family="system-ui">CFI≥.95 · TLI≥.95 · RMSEA≤.06 · SRMR≤.08</text>`;
  }

  // Modal
  const isPost=['path-analysis','sem-mediacion','sem-moderacion','sem-completo'].includes(d);
  const badgeColor=isPost?'#1D4ED8':'#059669';
  const badgeLabel=isPost?'Posgrado':'Pregrado';

  const modalHtml=`
    <div id="modal-diagram" class="modal-overlay" onclick="if(event.target===this)this.remove()">
      <div class="modal-inner">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:12px">
          <div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span style="font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;background:${badgeColor}18;color:${badgeColor};border:1px solid ${badgeColor}40">${badgeLabel}</span>
              <span style="font-size:11px;color:#888">${f(nivel)}</span>
            </div>
            <h3 style="font-size:15px;font-weight:700;color:#111;margin:0">${f(titulo)}</h3>
          </div>
          <button onclick="document.getElementById('modal-diagram').remove()" style="border:none;background:#f5f5f5;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;flex-shrink:0">✕</button>
        </div>
        <p style="font-size:12px;color:#555;margin:0 0 14px;line-height:1.5">${f(nota)}</p>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;border:1px solid #eee;border-radius:10px;background:#fafafa" xmlns="http://www.w3.org/2000/svg">
          ${svg}
        </svg>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px">
          <p style="font-size:11px;color:#bbb;margin:0">Generado según técnica metodológica seleccionada</p>
          <button onclick="downloadDiagram()" style="padding:8px 18px;border-radius:8px;border:1.5px solid #4F46E5;color:#4F46E5;background:transparent;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;min-height:36px">📥 Descargar SVG</button>
        </div>
      </div>
    </div>`;

  document.body.insertAdjacentHTML('beforeend', modalHtml);
  window._lastDiagramSVG=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:#fafafa">${svg}</svg>`;
}

// ── RETRY TOAST ───────────────────────────────────────────────────
function showRetryToast(attempt, waitMs) {
  const el = document.getElementById('retry-toast');
  if (!el) return;
  const msg = document.getElementById('retry-toast-msg');
  if (msg) msg.textContent = 'Límite de IA — reintentando en ' + Math.round(waitMs/1000) + 's... (' + attempt + '/' + AIQueue._MAX_RETRIES + ')';
  el.style.transform = 'translateX(-50%) translateY(0)';
  el.style.opacity = '1';
}
function hideRetryToast() {
  const el = document.getElementById('retry-toast');
  if (!el) return;
  el.style.transform = 'translateX(-50%) translateY(80px)';
  el.style.opacity = '0';
}

// ── REGEN LIMIT GUARD ─────────────────────────────────────────────
function showRegenToast() {
  const el = document.getElementById('regen-toast');
  if (!el) return;
  el.classList.remove('show');
  void el.offsetWidth; // reflow
  el.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
}

function canRegen(source) {
  // Separate counters: vars has REGEN_MAX, poblaciones has 3
  const limit = source === 'vars' ? REGEN_MAX : 3;
  const key = source === 'vars' ? 'regenCount' : 'regenCountPob';
  const count = state[key] || 0;
  if (count >= limit) {
    if(source !== 'vars') showRegenToast();
    return false;
  }
  return true;
}

function incrementRegen(source) {
  const key = source === 'vars' ? 'regenCount' : 'regenCountPob';
  state[key] = (state[key] || 0) + 1;
  saveState();
}

function regenLabel() {
  const used = state.regenCount || 0;
  const left = REGEN_MAX - used;
  return left > 0 ? `(${left} restante${left===1?'':'s'})` : '';
}

// ── SMART TOOLTIP POSITIONING ─────────────────────────────────────
document.addEventListener('mouseover', function(e) {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const tooltip = chip.querySelector('.chip-tooltip');
  if (!tooltip) return;
  const rect = chip.getBoundingClientRect();
  const vw = window.innerWidth;
  const tw = 220;
  const th = tooltip.offsetHeight || 80;
  let top = rect.top - th - 10;
  if (top < 8) top = rect.bottom + 8;
  let left = rect.left;
  if (left + tw > vw - 8) left = vw - tw - 8;
  if (left < 8) left = 8;
  tooltip.style.top = top + 'px';
  tooltip.style.left = left + 'px';
});

render();
</script>
</body>
</html>
