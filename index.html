<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Asistente para la creación de proyectos de investigación</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;display:flex;justify-content:center;padding:24px 16px}
.card{background:#fff;border-radius:16px;border:0.5px solid #e0e0e0;padding:28px 24px;width:100%;max-width:620px;height:fit-content}
h2{font-size:18px;font-weight:500;margin-bottom:4px;color:#111}
.steps{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;cursor:default;transition:all .2s}
.step-circle.done{background:#534AB7;color:#fff;cursor:pointer}
.step-circle.active{background:#EEEDFE;color:#534AB7;border:2px solid #534AB7}
.step-circle.pending{background:#f0f0f0;color:#aaa}
.step-line{height:1px;width:16px}
.step-line.done{background:#534AB7}
.step-line.pending{background:#e0e0e0}
.step-label{font-size:12px;color:#888;margin-bottom:20px}
.section-label{font-size:13px;color:#888;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.tooltip{position:relative;display:inline-flex;cursor:help}
.tooltip-icon{width:16px;height:16px;background:#534AB7;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold}
.tooltip-text{visibility:hidden;width:240px;background:#333;color:#fff;text-align:left;border-radius:6px;padding:8px 10px;position:absolute;z-index:1;bottom:125%;left:50%;margin-left:-120px;opacity:0;transition:opacity .3s;font-size:12px;line-height:1.4;font-weight:normal}
.tooltip-text::after{content:"";position:absolute;top:100%;left:50%;margin-left:-5px;border-width:5px;border-style:solid;border-color:#333 transparent transparent transparent}
.tooltip:hover .tooltip-text{visibility:visible;opacity:1}
.options{display:flex;flex-direction:column;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.badge{padding:10px 16px;border-radius:8px;cursor:pointer;text-align:left;border:0.5px solid #ccc;background:transparent;font-size:14px;font-weight:400;width:100%;transition:all .15s;position:relative}
.badge:hover{border-color:#999}
.badge.active{border:2px solid #534AB7;background:#EEEDFE;color:#3C3489;font-weight:500}
.badge-title{font-weight:500;margin-bottom:2px}
.badge-desc{font-size:12px;color:#777;margin-top:2px}
.badge-hint{font-size:11px;color:#6b7280;margin-top:4px;font-style:italic}
.badge-hint.recommended{color:#0F6E56;font-weight:500}
.chip{padding:6px 12px;border-radius:20px;cursor:pointer;font-size:13px;border:0.5px solid #ccc;background:transparent;transition:all .15s}
.chip:hover{border-color:#0F6E56}
.chip.active{border:2px solid #0F6E56;background:#E1F5EE;color:#0F6E56;font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.hint{background:#EEEDFE;border-radius:8px;padding:8px 12px;font-size:13px;color:#3C3489;margin-top:4px}
.hint.warning{background:#FEF3E8;color:#B45309}
.hint.success{background:#E1F5EE;color:#0F6E56}
input[type=text],textarea{width:100%;font-size:14px;padding:8px 10px;border-radius:8px;border:0.5px solid #ccc;font-family:inherit;margin-top:4px}
input[type=text]:focus,textarea:focus{outline:none;border-color:#534AB7}
textarea{min-height:60px;resize:vertical}
.otro-input{border:1px solid #534AB7 !important;margin-top:6px}
.nav{display:flex;justify-content:space-between;margin-top:28px;padding-top:16px;border-top:0.5px solid #e5e5e5}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;border:none;transition:all .2s}
.btn-back{border:0.5px solid #ccc;background:transparent;color:#333}
.btn-back:disabled{opacity:0.4;cursor:not-allowed}
.btn-next{background:#534AB7;color:#fff;font-weight:500;padding:10px 24px}
.btn-next:disabled{background:#ccc;cursor:not-allowed}
.content{min-height:280px}
.gap20{display:flex;flex-direction:column;gap:20px}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.result-header p{font-size:13px;color:#888}
.result-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;border:0.5px solid #ccc;background:transparent;transition:all .2s}
.btn-sm:hover{background:#f5f5f5}
.btn-edit{border-color:#ccc}
.btn-regen{border-color:#534AB7;color:#534AB7}
.btn-download{border-color:#0F6E56;color:#0F6E56}
.result-block{border-radius:10px;padding:14px 16px;margin-bottom:16px}
.result-block-label{font-size:11px;font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.result-block p{font-size:15px;line-height:1.6;color:#222}
.result-block textarea{font-size:14px;padding:8px;border-radius:6px;min-height:60px;width:100%;border:0.5px solid #ccc}
.summary{margin-top:4px;padding:12px 16px;background:#f9f9f7;border-radius:8px;border:0.5px solid #e0dfd5}
.summary p.title{font-size:12px;color:#888;margin-bottom:6px;font-weight:500}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.summary-grid p{font-size:12px;color:#555}
.summary-grid span{color:#888}
.loading{text-align:center;padding:40px 0}
.loading .icon{font-size:32px;margin-bottom:12px}
.loading p{color:#888;font-size:14px}
.generate-box{text-align:center;padding:32px 0}
.generate-box p{margin-bottom:20px;font-size:15px;color:#555}
.btn-generate{padding:12px 32px;border-radius:8px;background:#534AB7;color:#fff;border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-generate:hover{background:#3C3489}
.error{color:red;font-size:14px}
.footer{text-align:center;margin-top:24px;padding-top:16px;border-top:0.5px solid #e5e5e5;font-size:12px;color:#888}
.footer strong{color:#534AB7}
.next-steps{margin-top:16px;padding:16px;background:#f0fdf4;border-radius:8px;border:1px solid #86efac}
.next-steps-title{font-size:14px;font-weight:600;color:#166534;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.next-steps ul{list-style:none;padding:0}
.next-steps li{padding:8px 0;font-size:13px;color:#166534;display:flex;align-items:start;gap:8px}
.next-steps li::before{content:"✓";color:#22c55e;font-weight:bold;font-size:16px}
.auto-save{position:fixed;bottom:16px;right:16px;background:#fff;border:1px solid #e5e5e5;padding:8px 12px;border-radius:20px;font-size:11px;color:#888;box-shadow:0 2px 8px rgba(0,0,0,0.1);display:none}
.auto-save.show{display:block;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* RESPONSIVE MOBILE */
@media (max-width: 768px) {
  body{padding:16px 12px}
  .card{padding:20px 16px;max-width:100%;border-radius:12px}
  h2{font-size:16px;line-height:1.3}
  .steps{gap:3px}
  .step-circle{width:24px;height:24px;font-size:11px}
  .step-line{width:12px}
  .step-label{font-size:11px;margin-bottom:16px}
  .section-label{font-size:12px}
  .grid2,.grid3{grid-template-columns:1fr;gap:8px}
  .badge{padding:12px 14px;font-size:13px}
  .badge-title{font-size:13px}
  .badge-desc{font-size:11px}
  .badge-hint{font-size:10px}
  .chip{padding:8px 12px;font-size:12px}
  .hint{padding:10px 12px;font-size:12px}
  .tooltip-text{width:200px;margin-left:-100px;font-size:11px;padding:6px 8px}
  .nav{flex-direction:column;gap:10px;margin-top:20px}
  .btn{width:100%;padding:12px 20px;font-size:14px}
  .btn-next{order:-1}
  .result-header{flex-direction:column;align-items:flex-start;gap:12px}
  .result-actions{width:100%;flex-direction:column}
  .btn-sm{width:100%;padding:10px 14px;text-align:center}
  .result-block{padding:12px 14px}
  .result-block p{font-size:14px}
  .result-block textarea{font-size:13px}
  .summary-grid{grid-template-columns:1fr;gap:8px}
  .next-steps{padding:14px}
  .next-steps-title{font-size:13px}
  .next-steps li{font-size:12px;padding:6px 0}
  .auto-save{bottom:12px;right:12px;font-size:10px;padding:6px 10px}
  .generate-box{padding:24px 0}
  .generate-box p{font-size:14px}
  .btn-generate{padding:12px 24px;font-size:14px;width:100%}
  .footer{font-size:11px;margin-top:20px}
}

@media (max-width: 480px) {
  .card{padding:16px 12px}
  h2{font-size:15px}
  .steps{overflow-x:auto;padding-bottom:8px}
  .badge{font-size:12px;padding:10px 12px}
  .chip{font-size:11px;padding:6px 10px}
  .result-block p{font-size:13px}
}
</style>
</head>

// GUARDAR ESTADO AUTOMÁTICAMENTE
function saveState() {
  try {
    localStorage.setItem('investigacion_state', JSON.stringify(state));
    showAutoSave();
  } catch(e) {}
}

function showAutoSave() {
  const el = document.getElementById('auto-save');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function efectiveArea(){return state.area==="otro"?state.areaOtro:AREAS.find(a=>a.id===state.area)?.label||"";}
function efectivePoblacion(){return state.poblacion==="otro"?state.poblacionOtro:state.poblacion;}
function efectiveProblema(){return state.problema==="otro"?state.problemaOtro:state.problema;}

function canNext(){
  const s=state.step;
  if(s===0){
    if(state.area==="otro") return state.areaOtro.trim()!=="";
    return state.area!=="";
  }
  if(s===1){
    if(state.poblacion==="otro") return state.poblacionOtro.trim()!=="";
    return state.poblacion!=="";
  }
  if(s===2){
    // Si problema es "otro", necesita problema especificado Y variables
    if(state.problema==="otro") {
      return state.problemaOtro.trim()!=="" && state.variablesOtro.trim()!=="";
    }
    // Si seleccionó "otro" en variables, necesita variables especificadas
    if(state.variables.includes('otro')) {
      return state.variables.length>0 && state.variablesOtro.trim()!=="";
    }
    // Caso normal: problema seleccionado y al menos una variable
    return state.problema!=="" && state.variables.length>0;
  }
  if(s===3) return state.enfoque!=="" && state.nivel!=="" && state.diseno!=="";
  if(s===4) return state.experiencia!=="" && state.viabilidad!=="";
  return true;
}

function badge(label, active, click){
  return `<button class="badge ${active?'active':''}" onclick="${click}">${label}</button>`;
}

function badgeWithDesc(title, desc, hint, active, click, recommended=false){
  const hintClass = recommended ? 'recommended' : '';
  return `<button class="badge ${active?'active':''}" onclick="${click}">
    <div class="badge-title">${title}</div>
    <div class="badge-desc">${desc}</div>
    ${hint ? `<div class="badge-hint ${hintClass}">${hint}</div>` : ''}
  </button>`;
}

function sectionLabel(t, tooltip=""){
  if(tooltip) {
    return `<p class="section-label">${t} <span class="tooltip"><span class="tooltip-icon">?</span><span class="tooltip-text">${tooltip}</span></span></p>`;
  }
  return `<p class="section-label">${t}</p>`;
}

function renderStepsBar(){
  let h="";
  STEPS.forEach((name,i)=>{
    const done=i<state.step;
    const active=i===state.step;
    const pending=i>state.step;
    let cls=done?"done":active?"active":"pending";
    h+=`<div class="step-circle ${cls}" onclick="${done?`state.step=${i};render()`:''}">${done?'✓':i+1}</div>`;
    if(i<STEPS.length-1){
      h+=`<div class="step-line ${done?'done':'pending'}"></div>`;
    }
  });
  document.getElementById("steps-bar").innerHTML=h;
  document.getElementById("step-label").textContent=`Paso ${state.step+1} de 6: ${STEPS[state.step]}`;
}

// SUGERENCIAS AUTOMÁTICAS
function getAutoSuggestion() {
  if(!state.enfoque || !state.variables.length) return "";
  
  const nv = state.variables.filter(v => v !== 'otro').length;
  const enfoque = state.enfoque.toLowerCase();
  
  // Validación: Cualitativo con muchas variables
  if(enfoque === "cualitativo" && nv >= 4) {
    return `<div class="hint warning">⚠️ Para enfoque cualitativo, usualmente se trabaja con menos variables (1-2) y se profundiza más en cada una. ¿Estás seguro de necesitar ${nv} variables?</div>`;
  }
  
  // Sugerencia automática según variables
  if(nv === 1) {
    return `<div class="hint success">💡 Sugerencia: Con 1 variable, nivel <strong>descriptivo</strong> es ideal. Diseño recomendado: <strong>${enfoque === 'cuantitativo' ? 'no experimental transversal' : 'estudio de caso'}</strong>.</div>`;
  }
  if(nv === 2) {
    return `<div class="hint success">💡 Sugerencia: Con 2 variables, nivel <strong>correlacional</strong> es apropiado. Diseño recomendado: <strong>${enfoque === 'cuantitativo' ? 'no experimental transversal' : 'estudio de caso múltiple'}</strong>.</div>`;
  }
  if(nv >= 3 && enfoque === 'cuantitativo') {
    return `<div class="hint success">💡 Sugerencia: Con ${nv} variables, nivel <strong>correlacional o explicativo</strong>. Diseño recomendado: <strong>no experimental transversal</strong> (o experimental si puedes manipular).</div>`;
  }
  
  return "";
}

function renderContent(){
  const el=document.getElementById("content");
  const s=state.step;

  if(s===0){
    let h=sectionLabel("¿Que area de la psicologia te interesa?");
    h+=`<div class="grid3">`;
    AREAS.forEach(a=>{
      h+=`<button class="badge ${state.area===a.id?'active':''}" onclick="selectArea('${a.id}')">${a.icon} ${a.label}</button>`;
    });
    h+=`</div>`;
    if(state.area==="otro"){
      h+=`<input type="text" class="otro-input" placeholder="Especifica tu area" value="${state.areaOtro}" oninput="state.areaOtro=this.value;updateNav();saveState()"/>`;
    }
    el.innerHTML=h;
  }

  else if(s===1){
    let h=sectionLabel("¿Con que poblacion quieres trabajar?");
    const pobs=state.area&&state.area!=="otro"?POBLACIONES[state.area]:[];
    if(pobs.length>0){
      h+=`<div class="options">`;
      pobs.forEach(p=>{
        const esc=p.replace(/'/g,"\\'");
        h+=badge(p, state.poblacion===p, `selectPoblacion('${esc}')`);
      });
      h+=badge("Otro", state.poblacion==="otro", `selectPoblacion('otro')`);
      h+=`</div>`;
    } else {
      h+=`<div class="options">`;
      h+=badge("Otro", state.poblacion==="otro", `selectPoblacion('otro')`);
      h+=`</div>`;
    }
    if(state.poblacion==="otro"){
      h+=`<input type="text" class="otro-input" placeholder="Especifica tu poblacion" value="${state.poblacionOtro}" oninput="state.poblacionOtro=this.value;updateNav();saveState()"/>`;
    }
    el.innerHTML=h;
  }

  else if(s===2){
    let h=sectionLabel("¿Que problema o fenomeno quieres investigar?");
    const probs=state.area&&state.area!=="otro"?PROBLEMAS[state.area]:[];
    if(probs.length>0){
      h+=`<div class="options">`;
      probs.forEach(p=>{
        const esc=p.replace(/'/g,"\\'");
        h+=badge(p, state.problema===p, `selectProblema('${esc}')`);
      });
      h+=badge("Otro", state.problema==="otro", `selectProblema('otro')`);
      h+=`</div>`;
    } else {
      h+=`<div class="options">`;
      h+=badge("Otro", state.problema==="otro", `selectProblema('otro')`);
      h+=`</div>`;
    }
    if(state.problema==="otro"){
      h+=`<input type="text" class="otro-input" placeholder="Especifica tu problema/fenomeno" value="${state.problemaOtro}" oninput="state.problemaOtro=this.value;updateNav();saveState()" onblur="renderContent()" onkeypress="if(event.key==='Enter'){renderContent()}"/>`;
    }
    
    // Mostrar campo de variables solo si ya confirmó el problema (tiene al menos 3 caracteres Y no está vacío después de trim)
    const problemaConfirmado = state.problema === "otro" && state.problemaOtro.trim().length >= 3;
    const mostrarVariables = (state.problema && state.problema !== "otro") || problemaConfirmado;
    
    if(mostrarVariables){
      h+=sectionLabel("¿Que variables quieres estudiar?");
      const vars=state.problema!=="otro"&&VARIABLES[state.problema]?VARIABLES[state.problema]:[];
      if(vars.length>0){
        h+=`<div class="chips">`;
        vars.forEach(v=>{
          const esc=v.replace(/'/g,"\\'");
          h+=`<button class="chip ${state.variables.includes(v)?'active':''}" onclick="toggleVar('${esc}')">${v}</button>`;
        });
        h+=`<button class="chip ${state.variables.includes('otro')?'active':''}" onclick="toggleVar('otro')">Otro</button>`;
        h+=`</div>`;
        const nv=state.variables.filter(v => v !== 'otro').length;
        if(nv>0&&NIVEL_HINT[nv]){
          h+=`<div class="hint">${NIVEL_HINT[nv]}</div>`;
        }
        if(state.variables.includes('otro')){
          h+=`<input type="text" class="otro-input" placeholder="Especifica tus variables separadas por comas" value="${state.variablesOtro}" oninput="state.variablesOtro=this.value;updateNav();saveState()"/>`;
        }
      } else {
        h+=`<textarea placeholder="Escribe las variables separadas por comas (Ej: Identidad comunitaria, Cohesion social, Participacion)" oninput="state.variablesOtro=this.value;setVarsFromText(this.value);saveState()">${state.variablesOtro}</textarea>`;
      }
    }
    el.innerHTML=h;
  }

  else if(s===3){
    let h=`<div class="gap20">`;
    
    h+=sectionLabel("¿Que enfoque metodologico prefieres?");
    h+=`<div class="options">`;
    ENFOQUES.forEach(e=>{
      let desc="";
      if(e==="Cuantitativo") desc="Numeros, estadisticas, medicion";
      if(e==="Cualitativo") desc="Experiencias, significados, profundidad";
      if(e==="Mixto") desc="Combina ambos enfoques";
      h+=badgeWithDesc(e, desc, null, state.enfoque===e, `selectEnfoque('${e}')`);
    });
    h+=`</div>`;

    if(state.enfoque){
      h+=sectionLabel("¿Que nivel de investigacion buscas?", "El nivel indica qué tan profundo quieres llegar: explorar un tema nuevo, describirlo, buscar relaciones entre variables, o explicar causas.");
      h+=`<div class="options">`;
      NIVELES.forEach(n=>{
        const esc=n.id.replace(/'/g,"\\'");
        h+=badgeWithDesc(n.label, n.desc, n.hint, state.nivel===n.id, `selectNivel('${esc}')`);
      });
      h+=`</div>`;
    }

    if(state.enfoque){
      h+=sectionLabel("¿Que diseño de investigacion utilizarás?", "El diseño es la estrategia concreta que usarás para recolectar datos: experimental (manipulas), no experimental (solo observas), etnográfico, estudio de caso, etc.");
      const enfoqueKey = state.enfoque.toLowerCase();
      const disenosDisponibles = DISENOS[enfoqueKey] || [];
      h+=`<div class="options">`;
      disenosDisponibles.forEach(d=>{
        const esc=d.id.replace(/'/g,"\\'");
        h+=badgeWithDesc(d.label, d.desc, d.hint, state.diseno===d.id, `selectDiseno('${esc}')`);
      });
      h+=`</div>`;

    // SUGERENCIA AUTOMÁTICA
    h+=getAutoSuggestion();

    h+=`</div>`;
    el.innerHTML=h;

  else if(s===4){
    let h=`<div class="gap20">`;
    h+=sectionLabel("¿Cuanta experiencia tienes con este tema o poblacion?");

    EXPERIENCIAS.forEach(e=>{
      const esc=e.replace(/'/g,"\\'");
      h+=badge(e, state.experiencia===e, `state.experiencia='${esc}';updateNav();renderContent();saveState()`);
    });
    h+=`</div>`;
    h+=sectionLabel("¿Tienes acceso a la poblacion que quieres estudiar?");
    h+=`<div class="options">`;
    VIABILIDADES.forEach(v=>{
      const esc=v.replace(/'/g,"\\'");
      h+=badge(v, state.viabilidad===v, `state.viabilidad='${esc}';updateNav();renderContent();saveState()`);

    h+=`</div>`;
    h+=sectionLabel("¿En que contexto realizarias tu investigacion? — opcional");

    h+=sectionLabel("¿Por que te interesa este tema? — opcional");

    h+=`</div>`;
    el.innerHTML=h;
  }

  else if(s===5){
    if(state.loading){
      el.innerHTML=`<div class="loading"><div class="icon">⏳</div><p>Generando tu propuesta de investigacion...</p></div>`;
      return;
    }
    if(!state.result){
      el.innerHTML=`<div class="generate-box"><p>Todo listo! Con tus respuestas generaremos un tema, pregunta de investigacion y objetivo general. Podras ajustarlos a tu criterio.</p><button class="btn-generate" onclick="generate()">Generar propuesta</button></div>`;
      return;
    }
    
    let errorMsg = "";
    if(state.result.error){
      errorMsg = `<div style="padding:20px;background:#FEF3E8;border:1px solid #F59E0B;border-radius:8px;margin-bottom:20px">
        <p style="color:#B45309;font-size:14px;line-height:1.6;margin:0">${state.result.error}</p>
      </div>`;
    }
    
    const fields=[
      {key:"tema", label:"Tema de investigacion", color:"#534AB7", bg:"#EEEDFE"},
      {key:"pregunta", label:"Pregunta de investigacion", color:"#0F6E56", bg:"#E1F5EE"},
      {key:"objetivo", label:"Objetivo general", color:"#993C1D", bg:"#FAECE7"},
      {key:"hipotesis", label: state.enfoque === "Cuantitativo" ? "Hipotesis de investigacion" : state.enfoque === "Cualitativo" ? "Hipotesis de trabajo" : "Hipotesis", color:"#7C3AED", bg:"#F3E8FF"},
    ];
    let h= errorMsg + `<div class="result-header"><p>Puedes editar los resultados directamente</p><div class="result-actions">`;

    h+=`<button class="btn-sm btn-download" onclick="downloadDoc()">📥 Descargar DOCX</button>`;
    // Solo mostrar botón de diagrama si el diseño lo soporta
    const DISENOS_CON_DIAGRAMA = ['regresion-multiple','mediacion','moderacion','mediacion-moderada','path-analysis','sem'];
    if(DISENOS_CON_DIAGRAMA.includes(state.diseno)) {
      h+=`<button class="btn-sm" onclick="showModelDiagram()" style="border-color:#7C3AED;color:#7C3AED">📊 Ver modelo teórico</button>`;
    }
    h+=`<button class="btn-sm btn-nuevo" onclick="nuevoProyecto()" style="border-color:#dc2626;color:#dc2626">🔄 Nuevo proyecto</button>`;

    fields.forEach(f=>{
      h+=`<div class="result-block" style="background:${f.bg}">`;
      h+=`<p class="result-block-label" style="color:${f.color}">${f.label}</p>`;
      if(state.editMode){
        const esc=state.edited[f.key].replace(/"/g,"&quot;");
        h+=`<textarea style="border:1px solid ${f.color}" oninput="state.edited.${f.key}=this.value;saveState()">${state.edited[f.key]}</textarea>`;
      } else {
        h+=`<p>${state.edited[f.key]}</p>`;
      }
      h+=`</div>`;
    });
    h+=`<div class="summary"><p class="title">Resumen de tu perfil metodologico</p><div class="summary-grid">`;
    const nivelLabel = NIVELES.find(n => n.id === state.nivel)?.label || state.nivel;
    const enfoqueKey = state.enfoque.toLowerCase();
    const disenoObj = DISENOS[enfoqueKey]?.find(d => d.id === state.diseno);
    const disenoLabel = disenoObj?.label || state.diseno;
    
    let variablesDisplay = state.variables.filter(v => v !== 'otro');
    if(state.variables.includes('otro') && state.variablesOtro.trim()) {
      const otrasVars = state.variablesOtro.split(',').map(v => v.trim()).filter(Boolean);
      variablesDisplay = variablesDisplay.concat(otrasVars);
    }
    
    [["Area",efectiveArea()],["Poblacion",efectivePoblacion()],["Problema",efectiveProblema()],
     ["Variables",variablesDisplay.join(", ")],["Enfoque",state.enfoque],["Nivel",nivelLabel],["Diseño",disenoLabel]].forEach(([k,v])=>{
      h+=`<p><span>${k}:</span> ${v}</p>`;
    });
    h+=`</div></div>`;

    // PRÓXIMOS PASOS
    h+=`<div class="next-steps">
      <div class="next-steps-title">🎯 Próximos pasos para tu proyecto</div>
      <ul>
        <li><strong>Justificación:</strong> Explica por qué es importante investigar este tema (relevancia teórica, práctica y social)</li>
        <li><strong>Marco teórico:</strong> Busca 5-10 artículos recientes (últimos 5 años) sobre tu tema en Google Académico, Redalyc o SciELO</li>
        <li><strong>Metodología:</strong> Define tu muestra, instrumentos de medición y procedimiento de recolección</li>
        <li><strong>Cronograma:</strong> Establece tiempos realistas para cada fase de tu investigación</li>
      </ul>
    </div>`;
    
    el.innerHTML=h;
  }
}

function updateNav(){
  document.getElementById("btn-back").disabled=state.step===0;
  const nb=document.getElementById("btn-next");
  nb.disabled=!canNext();
  nb.style.display=state.step===5?"none":"block";
}

function render(){
  renderStepsBar();
  renderContent();
  updateNav();
}

function nextStep(){if(canNext()&&state.step<5){state.step++;render();saveState();}}
function prevStep(){if(state.step>0){state.step--;render();saveState();}}

function selectArea(v){state.area=v;state.areaOtro="";state.poblacion="";state.poblacionOtro="";state.problema="";state.problemaOtro="";state.variables=[];updateNav();renderContent();saveState();}
function selectPoblacion(v){state.poblacion=v;state.poblacionOtro="";updateNav();renderContent();saveState();}

async function generate(){
  state.loading=true;state.result=null;renderContent();
  
  let variablesList = state.variables.filter(v => v !== 'otro');
  if(state.variables.includes('otro') && state.variablesOtro.trim()) {
    const otrasVars = state.variablesOtro.split(',').map(v => v.trim()).filter(Boolean);
    variablesList = variablesList.concat(otrasVars);
  }
  
  const nv = variablesList.length;
  const nivelLabel = NIVELES.find(n => n.id === state.nivel)?.label || state.nivel;
  const enfoqueKey = state.enfoque.toLowerCase();
  const disenoObj = DISENOS[enfoqueKey]?.find(d => d.id === state.diseno);
  const disenoLabel = disenoObj?.label || state.diseno;
  
  const prompt=`Eres un experto en metodologia de la investigacion en psicologia (Hernandez, Fernandez y Baptista, 2014; Hernandez y Mendoza, 2018).
Un estudiante de 9no ciclo de Psicologia respondio:
- Area: ${efectiveArea()}
- Poblacion: ${efectivePoblacion()}
- Problema/fenomeno: ${efectiveProblema()}
- Variables seleccionadas (${nv}): ${variablesList.join(", ")}
- Enfoque metodologico: ${state.enfoque}
- Nivel de investigacion: ${nivelLabel}
- Diseño de investigacion: ${disenoLabel}
- Experiencia previa: ${state.experiencia}
- Viabilidad de acceso: ${state.viabilidad}
- Contexto: ${state.contexto||"No especificado"}
- Motivacion: ${state.motivacion||"No especificada"}

Genera:
1. TEMA DE INVESTIGACION delimitado (max 15 palabras), claro, coherente con el nivel y diseño, viable para pregrado.
2. PREGUNTA DE INVESTIGACION principal (interrogativa, coherente con enfoque, nivel, diseño y variables).
3. OBJETIVO GENERAL (verbo en infinitivo coherente con la pregunta, nivel y diseño; medible y alcanzable).
4. ${state.enfoque === "Cuantitativo" ? "HIPOTESIS DE INVESTIGACION: Enunciado afirmativo y específico que predice la relación entre las variables (ej: 'Existe una relación positiva entre X e Y en...')" : state.enfoque === "Cualitativo" ? "HIPOTESIS DE TRABAJO: Supuesto tentativo y flexible sobre el fenómeno (ej: 'Las experiencias de X influyen en...'). Si el nivel es exploratorio puro, usa: 'Se busca comprender...'" : "HIPOTESIS: Según tu diseño mixto, formula una hipótesis predictiva o tentativa"}

IMPORTANTE: Debes generar las 4 elementos. La hipótesis es OBLIGATORIA.

Responde SOLO en JSON exacto sin texto adicional ni markdown:
{"tema":"...","pregunta":"...","objetivo":"...","hipotesis":"..."}`;

  try{
    // Llamar a la API de Claude (requiere backend configurado)
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})
    });
    
    if (!res.ok) {
      throw new Error(`Error ${res.status}: La API no está disponible. Verifica que el servidor backend esté corriendo.`);
    }
    
    const data=await res.json();
    const text=data.content?.map(b=>b.text||"").join("")||"";
    const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
    
    // Asegurar que hipótesis existe
    if(!parsed.hipotesis) {
      if(state.enfoque === "Cuantitativo") {
        parsed.hipotesis = "Existe una relación significativa entre las variables seleccionadas.";
      } else if(state.enfoque === "Cualitativo") {
        parsed.hipotesis = "Se espera identificar patrones emergentes relacionados con el fenómeno de estudio.";
      } else {
        parsed.hipotesis = "Se plantean supuestos iniciales que guiarán la investigación mixta.";
      }
    }
    
    state.result=parsed;
    state.edited={...parsed};
    saveState();
  }catch(e){
    console.error("Error completo:", e);
    
    // Generar propuesta de ejemplo si falla la API
    const ejemploTema = `${efectiveProblema()} en ${efectivePoblacion()} - ${efectiveArea()}`;
    const ejemploPregunta = state.enfoque === "Cuantitativo" 
      ? `¿Cuál es la relación entre ${variablesList[0] || 'las variables'} y ${variablesList[1] || 'el fenómeno'} en ${efectivePoblacion()}?`
      : `¿Cómo se manifiesta ${efectiveProblema()} en las experiencias de ${efectivePoblacion()}?`;
    const ejemploObjetivo = state.enfoque === "Cuantitativo"
      ? `Determinar la relación entre ${variablesList.slice(0,2).join(' y ')} en ${efectivePoblacion()}.`
      : `Comprender el fenómeno de ${efectiveProblema()} en ${efectivePoblacion()}.`;
    const ejemploHipotesis = state.enfoque === "Cuantitativo"
      ? `Existe una relación positiva entre ${variablesList[0] || 'las variables seleccionadas'} y ${variablesList[1] || 'el fenómeno de estudio'} en ${efectivePoblacion()}.`
      : `Las experiencias de ${efectivePoblacion()} en relación a ${efectiveProblema()} están influenciadas por factores contextuales y personales.`;
    
    state.result={
      tema: ejemploTema.substring(0, 100),
      pregunta: ejemploPregunta,
      objetivo: ejemploObjetivo,
      hipotesis: ejemploHipotesis,
      error: `⚠️ API no disponible. Se generó un ejemplo basado en tus selecciones. IMPORTANTE: Debes configurar el backend (/api/chat) para usar la generación con IA. Mientras tanto, edita manualmente este ejemplo.`
    };
    state.edited={...state.result};
    delete state.edited.error;
    saveState();
  }
  state.loading=false;
  renderContent();
}

// RUTAS EXPLÍCITAS: SOLO ESTOS DISEÑOS GENERAN DIAGRAMA
// regresion-multiple → Regresión múltiple (predictores → Y)
// mediacion          → X → M → Y
// moderacion         → X × Moderador → Y
// mediacion-moderada → X → M → Y con moderador sobre a o b
// path-analysis      → Red causal entre variables
// sem                → Variables latentes + observadas

function getVarsList() {
  const vars = state.variables.filter(v => v !== 'otro');
  if(state.variables.includes('otro') && state.variablesOtro.trim()) {
    state.variablesOtro.split(',').map(v => v.trim()).filter(Boolean).forEach(v => vars.push(v));
  }
  return vars;
}

function showModelDiagram() {
  const vars = getVarsList();
  const diseno = state.diseno;
  const W = 580, H = 280;
  let svgContent = '';
  let titulo = '';
  let nota = '';

  // Colores
  const C = { x:"#534AB7", xbg:"#EEEDFE", m:"#0F6E56", mbg:"#E1F5EE", y:"#993C1D", ybg:"#FAECE7", mo:"#7C3AED", mobg:"#F3E8FF" };

  function box(x, y, w, h, label, stroke, fill) {
    const maxLen = 16;
    const words = label.split(' ');
    let lines = [], cur = '';
    words.forEach(w => { if((cur+' '+w).trim().length > maxLen) { if(cur) lines.push(cur); cur=w; } else cur=(cur+' '+w).trim(); });
    if(cur) lines.push(cur);
    lines = lines.slice(0,2);
    const fontSize = lines.some(l=>l.length>13) ? 10 : 11;
    const textY = lines.length === 1 ? y+h/2+4 : y+h/2-5;
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
      ${lines.map((l,i)=>`<text x="${x+w/2}" y="${textY+i*16}" text-anchor="middle" dominant-baseline="middle" font-size="${fontSize}" font-weight="600" fill="${stroke}" font-family="system-ui,sans-serif">${l}</text>`).join('')}`;
  }

  function arrowDef(id, color) {
    return `<marker id="${id}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="${color}"/></marker>`;
  }

  function line(x1,y1,x2,y2,color,label='',dashed=false) {
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const id = `a${x1}${y1}${x2}${y2}`;
    const dash = dashed ? 'stroke-dasharray="5,3"' : '';
    return `<defs>${arrowDef(id,color)}</defs>
      <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="2" ${dash} marker-end="url(#${id})"/>
      ${label ? `<rect x="${mx-28}" y="${my-9}" width="56" height="16" rx="3" fill="white" opacity="0.9"/><text x="${mx}" y="${my+4}" text-anchor="middle" font-size="10" fill="${color}" font-family="system-ui,sans-serif">${label}</text>` : ''}`;
  }

  // ── REGRESIÓN MÚLTIPLE ──────────────────────────────────────────────
  if(diseno === 'regresion-multiple') {
    titulo = 'Modelo de Regresión Múltiple';
    nota = 'Los predictores (X) se asocian con la variable dependiente (Y)';
    const predictores = vars.length >= 2 ? vars.slice(0, vars.length-1) : vars.slice(0,2).concat(['Predictor 2']);
    const Y = vars.length >= 2 ? vars[vars.length-1] : 'Variable Y';
    const n = Math.min(predictores.length, 4);
    const step = H / (n+1);
    for(let i=0;i<n;i++) {
      const py = step*(i+1) - 25;
      svgContent += box(20, py, 155, 46, predictores[i], C.x, C.xbg);
      svgContent += line(175, py+23, 370, 117, C.x, `β${i+1}`);
    }
    svgContent += box(370, 97, 155, 46, Y, C.y, C.ybg);
    if(vars.length > 5) svgContent += `<text x="100" y="${H-10}" text-anchor="middle" font-size="10" fill="#888" font-family="system-ui">+${vars.length-4} predictores más</text>`;
  }

  // ── MEDIACIÓN ───────────────────────────────────────────────────────
  else if(diseno === 'mediacion') {
    titulo = 'Modelo de Mediación';
    nota = 'El efecto de X sobre Y opera a través del mediador M (efecto indirecto: a×b)';
    const X = vars[0]||'Variable X', M = vars[1]||'Mediador', Y = vars[2]||'Variable Y';
    svgContent += box(20, 110, 140, 46, X, C.x, C.xbg);
    svgContent += box(215, 20, 150, 46, M, C.m, C.mbg);
    svgContent += box(420, 110, 140, 46, Y, C.y, C.ybg);
    svgContent += line(160, 133, 420, 133, C.x, "c' (directo)");
    svgContent += line(160, 120, 215, 52, C.m, 'a');
    svgContent += line(365, 52, 420, 120, C.m, 'b');
    svgContent += `<text x="290" y="${H-5}" text-anchor="middle" font-size="10" fill="#888" font-family="system-ui">Efecto indirecto = a × b</text>`;
  }

  // ── MODERACIÓN ──────────────────────────────────────────────────────
  else if(diseno === 'moderacion') {
    titulo = 'Modelo de Moderación';
    nota = 'El moderador (W) cambia la fuerza o dirección de la relación X → Y';
    const X = vars[0]||'Variable X', W = vars[1]||'Moderador', Y = vars[2]||'Variable Y';
    svgContent += box(20, 115, 140, 46, X, C.x, C.xbg);
    svgContent += box(420, 115, 140, 46, Y, C.y, C.ybg);
    svgContent += box(205, 25, 150, 46, W, C.mo, C.mobg);
    const id1 = 'amod1', id2 = 'amod2';
    svgContent += `<defs>${arrowDef(id1,C.x)}${arrowDef(id2,C.mo)}</defs>`;
    svgContent += `<line x1="160" y1="138" x2="420" y2="138" stroke="${C.x}" stroke-width="2" marker-end="url(#${id1})"/>`;
    svgContent += `<line x1="280" y1="71" x2="280" y2="132" stroke="${C.mo}" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#${id2})"/>`;
    svgContent += `<rect x="236" y="132" width="88" height="18" rx="4" fill="white" stroke="${C.mo}" stroke-width="1"/>`;
    svgContent += `<text x="280" y="145" text-anchor="middle" font-size="10" fill="${C.mo}" font-weight="600" font-family="system-ui">X × W</text>`;
  }

  // ── MEDIACIÓN MODERADA ──────────────────────────────────────────────
  else if(diseno === 'mediacion-moderada') {
    titulo = 'Modelo de Mediación Moderada';
    nota = 'El moderador (W) afecta la trayectoria de mediación (ruta a o b)';
    const X=vars[0]||'X', M=vars[1]||'Mediador', Y=vars[2]||'Y', W=vars[3]||'Moderador';
    svgContent += box(15, 115, 120, 44, X, C.x, C.xbg);
    svgContent += box(220, 25, 140, 44, M, C.m, C.mbg);
    svgContent += box(425, 115, 120, 44, Y, C.y, C.ybg);
    svgContent += box(220, 190, 140, 44, W, C.mo, C.mobg);
    svgContent += line(135, 137, 425, 137, C.x, "c'");
    svgContent += line(135, 122, 220, 52, C.m, 'a');
    svgContent += line(360, 52, 425, 122, C.m, 'b');
    const idw = 'awmod';
    svgContent += `<defs>${arrowDef(idw,C.mo)}</defs>`;
    svgContent += `<line x1="290" y1="190" x2="290" y2="73" stroke="${C.mo}" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#${idw})"/>`;
    svgContent += `<text x="305" y="140" font-size="9" fill="${C.mo}" font-family="system-ui">modera a o b</text>`;
  }

  // ── PATH ANALYSIS ───────────────────────────────────────────────────
  else if(diseno === 'path-analysis') {
    titulo = 'Diagrama de Rutas (Path Analysis)';
    nota = 'Muestra efectos directos e indirectos entre variables. Los coeficientes β indican la magnitud.';
    const v = [...vars];
    while(v.length < 4) v.push(`Var ${v.length+1}`);
    svgContent += box(15, 60, 130, 44, v[0], C.x, C.xbg);
    svgContent += box(15, 170, 130, 44, v[1], C.x, C.xbg);
    svgContent += box(225, 110, 130, 44, v[2], C.m, C.mbg);
    svgContent += box(430, 110, 130, 44, v[3], C.y, C.ybg);
    svgContent += line(145, 82, 225, 122, C.x, 'β1');
    svgContent += line(145, 192, 225, 132, C.x, 'β2');
    svgContent += line(355, 132, 430, 132, C.m, 'β3');
    svgContent += line(145, 82, 430, 120, C.x, '', true);
    if(v.length > 4) svgContent += `<text x="290" y="${H-5}" text-anchor="middle" font-size="10" fill="#888">+${v.length-4} variables adicionales</text>`;
  }

  // ── SEM ─────────────────────────────────────────────────────────────
  else if(diseno === 'sem') {
    titulo = 'Modelo de Ecuaciones Estructurales (SEM)';
    nota = 'Las elipses representan variables latentes; los rectángulos, variables observadas (indicadores).';
    // Latente exógena (ξ) → Latente endógena (η)
    const ind1 = vars[0]||'Indicador 1', ind2 = vars[1]||'Indicador 2';
    const ind3 = vars[2]||'Indicador 3', ind4 = vars[3]||'Indicador 4';
    // Elipses para latentes
    svgContent += `<ellipse cx="160" cy="135" rx="75" ry="38" fill="#EEEDFE" stroke="${C.x}" stroke-width="2"/>`;
    svgContent += `<text x="160" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="${C.x}" font-family="system-ui">ξ (Latente</text>`;
    svgContent += `<text x="160" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="${C.x}" font-family="system-ui">Exógena)</text>`;
    svgContent += `<ellipse cx="420" cy="135" rx="75" ry="38" fill="${C.ybg}" stroke="${C.y}" stroke-width="2"/>`;
    svgContent += `<text x="420" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="${C.y}" font-family="system-ui">η (Latente</text>`;
    svgContent += `<text x="420" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="${C.y}" font-family="system-ui">Endógena)</text>`;
    // Indicadores exógena
    svgContent += box(20, 30, 100, 36, ind1, C.x, 'white');
    svgContent += box(20, 168, 100, 36, ind2, C.x, 'white');
    svgContent += line(120, 48, 148, 110, C.x, 'λ1');
    svgContent += line(120, 186, 148, 155, C.x, 'λ2');
    // Indicadores endógena
    svgContent += box(460, 30, 100, 36, ind3, C.y, 'white');
    svgContent += box(460, 168, 100, 36, ind4, C.y, 'white');
    svgContent += line(495, 135, 490, 60, C.y, 'λ3');
    svgContent += line(495, 140, 490, 180, C.y, 'λ4');
    // Ruta estructural
    svgContent += line(235, 135, 345, 135, C.m, 'γ');
  }

  const modalHtml = `
    <div id="modal-diagram" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)this.remove()">
      <div style="background:white;border-radius:16px;padding:24px;max-width:660px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <h3 style="font-size:15px;font-weight:700;color:#111;margin:0">${titulo}</h3>
          <button onclick="document.getElementById('modal-diagram').remove()" style="border:none;background:#f5f5f5;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;line-height:1">✕</button>
        </div>
        <p style="font-size:12px;color:#888;margin:0 0 12px">${nota}</p>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;border:1px solid #eee;border-radius:10px;background:#fafafa" xmlns="http://www.w3.org/2000/svg">
          ${svgContent}
        </svg>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
          <p style="font-size:11px;color:#bbb;margin:0">Generado automáticamente según tu diseño metodológico</p>
          <button onclick="downloadDiagram()" style="padding:7px 14px;border-radius:6px;border:1px solid #534AB7;color:#534AB7;background:transparent;cursor:pointer;font-size:12px;font-family:inherit">📥 Descargar SVG</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  window._lastDiagramSVG = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:#fafafa">${svgContent}</svg>`;
  window._lastDiagramTitle = titulo;
}

function downloadDiagram() {
  const svg = window._lastDiagramSVG;
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'modelo_teorico.svg'; a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
