<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>TesisProLab — Asistente IA para investigación</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 40'%3E%3Crect width='32' height='40' rx='8' fill='%234F46E5'/%3E%3Cpath d='M16 4C11 4,5 7,3 13 C1 18,2 23,5 27 C7 29,8 31,8 34 L16 37 Z' fill='white'/%3E%3Cpath d='M16 4C21 4,27 7,29 13 C31 18,30 23,27 27 C25 29,24 31,24 34 L16 37 Z' fill='white'/%3E%3Cline x1='16' y1='5' x2='16' y2='35' stroke='%234F46E5' stroke-width='1.2' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='22' r='3' fill='%234F46E5'/%3E%3Cpath d='M15 35 Q12 38,11 41' stroke='white' stroke-width='2' stroke-linecap='round' fill='none'/%3E%3Cpath d='M17 35 Q20 38,21 41' stroke='white' stroke-width='2' stroke-linecap='round' fill='none'/%3E%3Cellipse cx='16' cy='44' rx='3' ry='4' fill='white'/%3E%3C/svg%3E"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

/* ── TOKENS ──────────────────────────────────────────────────────── */
:root{
  --brand:#4F46E5;--brand-light:#EEF2FF;--brand-mid:#C7D2FE;--brand-dark:#3730A3;
  --green:#059669;--green-light:#ECFDF5;--green-mid:#A7F3D0;
  --amber:#D97706;--amber-light:#FFFBEB;
  --red:#DC2626;--red-light:#FEF2F2;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
  --gray-400:#9CA3AF;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 20px rgba(0,0,0,.07),0 2px 6px rgba(0,0,0,.04);
  --shadow-lg:0 8px 40px rgba(0,0,0,.09),0 2px 8px rgba(0,0,0,.05);
  --font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

/* ── RESET & BASE ────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font);
  background:#F5F5F7;
  min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
  padding:28px 16px 52px;
}

/* ── CARD ────────────────────────────────────────────────────────── */
.card{
  background:#fff;border-radius:var(--radius-xl);
  border:1px solid rgba(0,0,0,.06);
  padding:32px 28px;width:100%;max-width:640px;
  box-shadow:var(--shadow-lg);
  height:fit-content;
  overflow:hidden;
}

/* ── PRODUCT HEADER ──────────────────────────────────────────────── */
.product-header{
  margin-bottom:24px;
  padding-bottom:20px;
  border-bottom:1px solid var(--gray-100);
}
.product-name{
  display:flex;align-items:center;gap:10px;margin-bottom:4px;
}
.product-logo{
  width:34px;height:38px;border-radius:9px;
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:0 2px 8px rgba(79,70,229,.3);
  overflow:hidden;
}
.product-logo svg{width:22px;height:28px;display:block}
h2{
  font-size:20px;font-weight:800;color:var(--gray-900);
  letter-spacing:-0.5px;line-height:1.2;
}
h2 span{color:var(--brand)}
.product-subtitle{
  font-size:12px;color:var(--gray-400);font-weight:500;
  letter-spacing:.1px;padding-left:42px;
}

/* ── STEP BAR ────────────────────────────────────────────────────── */
.steps{display:flex;align-items:center;gap:0;margin-bottom:8px}
.step-circle{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;cursor:default;
  transition:all .4s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;
}
.step-circle.done{
  background:var(--brand);color:#fff;cursor:pointer;
  box-shadow:0 2px 8px rgba(79,70,229,.3);
}
.step-circle.active{
  background:#fff;color:var(--brand);
  border:2.5px solid var(--brand);
  box-shadow:0 0 0 4px rgba(79,70,229,.1);
}
.step-circle.pending{background:var(--gray-100);color:var(--gray-400)}
.step-line{height:2.5px;flex:1;transition:background .4s cubic-bezier(.4,0,.2,1)}
.step-line.done{background:var(--brand)}
.step-line.pending{background:var(--gray-200)}
.step-label{
  font-size:12px;color:var(--gray-500);margin-bottom:24px;
  font-weight:600;letter-spacing:.1px;
}

/* ── SECTION LABEL ───────────────────────────────────────────────── */
.section-label{
  font-size:12px;color:var(--gray-500);font-weight:700;
  margin-bottom:12px;display:flex;align-items:center;gap:6px;
  text-transform:uppercase;letter-spacing:.6px;
}

/* ── TOOLTIP ─────────────────────────────────────────────────────── */
.tooltip{position:relative;display:inline-flex;cursor:help}
.tooltip-icon{
  width:16px;height:16px;background:var(--brand);color:#fff;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;
}
.tooltip-text{
  visibility:hidden;width:240px;background:var(--gray-900);color:#fff;
  text-align:left;border-radius:var(--radius-sm);padding:10px 12px;
  position:absolute;z-index:10;bottom:130%;left:50%;margin-left:-120px;
  opacity:0;transition:opacity .3s ease;font-size:12px;line-height:1.5;
  font-weight:400;box-shadow:var(--shadow-md);
}
.tooltip-text::after{
  content:"";position:absolute;top:100%;left:50%;margin-left:-5px;
  border-width:5px;border-style:solid;border-color:var(--gray-900) transparent transparent transparent;
}
.tooltip:hover .tooltip-text{visibility:visible;opacity:1}

/* ── GRID ────────────────────────────────────────────────────────── */
.options{display:flex;flex-direction:column;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ── AREA BADGES (paso 1) ────────────────────────────────────────── */
.badge-area{
  padding:14px 12px;border-radius:var(--radius-md);cursor:pointer;
  text-align:center;border:1px solid rgba(79,70,229,.15);
  font-size:12px;font-weight:500;width:100%;
  transition:all .18s;position:relative;
  background:rgba(79,70,229,.05);color:var(--gray-700);
  box-shadow:0 1px 4px rgba(79,70,229,.06);
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.badge-area .area-icon{font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;width:48px;height:48px;flex-shrink:0}
.badge-area .area-icon svg{width:48px!important;height:48px!important}
.badge-area:hover{background:rgba(79,70,229,.09);border-color:rgba(79,70,229,.3);color:var(--brand-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,70,229,.1)}
.badge-area.active{
  border-color:rgba(79,70,229,.45);background:rgba(79,70,229,.12);
  color:var(--brand-dark);font-weight:600;
  box-shadow:0 0 0 3px rgba(79,70,229,.1),0 4px 16px rgba(79,70,229,.12);
}
.badge-area.active .area-icon svg g{fill:#4F46E5!important}
.badge-area.active .area-icon svg path{fill:#4F46E5!important}

/* ── OPTION BADGES (pasos 2-4) ───────────────────────────────────── */
.badge{
  padding:12px 16px;border-radius:var(--radius-md);cursor:pointer;
  text-align:left;border:1.5px solid var(--gray-200);
  background:var(--gray-50);font-size:14px;font-weight:500;
  width:100%;transition:all .18s;position:relative;
  color:var(--gray-700);box-shadow:var(--shadow-sm);
  word-break:break-word;overflow-wrap:break-word;box-sizing:border-box;
}
.badge:hover{border-color:var(--brand-mid);background:var(--brand-light);color:var(--brand-dark);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.badge.active{
  border:2px solid var(--brand);background:var(--brand-light);
  color:var(--brand-dark);font-weight:600;
  box-shadow:0 0 0 3px rgba(79,70,229,.12),var(--shadow-md);
}
.badge-priority{border-color:#A7F3D0;background:#F0FDF4}
.badge-priority:hover{border-color:#059669;background:#ECFDF5;color:#065F46}
.badge-title{font-weight:600;margin-bottom:2px;color:inherit}
.badge-desc{font-size:12px;color:var(--gray-500);margin-top:3px;line-height:1.4}
.badge-hint{
  font-size:11px;color:var(--gray-500);margin-top:5px;
  font-style:italic;display:inline-flex;align-items:center;gap:3px;
}
.badge-hint.recommended{color:var(--green);font-weight:600}

/* ── Enfoque tooltip expandido ─────────────────────────────────── */
.badge-enfoque-tooltip{
  display:none;margin-top:10px;padding:10px 12px;
  background:#F8FAFF;border:1px solid var(--brand-mid);
  border-radius:8px;font-size:12px;color:var(--gray-700);
  line-height:1.6;font-style:normal;text-align:left;
}
.badge-enfoque-tooltip .tooltip-fuente{
  display:block;margin-top:6px;font-size:10.5px;
  color:var(--gray-400);font-style:italic;
}
.badge:hover .badge-enfoque-tooltip{display:block}
.badge.active .badge-enfoque-tooltip{display:block}

/* ── CHIPS ───────────────────────────────────────────────────────── */
.chip{
  padding:8px 14px;border-radius:20px;cursor:pointer;font-size:13px;
  border:1.5px solid var(--gray-200);background:var(--gray-50);
  color:var(--gray-700);font-weight:500;transition:all .15s;
  position:relative;
}
.chip:hover{border-color:var(--green-mid);background:var(--green-light);color:var(--green)}
.chip.active{
  border:2px solid var(--green);background:var(--green-light);
  color:var(--green);font-weight:600;
  box-shadow:0 0 0 3px rgba(5,150,105,.1);
}
.chip.ai-chip{border-style:dashed;border-color:var(--green-mid)}
.chip.ai-chip::after{content:"ⓘ";font-size:10px;margin-left:4px;opacity:.6}
.chip-tooltip{
  display:none;position:fixed;
  width:220px;background:var(--gray-900);
  color:#fff;font-size:11px;line-height:1.5;padding:8px 10px;
  border-radius:8px;z-index:9999;text-align:left;font-weight:400;
  box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none;
}
.chip-tooltip::after{content:"";position:absolute;top:100%;left:20px;
  border:5px solid transparent;
  border-top-color:var(--gray-900)}
.chip:hover .chip-tooltip{display:block}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}

/* ── HINTS ───────────────────────────────────────────────────────── */
.hint{
  background:var(--brand-light);border-radius:var(--radius-sm);
  padding:10px 14px;font-size:13px;color:var(--brand-dark);
  margin-top:6px;border:1px solid var(--brand-mid);
  display:block;line-height:1.6;
  word-break:break-word;overflow-wrap:break-word;
  width:100%;box-sizing:border-box;
}
.hint strong{font-weight:700;color:inherit}
.hint.warning{background:var(--amber-light);color:var(--amber);border-color:#FDE68A}
.hint.success{background:var(--green-light);color:var(--green);border-color:var(--green-mid)}

/* ── INPUTS ──────────────────────────────────────────────────────── */
input[type=text],textarea{
  width:100%;font-size:16px;padding:10px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--gray-200);font-family:var(--font);
  margin-top:6px;background:var(--gray-50);color:var(--gray-900);
  transition:all .2s;
}
input[type=text]:focus,textarea:focus{
  outline:none;border-color:var(--brand);background:#fff;
  box-shadow:0 0 0 3px rgba(79,70,229,.1);
}
textarea{min-height:70px;resize:vertical}
.otro-input{border-color:var(--brand)!important;background:#fff!important}
.var-validation{margin-top:8px;font-size:12px;line-height:1.7}
.cambios-panel{background:#F8FAFF;border:1.5px solid #C7D2FE;border-radius:12px;padding:16px;margin-top:12px}
.alerta-termino{border-bottom:1.5px dashed #D97706;cursor:help;font-weight:600;position:relative;display:inline}
.alerta-termino-tooltip{display:none;position:absolute;bottom:130%;left:0;width:260px;background:#1F2937;color:#fff;font-size:11px;line-height:1.6;padding:10px 12px;border-radius:8px;z-index:999;font-weight:400;box-shadow:0 4px 16px rgba(0,0,0,.3);font-style:normal}
.alerta-termino-tooltip::after{content:"";position:absolute;top:100%;left:16px;border:5px solid transparent;border-top-color:#1F2937}
.alerta-termino:hover .alerta-termino-tooltip{display:block}
.cambios-panel-title{font-size:13px;font-weight:700;color:#3730A3;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.cambios-section{margin-bottom:14px}
.cambios-section-label{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.cambios-chip-group{display:flex;flex-wrap:wrap;gap:6px}
.cambios-chip{padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1.5px solid #E5E7EB;background:#fff;color:#374151;font-family:inherit;font-weight:500;transition:all .15s}
.cambios-chip:hover{border-color:#6366F1;color:#4F46E5;background:#EEF2FF}
.cambios-chip.sel{border-color:#4F46E5;background:#EEF2FF;color:#3730A3;font-weight:600}
.btn-aplicar{background:#4F46E5;color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;transition:all .2s}
.btn-aplicar:hover{background:#3730A3}
.btn-cancelar-cambios{background:none;border:1px solid #E5E7EB;color:#6B7280;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;margin-top:4px;margin-left:8px}
.var-ok{color:#065F46;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:6px;padding:4px 8px;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px}
.var-warn{color:#92400E;background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;padding:4px 8px;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px}
.var-error{color:#991B1B;background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:4px 8px;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px}
.var-validating{color:#6B7280;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:6px 10px;font-size:12px;display:flex;align-items:center;gap:8px}
/* ── ONBOARDING STEP -1 ─────────────────────────────────────────── */
.ob-wrap{padding:32px 24px 24px;max-width:420px;margin:0 auto}
.ob-label{font-size:11px;font-weight:700;color:#4F46E5;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.ob-q{font-size:21px;font-weight:500;color:var(--gray-900);line-height:1.35;margin-bottom:6px}
.ob-sub{font-size:13px;color:var(--gray-500);line-height:1.6;margin-bottom:20px}
.ob-textarea{width:100%;min-height:80px;resize:none;font-size:14px;border:1.5px solid var(--gray-200);border-radius:12px;padding:12px 15px;font-family:inherit;background:#fff;color:var(--gray-900);transition:border-color .2s;box-sizing:border-box}
.ob-textarea:focus{outline:none;border-color:#4F46E5}
.ob-textarea::placeholder{color:var(--gray-400)}
.ob-examples{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 18px}
.ob-example-chip{font-size:11px;border:0.5px solid var(--gray-200);border-radius:14px;padding:5px 10px;color:var(--gray-500);cursor:pointer;background:var(--gray-50);font-family:inherit;transition:all .15s}
.ob-example-chip:hover{border-color:#4F46E5;color:#4F46E5;background:#EEF2FF}
.ob-btn-primary{width:100%;padding:13px;border-radius:12px;background:#4F46E5;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;margin-bottom:10px}
.ob-btn-primary:hover{background:#3730A3}
.ob-btn-primary:disabled{opacity:.45;cursor:not-allowed;background:#4F46E5}
.ob-divider{display:flex;align-items:center;gap:10px;margin:2px 0 10px}
.ob-divider::before,.ob-divider::after{content:'';flex:1;height:0.5px;background:var(--gray-200)}
.ob-divider span{font-size:12px;color:var(--gray-400)}
.ob-btn-guide{width:100%;padding:11px;border-radius:12px;background:none;border:1px solid var(--gray-200);font-size:13px;font-weight:500;color:var(--gray-600);cursor:pointer;font-family:inherit;margin-bottom:8px;transition:all .15s}
.ob-btn-guide:hover{border-color:#4F46E5;color:#4F46E5;background:#F5F3FF}
.ob-btn-skip{width:100%;padding:10px;border-radius:12px;background:none;border:none;font-size:13px;color:var(--gray-400);cursor:pointer;font-family:inherit;transition:color .15s}
.ob-btn-skip:hover{color:var(--gray-600)}
.ob-back{font-size:12px;color:var(--gray-400);background:none;border:none;cursor:pointer;font-family:inherit;margin-bottom:20px;display:flex;align-items:center;gap:4px;padding:0}
.ob-back:hover{color:var(--gray-600)}
.ob-prog{display:flex;gap:5px;margin-bottom:28px}
.ob-prog-dot{height:3px;border-radius:2px;flex:1;background:var(--gray-200);transition:background .2s}
.ob-prog-dot.done{background:#4F46E5}
.ob-prog-dot.active{background:#818CF8}
.ob-big-q{font-size:21px;font-weight:500;color:var(--gray-900);line-height:1.35;margin-bottom:24px}
.ob-opt{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--gray-200);background:#fff;font-size:14px;color:var(--gray-700);cursor:pointer;text-align:left;font-family:inherit;line-height:1.4;transition:all .18s;display:block;margin-bottom:9px}
.ob-opt:hover{border-color:#4F46E5;color:#3730A3;background:#FAFAFE}
.ob-opt.chosen{border-color:#4F46E5;background:#EEF2FF;color:#3730A3;font-weight:500}
.ob-more{width:100%;padding:11px;border-radius:12px;border:1px dashed var(--gray-200);background:none;font-size:13px;color:var(--gray-400);cursor:pointer;font-family:inherit;transition:all .18s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.ob-more:hover{border-color:#4F46E5;color:#4F46E5}
.ob-extra-opt{width:100%;padding:11px 14px;border-radius:12px;border:1px solid #C7D2FE;background:#EEF2FF;font-size:13px;color:#3730A3;cursor:pointer;text-align:left;font-family:inherit;line-height:1.4;transition:all .18s;display:block;margin-bottom:7px}
.ob-extra-opt:hover{border-color:#4F46E5;background:#E0E7FF}
.ob-extra-opt.chosen{border-color:#4F46E5;font-weight:500}
.ob-free-wrap{margin-top:8px;position:relative}
.ob-free-sep{height:0.5px;background:var(--gray-200);margin:10px 0 10px}
.ob-free-label{font-size:12px;color:var(--gray-500);margin-bottom:7px}
.ob-free-input{width:100%;font-size:13px;border:1.5px solid #4F46E5;border-radius:10px;padding:11px 44px 11px 14px;font-family:inherit;background:#fff;color:var(--gray-900);box-sizing:border-box}
.ob-free-input:focus{outline:none}
.ob-free-input::placeholder{color:var(--gray-400)}
.ob-free-send{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:7px;background:#4F46E5;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ob-skip{text-align:center;margin-top:14px}
.ob-skip-btn{background:none;border:none;font-size:12px;color:var(--gray-400);cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:3px}
.ob-skip-btn:hover{color:var(--gray-600)}
.ob-hyp-card{border:1.5px solid var(--gray-200);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .18s}
.ob-hyp-card:hover{border-color:#818CF8;background:#FAFAFE}
.ob-hyp-card.chosen{border-color:#4F46E5;background:#EEF2FF}
.ob-hyp-area{font-size:10px;font-weight:700;color:#4F46E5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ob-hyp-title{font-size:14px;font-weight:500;color:var(--gray-900);margin-bottom:6px;line-height:1.35}
.ob-hyp-vars{display:flex;flex-wrap:wrap;gap:4px}
.ob-hyp-var{font-size:11px;padding:3px 8px;border-radius:10px;background:#F3F4F6;color:#374151;border:0.5px solid #E5E7EB}
.ob-hyp-var.hi{background:#ECFDF5;color:#065F46;border-color:#A7F3D0}
.ob-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:16px}
.ob-loading-dots{display:flex;gap:6px}
.ob-dot{width:8px;height:8px;border-radius:50%;background:#818CF8}
@keyframes ob-bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
.ob-dot:nth-child(1){animation:ob-bounce 1.2s ease infinite}
.ob-dot:nth-child(2){animation:ob-bounce 1.2s ease .2s infinite}
.ob-dot:nth-child(3){animation:ob-bounce 1.2s ease .4s infinite}

.perfil-blk{margin-bottom:12px}

.pvar-off{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:5px 11px;border-radius:18px;border:0.5px solid var(--gray-200);color:var(--gray-500);background:#fff;cursor:pointer;transition:all .15s}

.pvar-add{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:5px 11px;border-radius:18px;border:1px dashed var(--gray-300);color:var(--gray-400);cursor:pointer;background:none;font-family:inherit}
.pvar-add:hover{border-color:#4F46E5;color:#4F46E5}
.ctx-strip{background:#1E1B4B;border-radius:10px;padding:9px 14px;margin-bottom:16px;font-size:12px;color:rgba(255,255,255,.8);line-height:1.5}
.ctx-strip strong{color:#fff;font-weight:600}
.hint-exploracion{background:#F0FDF4;border:0.5px solid #A7F3D0;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#065F46;line-height:1.6}

/* ── SELECTED VARS BOX ──────────────────────────────────────────── */
.sel-vars-box{
  margin-top:14px;border:1.5px solid #C7D2FE;border-radius:var(--radius-md);
  background:#F8FAFF;padding:10px 12px;
  animation:fadeInUp .25s ease;
}
.sel-vars-title{
  font-size:10px;font-weight:700;color:#4F46E5;text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.sel-vars-list{display:flex;flex-wrap:wrap;gap:6px}
.sel-var-tag{
  display:inline-flex;align-items:center;gap:5px;padding:5px 10px;
  border-radius:16px;font-size:12px;font-weight:600;
  border:1.5px solid #818CF8;background:#EEF2FF;color:#3730A3;

}
.sel-var-tag.multicol{
  border-color:#D97706;background:#FFFBEB;color:#92400E;
}
.sel-var-tag .remove-btn{
  background:none;border:none;cursor:pointer;padding:0;line-height:1;
  color:inherit;opacity:.6;font-size:13px;display:flex;align-items:center;
  transition:opacity .15s;
}
.sel-var-tag .remove-btn:hover{opacity:1}
.sel-var-tag .multicol-badge{
  font-size:9px;background:#D97706;color:#fff;border-radius:8px;
  padding:1px 5px;font-weight:700;cursor:help;
}

/* ── NAV BUTTONS ─────────────────────────────────────────────────── */
.nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:32px;padding-top:20px;border-top:1px solid var(--gray-100);
  gap:12px;
}
.btn{
  padding:11px 22px;border-radius:var(--radius-md);font-size:14px;
  cursor:pointer;font-family:var(--font);border:none;
  transition:all .35s cubic-bezier(.4,0,.2,1);font-weight:600;letter-spacing:.1px;
}
.btn-back{
  border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-400);
  font-weight:500;
}
.btn-back:hover{background:var(--gray-50);border-color:var(--gray-300);color:var(--gray-600)}
.btn-back:disabled{opacity:.3;cursor:not-allowed}
.btn-next{
  background:var(--brand);
  color:#fff;padding:12px 32px;
  box-shadow:0 2px 12px rgba(79,70,229,.3);
  border-radius:var(--radius-md);
}
.btn-next:hover{background:var(--brand-dark);box-shadow:0 4px 18px rgba(79,70,229,.4);transform:translateY(-1px)}
.btn-next:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed;box-shadow:none;transform:none}

/* ── MINI COHERENCE WIDGET ───────────────────────────────────────── */
.mini-coherence{
  margin-top:18px;border-radius:var(--radius-md);padding:12px 14px;
  border:1px solid transparent;animation:fadeInUp .35s ease;
}
@keyframes fadeInUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mini-coherence.alta{background:#ECFDF5;border-color:#A7F3D0}
.mini-coherence.media{background:#FFFBEB;border-color:#FDE68A}
.mini-coherence.baja{background:#FEF2F2;border-color:#FECACA}
.mini-coherence-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mini-coherence-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.alta .mini-coherence-badge{background:#059669;color:#fff}
.media .mini-coherence-badge{background:#D97706;color:#fff}
.baja .mini-coherence-badge{background:#DC2626;color:#fff}
.mini-coherence-title{font-size:13px;font-weight:700}
.alta .mini-coherence-title{color:#065F46}
.media .mini-coherence-title{color:#92400E}
.baja .mini-coherence-title{color:#991B1B}
.mini-coherence-positive{font-size:12px;display:flex;align-items:flex-start;gap:5px;padding:2px 0}
.alta .mini-coherence-positive{color:#065F46}
.media .mini-coherence-positive,.baja .mini-coherence-positive{color:#78350F}
.mini-coherence-alert{font-size:12px;background:#FEF3C7;color:#92400E;padding:5px 9px;border-radius:6px;margin-top:4px;display:flex;align-items:flex-start;gap:5px}
.mini-coherence-tip{font-size:12px;color:#1D4ED8;background:#EFF6FF;padding:5px 9px;border-radius:6px;margin-top:4px;border-left:3px solid #3B82F6}
.mini-coherence-progress{height:3px;border-radius:3px;margin-top:10px;background:var(--gray-200);overflow:hidden}
.mini-coherence-progress-bar{height:100%;border-radius:3px;transition:width .6s ease}
.alta .mini-coherence-progress-bar{background:var(--green);width:90%}
.media .mini-coherence-progress-bar{background:var(--amber);width:55%}
.baja .mini-coherence-progress-bar{background:var(--red);width:25%}

/* ── CONTENT AREA ────────────────────────────────────────────────── */
.content{min-height:280px}
.gap20{display:flex;flex-direction:column;gap:20px}

/* ── RESULT CARDS ────────────────────────────────────────────────── */
.result-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;
  padding-bottom:14px;border-bottom:1px solid var(--gray-100);
}
.result-header p{font-size:13px;color:var(--gray-400);font-weight:400}
.result-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-sm{
  padding:7px 12px;border-radius:var(--radius-sm);font-size:12px;
  cursor:pointer;font-family:var(--font);border:1.5px solid var(--gray-200);
  background:#fff;color:var(--gray-500);
  transition:all .3s cubic-bezier(.4,0,.2,1);font-weight:500;
}
.btn-sm:hover{background:var(--gray-50);border-color:var(--gray-300);color:var(--gray-700)}
.btn-edit{border-color:var(--gray-200);color:var(--gray-500)}
.btn-regen{border-color:var(--brand-mid);color:var(--brand);background:var(--brand-light)}
.btn-regen:hover{background:var(--brand);color:#fff;border-color:var(--brand)}
/* Primary download CTA — visually dominant */
.btn-download{
  background:var(--green);color:#fff;border-color:var(--green);
  padding:8px 16px;font-weight:700;box-shadow:0 2px 8px rgba(5,150,105,.25);
}
.btn-download:hover{background:#047857;border-color:#047857;box-shadow:0 4px 14px rgba(5,150,105,.35);transform:translateY(-1px)}
.btn-download.loading{opacity:.6;pointer-events:none;cursor:wait}
.result-block{
  border-radius:var(--radius-md);padding:18px 20px;margin-bottom:10px;
  border:1px solid transparent;
  transition:box-shadow .3s ease;
}
.result-block:hover{box-shadow:var(--shadow-sm)}
.result-block-label{
  font-size:10px;font-weight:700;margin-bottom:10px;
  text-transform:uppercase;letter-spacing:1.4px;
}
.result-block p{font-size:16px;line-height:1.75;color:var(--gray-800)}
.result-block textarea{
  font-size:15px;padding:10px;border-radius:var(--radius-sm);
  min-height:70px;width:100%;border:1.5px solid rgba(0,0,0,.1);
  background:rgba(255,255,255,.6);font-family:var(--font);
  line-height:1.7;
}

/* ── SUMMARY ─────────────────────────────────────────────────────── */
.summary{
  margin-top:6px;padding:16px 20px;background:var(--gray-50);
  border-radius:var(--radius-md);border:1px solid var(--gray-200);
}
.summary p.title{font-size:11px;color:var(--gray-400);margin-bottom:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.summary-grid p{font-size:12px;color:var(--gray-600);padding:4px 0}
.summary-grid span{color:var(--gray-400);font-weight:500}

/* ── LOADING ─────────────────────────────────────────────────────── */
.loading{text-align:center;padding:56px 0}
.loading .icon{font-size:36px;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
.loading p{color:var(--gray-400);font-size:14px;font-weight:500}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── GENERATE BOX ────────────────────────────────────────────────── */
.generate-box{text-align:center;padding:36px 0}
.generate-box p{margin-bottom:28px;font-size:15px;color:var(--gray-500);line-height:1.65}

.btn-generate{
  padding:15px 40px;border-radius:var(--radius-md);
  background:var(--brand);
  color:#fff;border:none;font-size:16px;font-weight:700;
  cursor:pointer;font-family:var(--font);
  box-shadow:0 4px 18px rgba(79,70,229,.35);
  transition:all .35s cubic-bezier(.4,0,.2,1);letter-spacing:.1px;
}
.btn-generate:hover{background:var(--brand-dark);transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,70,229,.4)}

/* ── FOOTER ──────────────────────────────────────────────────────── */
.footer{
  text-align:center;margin-top:28px;padding-top:18px;
  border-top:1px solid var(--gray-100);font-size:12px;
  color:var(--gray-400);display:flex;justify-content:center;
  align-items:center;gap:8px;flex-wrap:wrap;
}
.footer strong{color:var(--gray-500);font-weight:600}
.footer a{color:var(--brand);text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}

/* ── NEXT STEPS ──────────────────────────────────────────────────── */
.next-steps{
  margin-top:16px;padding:20px;
  background:#fff;
  border-radius:var(--radius-md);
  border:1px solid var(--gray-200);
}
.next-steps-title{
  font-size:13px;font-weight:700;color:var(--gray-700);
  margin-bottom:14px;
  text-transform:uppercase;letter-spacing:.5px;
}
.next-steps ul{list-style:none;padding:0}
.next-steps li{
  padding:10px 0 10px 20px;font-size:14px;color:var(--gray-700);
  line-height:1.65;border-bottom:1px solid var(--gray-100);
  position:relative;word-break:break-word;
}
.next-steps li:last-child{border-bottom:none;padding-bottom:0}
.next-steps li::before{
  content:'';position:absolute;left:0;top:19px;
  width:6px;height:6px;border-radius:50%;
  background:var(--brand);flex-shrink:0;
}
.next-steps li:last-child{border-bottom:none}

/* ── AUTO SAVE ───────────────────────────────────────────────────── */
.auto-save{
  position:fixed;bottom:20px;right:20px;background:#fff;
  border:1px solid var(--gray-200);padding:8px 14px;border-radius:20px;
  font-size:11px;color:var(--gray-500);font-family:var(--font);font-weight:600;
  box-shadow:var(--shadow-md);display:none;
}
.auto-save.show{display:flex;align-items:center;gap:6px;animation:slideUp .4s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── ERROR ───────────────────────────────────────────────────────── */
.error{color:var(--red);font-size:13px;font-weight:500}

/* ── REFERENCIAS ─────────────────────────────────────────────────── */
.refs{
  margin-top:20px;padding:18px;
  background:#fff;border-radius:var(--radius-md);
  border:1px solid var(--gray-200);
}
.refs-title{
  font-size:11px;font-weight:700;color:var(--gray-500);margin-bottom:14px;
  text-transform:uppercase;letter-spacing:.6px;
}
.refs-item{
  padding:9px 0;border-bottom:1px solid var(--gray-100);
  font-size:12px;line-height:1.75;color:var(--gray-700);
  word-break:break-all;overflow-wrap:anywhere;
}
.refs-item:last-child{border-bottom:none;padding-bottom:0}
.refs-item em{font-style:italic}
.refs-note{font-size:11px;color:var(--gray-400);margin-top:3px;font-style:italic;display:block}

/* ── TOUCH TARGETS BASE ──────────────────────────────────────────── */
.badge,.badge-area,.chip,.btn,.btn-sm,.btn-generate{
  min-height:44px;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

/* ── TABLET (≤768px) ─────────────────────────────────────────────── */
@media (max-width:768px){
  body{padding:8px 10px 16px}
  .card{padding:16px 16px;border-radius:var(--radius-lg)}
  h2{font-size:18px}
  .steps{gap:0}
  .step-circle{width:30px;height:30px;font-size:12px}
  .grid2,.grid3{grid-template-columns:1fr;gap:10px}
  .badge-area{flex-direction:row;text-align:left;padding:12px 14px;gap:10px}
  .badge-area .area-icon{font-size:20px}
  .nav{flex-direction:column;gap:10px;margin-top:24px}
  .btn{width:100%;padding:14px 20px;font-size:15px}
  .btn-next{order:-1}
  .result-actions{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .btn-sm{padding:11px 8px;text-align:center;font-size:13px}
  .result-block p{font-size:15px}
  .summary-grid{grid-template-columns:1fr}
  .auto-save{bottom:12px;right:12px}
  .product-subtitle{padding-left:0;margin-top:4px}
}

/* ── MÓVIL (≤480px) ──────────────────────────────────────────────── */
@media (max-width:480px){
  body{padding:8px 6px 28px}
  .card{padding:18px 14px;border-radius:var(--radius-md)}
  h2{font-size:17px}
  .steps{overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .result-actions{grid-template-columns:1fr}
  .btn-sm{width:100%;min-height:48px;font-size:14px}
  .result-block p{font-size:14px;line-height:1.75}
  .footer{font-size:11px}
  .product-logo{width:28px;height:28px}
  h2{font-size:16px}
}}

/* ── MODAL DIAGRAMA ──────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.6);z-index:1000;
  display:flex;align-items:center;justify-content:center;
  padding:12px;box-sizing:border-box;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.modal-inner{
  background:#fff;border-radius:var(--radius-xl);padding:24px;
  width:100%;max-width:700px;
  box-shadow:0 32px 80px rgba(0,0,0,.25);
  max-height:92vh;overflow-y:auto;box-sizing:border-box;
  -webkit-overflow-scrolling:touch;
}
@media (max-width:480px){
  .modal-inner{padding:16px 14px;border-radius:var(--radius-lg);max-height:95vh}
}

/* ── REGEN LIMIT TOAST ───────────────────────────────────────────── */
#regen-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1F2937;color:#fff;padding:12px 20px;border-radius:12px;
  font-size:13px;font-weight:600;font-family:var(--font);
  box-shadow:0 8px 30px rgba(0,0,0,.25);
  display:flex;align-items:center;gap:10px;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .35s;
  opacity:0;z-index:9999;max-width:340px;text-align:center;
  pointer-events:none;
}
#regen-toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#regen-toast .toast-icon{font-size:18px;flex-shrink:0}
#regen-toast .toast-bar{
  height:3px;background:#EF4444;border-radius:2px;
  position:absolute;bottom:0;left:0;right:0;border-radius:0 0 12px 12px;
  animation:toast-shrink 4s linear forwards;
}
@keyframes toast-shrink{from{width:100%}to{width:0%}}

// ── JSON SANITIZER ───────────────────────────────────────────────
function sanitizeJSON(str) {
  if (!str) return '';
  var fenceA = String.fromCharCode(96); var fence = fenceA+fenceA+fenceA;
  str = str.split(fence+'json').join('').split(fence).join('').trim();
  // Extract first JSON array or object
  var firstBracket = str.indexOf('[');
  var firstBrace   = str.indexOf('{');
  var start = -1;
  if (firstBracket >= 0 && (firstBrace < 0 || firstBracket < firstBrace)) start = firstBracket;
  else if (firstBrace >= 0) start = firstBrace;
  if (start > 0) str = str.slice(start);
  var lastBracket = str.lastIndexOf(']');
  var lastBrace   = str.lastIndexOf('}');
  var end = Math.max(lastBracket, lastBrace);
  if (end >= 0 && end < str.length - 1) str = str.slice(0, end + 1);
  // Remove dangerous control chars but KEEP valid UTF-8 (accented Spanish chars, etc.)
  var result = '';
  for (var i = 0; i < str.length; i++) {
    var code = str.charCodeAt(i);
    if (code === 0x2028 || code === 0x2029) continue; // line/paragraph separators
    if (code < 32 && code !== 9 && code !== 10 && code !== 13) continue; // real control chars only
    result += str[i];
  }
  return result;
}

function repairJSON(str) {
  // Step 1: fix unescaped control chars inside strings + trailing commas

// Detecta qué variables seleccionadas colisionan entre sí
function detectarMulticolinealidad(varsSeleccionadas) {
  const conflictos = {}; // varName → [lista de vars con las que colisiona]
  const vsLower = varsSeleccionadas.map(v => v.toLowerCase().trim());

  // 1. Check against PARES_MULTICOLINEAL (exact/partial match)
  PARES_MULTICOLINEAL.forEach(([a, b]) => {
    const aL = a.toLowerCase(), bL = b.toLowerCase();
    const idxA = vsLower.findIndex(v => v === aL || v.includes(aL) || aL.includes(v));
    const idxB = vsLower.findIndex(v => v === bL || v.includes(bL) || bL.includes(v));
    if(idxA >= 0 && idxB >= 0 && idxA !== idxB) {
      const va = varsSeleccionadas[idxA];
      const vb = varsSeleccionadas[idxB];
      if(!conflictos[va]) conflictos[va] = [];
      if(!conflictos[vb]) conflictos[vb] = [];
      if(!conflictos[va].includes(vb)) conflictos[va].push(vb);
      if(!conflictos[vb].includes(va)) conflictos[vb].push(va);
    }
  });

  // 2. Semantic cluster check — catches AI-generated vars with similar concepts
  // Two vars conflict if they share the same semantic cluster
  SEMANTIC_CLUSTERS.forEach(cluster => {
    const matchedIdxs = [];
    vsLower.forEach((v, idx) => {
      const vWords = v.replace(/[()]/g,'').split(/\s+/);
      const matchScore = cluster.filter(keyword => {
        const kWords = keyword.split(/\s+/);
        // Match if 2+ significant words overlap, or if the keyword is fully contained
        return v.includes(keyword) || keyword.includes(v) ||
               kWords.filter(kw => kw.length > 4 && vWords.some(vw => vw.includes(kw) || kw.includes(vw))).length >= 2;
      }).length;
      if(matchScore > 0) matchedIdxs.push(idx);
    });
    // If 2+ selected vars match the same cluster, they potentially overlap
    if(matchedIdxs.length >= 2) {
      for(let i = 0; i < matchedIdxs.length; i++) {
        for(let j = i+1; j < matchedIdxs.length; j++) {
          const va = varsSeleccionadas[matchedIdxs[i]];
          const vb = varsSeleccionadas[matchedIdxs[j]];
          if(!conflictos[va]) conflictos[va] = [];
          if(!conflictos[vb]) conflictos[vb] = [];
          if(!conflictos[va].includes(vb)) conflictos[va].push(vb);
          if(!conflictos[vb].includes(va)) conflictos[vb].push(va);
        }
      }
    }
  });

  return conflictos;
}

// Función que devuelve las técnicas disponibles según nivel + diseño
function getTecnicasDisponibles(nivel, diseno) {
  // Experimental y cuasi-experimental: ANOVA/t-test, fuera del alcance
  if(diseno === 'experimental' || diseno === 'cuasiexperimental') return null;
  if(nivel === 'correlacional') {
    // Correlacional + longitudinal: las técnicas bivariadas estándar no son las apropiadas
    if(diseno === 'no-experimental-longitudinal') return 'correlacional_longitudinal';
    return TECNICAS_POR_NIVEL.correlacional;
  }
  if(nivel === 'explicativo') {
    if(diseno === 'no-experimental-longitudinal') return TECNICAS_POR_NIVEL.explicativo_longitudinal;
    return TECNICAS_POR_NIVEL.explicativo_transversal;
  }
  return null; // exploratorio y descriptivo: sin técnica avanzada
}

    if(r.tecnicas) {

    if(r.disenos && !r.disenos.includes('*')) {

}

function findInstrumento(varName) {
  if(!varName) return null;
  const lower = varName.toLowerCase();
  // Exact match
  if(INSTRUMENTOS_DATA[varName]) return INSTRUMENTOS_DATA[varName];
  // Case-insensitive partial match
  const entry = Object.entries(INSTRUMENTOS_DATA).find(([k]) =>
    lower.includes(k.toLowerCase()) || k.toLowerCase().includes(lower)
  );
  return entry ? entry[1] : null;
}

async function prefetchAIPoblaciones(manualRegen = false) {
  if(!state.area || state.area === 'otro' || state.aiPoblacionesLoading) return;
  // Requires geographic context — don't run without it
  const contexto = state.contexto ? state.contexto.trim() : '';
  if(!contexto) return;
  // Only guard manual re-triggers, not the auto first-load
  if (manualRegen && !canRegen('poblaciones')) return;
  if (manualRegen) incrementRegen('poblaciones');

  state.aiPoblacionesLoading = true;
  state.aiPoblaciones = [];
  if(state.step === 1) renderContent();

  const area = efectiveArea();
  const motivacion = state.motivacion ? state.motivacion.trim() : '';
  const problema = efectiveProblema() || '';

  const pobPrompt = `Eres un experto en investigación psicológica en el contexto peruano.

Un estudiante de pregrado en psicología quiere investigar en el área de "${area}".
Contexto geográfico declarado: "${contexto}"
${problema ? `Problema de interés: "${problema}"` : ''}
${motivacion ? `Motivación: "${motivacion}"` : ''}

Genera exactamente 7 poblaciones de estudio ANCLADAS al contexto geográfico declarado. Cada población debe:
1. Estar ubicada en "${contexto}" o una institución real de esa zona
2. Ser viable y accesible para un tesista que vive o estudia en ese lugar
3. Incluir características demográficas precisas (edad, condición, institución específica)
4. Ser coherente con el área de "${area}"
5. NO inventar regiones distintas al contexto declarado
6. Cubrir variedad de grupos (distintas edades, condiciones, tipos de institución de la zona)

REGLA CLAVE: si el contexto es "Lima, SJL" → TODAS las poblaciones deben ser de Lima/SJL o zonas cercanas. NO sugerir Cusco, Piura o Arequipa si el contexto es Lima.

Responde SOLO con un array JSON de 7 strings:
["Población 1 anclada al contexto","Población 2","Población 3","Población 4","Población 5","Población 6","Población 7"]`;

  try {
    const res = await AIQueue.fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 500,
        messages: [{role: 'user', content: pobPrompt}]
      })
    });
    if(!res.ok) throw new Error('API error');
    const data = await res.json();
    const text = (data.choices?.[0]?.message?.content) || (data.content?.map(b => b.text || '').join('')) || '';
    let parsed = null; try { parsed = safeParseJSON(text); } catch(_pe) { console.warn("[TesisProLab] JSON parse failed:", _pe.message); }
    if(Array.isArray(parsed) && parsed.length >= 2) {
      state.aiPoblaciones = parsed.map(p => String(p).trim()).filter(Boolean);
    }
  } catch(e) {
    state.aiPoblacionesLoading = false; // silent fail — static list remains
    if(state.step === 1) renderContent();
    return;
  }
  state.aiPoblacionesLoading = false;
  if(state.step === 1) renderContent();
  saveState();
}

async function generateAIInstruments(varsList) {
  if(!varsList || varsList.length === 0 || state.aiInstrumentsLoading) return;
  // Only run for qualitative (no standard scales) or vars not in static bank
  const sinInstrumento = varsList.filter(v => !findInstrumento(v));
  const isQual = state.enfoque === 'Cualitativo';

// Serializa todas las llamadas a /api/chat para evitar 429 en Groq
const AIQueue = {
  _queue: [],
  _running: false,
  _minGap: 3500,
  _lastCall: 0,
  _MAX_RETRIES: 4,

  async add(fn) {
    return new Promise((resolve, reject) => {
      this._queue.push({ fn, resolve, reject });
      this._run();
    });
  },

  async _run() {
    if (this._running) return;
    this._running = true;
    while (this._queue.length > 0) {
      const { fn, resolve, reject } = this._queue.shift();
      const now = Date.now();
      const wait = Math.max(0, this._minGap - (now - this._lastCall));
      if (wait > 0) await new Promise(r => setTimeout(r, wait));
      let lastErr;
      let succeeded = false;
      for (let attempt = 0; attempt <= this._MAX_RETRIES; attempt++) {
        try {
          this._lastCall = Date.now();
          const result = await fn();
          if (result && result.status === 429) {
            const backoff = Math.min(8000, 2000 * Math.pow(2, attempt));
            if (attempt < this._MAX_RETRIES) {
              if (typeof showRetryToast === 'function') showRetryToast(attempt + 1, backoff);
              await new Promise(r => setTimeout(r, backoff));
              if (typeof hideRetryToast === 'function') hideRetryToast();
              continue;
            }
          }
          resolve(result);
          succeeded = true;
          break;
        } catch (e) {
          lastErr = e;
          if (attempt < this._MAX_RETRIES) {
            const backoff = Math.min(8000, 2000 * Math.pow(2, attempt));
            await new Promise(r => setTimeout(r, backoff));
          }
        }
      }
      if (!succeeded && lastErr) reject(lastErr);
    }
    this._running = false;
  },

  async fetch(url, options) {
    return this.add(() => fetch(url, options));
  }
};

}

function showAutoSave() {

function efectiveArea(){return state.area==="otro"?state.areaOtro:AREAS.find(a=>a.id===state.area)?.label||"";}
function efectivePoblacion(){return state.poblacion==="otro"?state.poblacionOtro:state.poblacion;}
function efectiveProblema(){return state.problema==="otro"?state.problemaOtro:state.problema;}

// Combina población + lugar para usar en el paso 6
function getPoblacionCompleta(){
  const pob = efectivePoblacion();
  const lugar = state.contexto ? state.contexto.trim() : "";
  if(lugar) return `${pob} de ${lugar}`;
  return pob;
}

function canNext(){
  const s=state.step;
  if(s===-1) return false; // onboarding handled by inline buttons
  if(s===0){
    if(state.area==="otro") return state.areaOtro.trim()!=="";
    return state.area!=="";
  }
  if(s===1){
    if(state.poblacion==="otro") return state.poblacionOtro.trim()!=="";
    return state.poblacion!=="";
  }
  if(s===2){
    // Si problema es "otro", necesita problema especificado Y variables
    if(state.problema==="otro") {
      return state.problemaOtro.trim()!=="" && state.variablesOtro.trim()!=="";
    }
    // Si seleccionó "otro" en variables, necesita variables especificadas
    if(state.variables.includes('otro')) {
      return state.variables.length>0 && state.variablesOtro.trim()!=="";
    }
    // Caso normal: problema seleccionado y al menos una variable seleccionada
    // También válido si hay variables de texto libre
    const tieneVarsTexto = state.variablesOtro && state.variablesOtro.trim().length > 0;
    return state.problema!=="" && (state.variables.length>0 || tieneVarsTexto);
  }
  if(s===3){
    // Cualitativo y Mixto: solo necesitan diseño (no nivel)
    if(state.enfoque === "Cualitativo" || state.enfoque === "Mixto") {
      return state.diseno !== "";
    }
    if(!state.enfoque || !state.nivel || !state.diseno) return false;
    if(state.enfoque==="Cuantitativo"){
      // Experimental/cuasi: no requieren técnica del menú
      if(state.diseno==='experimental' || state.diseno==='cuasiexperimental') return true;
      // Correlacional + longitudinal: advertencia, puede continuar sin técnica
      if(state.nivel==='correlacional' && state.diseno==='no-experimental-longitudinal') return true;
      // Exploratorio/descriptivo: no requieren técnica avanzada
      if(state.nivel==='exploratorio' || state.nivel==='descriptivo') return true;
      // Correlacional/explicativo transversal: requieren técnica
      if(state.nivel==="correlacional" || state.nivel==="explicativo") return state.tecnica !== "";
    }
    return true;
  }
  if(s===4) return true; // step 4 ahora es Resultado
  return true;
}

function renderStepsBar(){
  if(state.step === -1) {
    document.getElementById("steps-bar").innerHTML = "";
    document.getElementById("step-label").textContent = "";
    return;
  }
  let h="";
  STEPS.forEach((name,i)=>{
    const done=i<state.step;
    const active=i===state.step;
    const pending=i>state.step;
    let cls=done?"done":active?"active":"pending";
    h+=`<div class="step-circle ${cls}" onclick="${done?`state.step=${i};render()`:''}">` + (done?'✓':i+1) + `</div>`;
    if(i<STEPS.length-1){
      h+=`<div class="step-line ${done?'done':'pending'}"></div>`;
    }
  });
  document.getElementById("steps-bar").innerHTML=h;
  document.getElementById("step-label").textContent=`${STEPS[state.step]}  · Paso ${state.step+1} de 5`;
}

// SUGERENCIAS AUTOMÁTICAS
function getAutoSuggestion() {
  if(!state.enfoque || !state.variables.length) return "";
  
  const nv = state.variables.filter(v => v !== 'otro').length;
  const enfoque = state.enfoque.toLowerCase();
  
  // Validación: Cualitativo con muchas variables
  if(enfoque === "cualitativo" && nv >= 4) {
    return `<div class="hint warning">⚠️ Para enfoque cualitativo, usualmente se trabaja con menos variables (1-2) y se profundiza más en cada una. ¿Estás seguro de necesitar ${nv} variables?</div>`;
  }
  
  // Sugerencia automática según variables
  if(nv === 1) {
    return `<div class="hint success">💡 Con 1 variable → nivel descriptivo. Diseño recomendado: ${enfoque === 'cuantitativo' ? 'no experimental transversal' : 'estudio de caso'}.</div>`;
  }
  if(nv === 2) {
    if(enfoque === 'cuantitativo') return `<div class="hint success">💡 Con 2 variables → nivel correlacional. Diseño recomendado: no experimental transversal.</div>`;
    return `<div class="hint success">💡 Con 2 categorías de análisis → nivel descriptivo. Diseño recomendado: estudio de caso múltiple.</div>`;
  }
  if(nv >= 3 && enfoque === 'cuantitativo') {
    return `<div class="hint success">💡 Con ${nv} variables → nivel correlacional o explicativo. Diseño recomendado: no experimental transversal (o experimental si puedes manipular).</div>`;
  }
  
  return "";
}

// ── MINI COHERENCE INDICATOR (reglas locales, sin API) ────────────
function getMiniCoherence() {
  if (!state.enfoque || !state.diseno) return null;
  if (state.enfoque !== 'Cualitativo' && state.enfoque !== 'Mixto' && !state.nivel) return null;
  let alerts = [], positives = [], tips = [];
  let vars = state.variables.filter(v => v !== 'otro');
  if (state.variables.includes('otro') && state.variablesOtro.trim())
    vars = vars.concat(state.variablesOtro.split(',').map(v => v.trim()).filter(Boolean));
  const nv = vars.length;
  const enfoqueKey = state.enfoque.toLowerCase();
  const disenoObj = DISENOS[enfoqueKey]?.find(d => d.id === state.diseno);
  if (state.enfoque === 'Cuantitativo') positives.push('Enfoque cuantitativo claro');
  if (state.enfoque === 'Cualitativo')  positives.push('Enfoque cualitativo definido');
  if (state.enfoque === 'Mixto')        positives.push('Enfoque mixto seleccionado');
  if (disenoObj) positives.push(`Diseño ${disenoObj.label} adecuado`);
  if (state.enfoque === 'Cuantitativo') {
    if (state.nivel === 'correlacional' && nv < 2)
      alerts.push('Nivel correlacional requiere al menos 2 variables');
    if (state.nivel === 'explicativo' && nv < 3)
      alerts.push('Nivel explicativo recomienda 3 o más variables');
    if ((state.tecnica === 'mediacion' || state.tecnica === 'sem-mediacion') && nv !== 3)
      alerts.push(`Mediación ${state.tecnica === 'sem-mediacion' ? 'SEM' : 'simple'} requiere exactamente 3 variables: X, M (mediador) e Y. Tienes ${nv}.`);
    if ((state.tecnica === 'moderacion' || state.tecnica === 'sem-moderacion') && nv < 3)
      alerts.push(`Moderación requiere exactamente 3 variables: X (predictor), W (moderador) e Y (criterio). Tienes ${nv}.`);
    if ((state.tecnica === 'moderacion' || state.tecnica === 'sem-moderacion') && nv > 3)
      alerts.push(`Moderación simple: requiere exactamente 3 variables (X, W, Y). Tienes ${nv}. Elimina una, o cambia a Mediación moderada (4 vars), Regresión múltiple, Path Analysis o SEM completo.`);
    if (state.tecnica === 'mediacion-moderada' && nv < 4)
      alerts.push(`Mediación moderada requiere 4 variables (tienes ${nv})`);
    if (state.tecnica === 'regresion-simple' && nv > 2)
      alerts.push(`Regresión simple: usa 1 predictor + 1 criterio (tienes ${nv}). Con ${nv} variables usa Regresión múltiple.`);
    if (state.tecnica === 'regresion-simple' && nv < 2)
      alerts.push(`Regresión simple requiere exactamente 2 variables: X (predictor) e Y (criterio).`);
    if (state.tecnica === 'regresion-multiple' && nv < 3)
      alerts.push(`Regresión múltiple requiere al menos 3 variables (tienes ${nv})`);
    if (['path-analysis','sem-mediacion','sem-moderacion','sem-completo'].includes(state.tecnica) && state.nivel === 'correlacional')
      alerts.push('SEM / Path Analysis requieren nivel explicativo');
    if (state.tecnica === 'correlacion' && nv > 2)
      tips.push(`Con ${nv} variables considera regresión múltiple o matriz de correlaciones`);
    // Multicollinearity check: if detected, it counts as an alert (lowers coherence)
    if (nv >= 2 && state.enfoque !== 'Cualitativo') {
      const conflictos = detectarMulticolinealidad(vars);
      if (Object.keys(conflictos).length > 0) {
        const pares = [];
        const vis = new Set();
        vars.forEach(v => {
          if(conflictos[v]) conflictos[v].forEach(v2 => {
            const p = [v,v2].sort().join('|');
            if(!vis.has(p)){vis.add(p);pares.push([v,v2]);}
          });
        });
        pares.forEach(([a,b]) => {
          alerts.push(`Posible multicolinealidad: "${a}" y "${b}" miden aspectos muy similares. Considera usar solo una.`);
        });
      }
    }
  }
  if (state.diseno === 'cuasiexperimental' && state.nivel && state.nivel !== 'explicativo')
    alerts.push('El diseño cuasi-experimental requiere nivel explicativo');
  if (state.enfoque === 'Cualitativo' && (state.nivel === 'correlacional' || state.nivel === 'explicativo'))
    alerts.push('El enfoque cualitativo no admite nivel correlacional ni explicativo');
  if (state.nivel && state.diseno && alerts.length === 0) {
    const nivelLabel = NIVELES.find(n => n.id === state.nivel)?.label;
    if (nivelLabel) positives.push(`Nivel ${nivelLabel.toLowerCase()} coherente`);
  }
  if (state.tecnica && alerts.length === 0) positives.push('Técnica compatible con el diseño');
  let nivel = alerts.length === 0 ? 'alta' : alerts.length === 1 ? 'media' : 'baja';
  const emojis = { alta:'✅', media:'⚠️', baja:'🔴' };
  const titles = { alta:'Perfil coherente hasta aquí', media:'Perfil con observaciones', baja:'Revisar coherencia' };
  return { nivel, emoji: emojis[nivel], title: titles[nivel], positives, alerts, tips };
}

function renderMiniCoherence(context) {
  const mc = getMiniCoherence();
  if (!mc) return '';
  let h = `<div class="mini-coherence ${mc.nivel}">`;
  h += `<div class="mini-coherence-header"><span style="font-size:15px">${mc.emoji}</span><span class="mini-coherence-title">${mc.title}</span><span class="mini-coherence-badge" style="margin-left:auto">Coherencia: ${mc.nivel}</span></div>`;
  mc.positives.slice(0,2).forEach(p => { h += `<div class="mini-coherence-positive"><span>✓</span><span>${p}</span></div>`; });
  mc.alerts.forEach(a => { h += `<div class="mini-coherence-alert"><span>⚠️</span><span>${a}</span></div>`; });
  mc.tips.forEach(t => { h += `<div class="mini-coherence-tip">💡 ${t}</div>`; });
  if (context === 'step4' && mc.nivel !== 'alta')
    h += `<div style="font-size:11px;color:var(--gray-400);margin-top:8px">← Regresa al paso anterior para ajustar el diseño metodológico</div>`;
  h += `<div class="mini-coherence-progress"><div class="mini-coherence-progress-bar"></div></div></div>`;
  return h;
}

  return `<div class="ob-wrap">

async function generarOpcionesGuiadas(qId, qi) {
  if(!state.guidedAILoading) state.guidedAILoading = {};
  if(!state.guidedRegenCount) state.guidedRegenCount = {};
  if(!state.guidedAIOptions) state.guidedAIOptions = {};
  const regenUsed = state.guidedRegenCount[qId] || 0;
  if(regenUsed >= 5) return;
  state.guidedAILoading[qId] = true;
  state.guidedExpanded = state.guidedExpanded || {};
  state.guidedExpanded[qId] = true;
  renderOnboarding(document.getElementById('content'));

  // Build context from previous answers
  const prevAnswers = Object.entries(state.guidedAnswers||{})
    .filter(([k,v]) => v && k !== qId)
    .map(([k,v]) => v).join(', ');
  const qTexto = PREGUNTAS_GUIADAS[qi]?.texto || '';
  const existing = [
    ...(PREGUNTAS_GUIADAS[qi]?.opciones||[]),
    ...(PREGUNTAS_GUIADAS[qi]?.extra||[]),
    ...(state.guidedAIOptions[qId]||[])
  ];
  const prompt = `El usuario está respondiendo una pregunta para definir su tema de investigación en psicología.
Pregunta: "${qTexto}"
Contexto previo: ${prevAnswers||'ninguno'}
Opciones ya mostradas: ${existing.join(', ')}

Genera exactamente 4 opciones NUEVAS y DISTINTAS a las ya mostradas, en español sencillo (sin tecnicismos), que respondan la pregunta. Sé específico y concreto.
Devuelve SOLO un array JSON: ["opción 1","opción 2","opción 3","opción 4"]`;

  try {
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:200,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = (data.choices?.[0]?.message?.content)||(data.content?.map(b=>b.text||'').join(''))||'';
    let parsed = null;
    try { parsed = safeParseJSON(text); } catch(e) {}
    if(Array.isArray(parsed) && parsed.length > 0) {
      state.guidedAIOptions[qId] = parsed.filter(o => !existing.includes(o));
      state.guidedRegenCount[qId] = regenUsed + 1;
    }
  } catch(e) { console.warn('AI guided options failed:', e.message); }
  state.guidedAILoading[qId] = false;
  saveState();
  renderOnboarding(document.getElementById('content'));
}

function guidedBack(qi) {
  if(qi === 0) {
    state.paso0Mode = null;
    renderOnboarding(document.getElementById('content'));
  } else {
    state.guidedStep = qi - 1;
    renderOnboarding(document.getElementById('content'));
  }
}

function selectGuidedAnswer(qId, answer, qi) {
  if(!answer || !answer.trim()) {
    // skip this question
    state.guidedAnswers[qId] = null;
  } else {
    state.guidedAnswers[qId] = answer;
  }
  state.guidedExpanded = {};
  state.guidedStep = qi + 1;
  if(state.guidedStep >= PREGUNTAS_GUIADAS.length) {
    // all answered — synthesize
    state.paso0Mode = 'B';
    state.explorationLoading = true;
    renderOnboarding(document.getElementById('content'));
    setTimeout(() => procesarRutaB(), 50);
  } else {
    renderOnboarding(document.getElementById('content'));
  }
  saveState();
}

async function regenPerfilVars() {
  const p = state.explorationProfile;
  if(!p || state._perfilRegenVars >= 5) return;
  state._perfilRegenLoading = true;
  renderOnboarding(document.getElementById('content'));

  const fenomeno = p.fenomeno || '';
  const area = p.area || '';
  const poblacion = p.poblacion || '';
  const enfoque = state.enfoque || 'cuantitativo';
  const existing = (p.variables||[]).join(', ');
  const isQual = enfoque.toLowerCase() === 'cualitativo';
  const tipo = isQual ? 'categorías de análisis cualitativo' : 'variables psicológicas cuantitativas';

  const prompt = `Sugiere exactamente 4 ${tipo} para estudiar "${fenomeno}" en "${poblacion}" (${area}).
Variables ya mostradas (NO repetir): ${existing}
Devuelve SOLO un array JSON: ["var1","var2","var3","var4"]`;

  try {
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:150,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = (data.choices?.[0]?.message?.content)||(data.content?.map(b=>b.text||'').join(''))||'';
    let parsed = null;
    try { parsed = safeParseJSON(text); } catch(e) {}
    if(Array.isArray(parsed) && parsed.length > 0) {
      const newVars = parsed.filter(v => !(p.variables||[]).includes(v));
      p.variables = [...(p.variables||[]), ...newVars];
      if(!p.selectedVars) p.selectedVars = [...(p._originalVars||[]).slice(0,3)];
      state._perfilRegenVars = (state._perfilRegenVars||0) + 1;
    }
  } catch(e) { console.warn('regenPerfilVars failed:', e); }
  state._perfilRegenLoading = false;
  saveState();
  renderOnboarding(document.getElementById('content'));
}

function restaurarVarsOriginales() {
  const p = state.explorationProfile;
  if(!p || !p._originalVars) return;
  // Restore original vars, keep any manually added ones
  const manualAdded = (p.variables||[]).filter(v => !p._originalVars.includes(v));
  p.variables = [...p._originalVars, ...manualAdded];
  // Reselect original ones
  p.selectedVars = [...p.variables.slice(0, 3)];
  saveState();
  renderOnboarding(document.getElementById('content'));
}

function eliminarPerfilVar(v) {
  const p = state.explorationProfile;
  if(!p) return;
  if(p.variables) p.variables = p.variables.filter(x=>x!==v);
  if(p.selectedVars) p.selectedVars = p.selectedVars.filter(x=>x!==v);
  saveState();
  renderOnboarding(document.getElementById('content'));
}

function agregarPerfilVar(v) {
  v = (v||'').trim();
  if(!v) { state._perfilAddingVar=false; renderOnboarding(document.getElementById('content')); return; }
  const p = state.explorationProfile;
  if(!p) return;
  if(!p.variables) p.variables = [];
  if(!p.selectedVars) p.selectedVars = [...(p.variables||[])];
  if(!p.variables.includes(v)) p.variables.push(v);
  if(!p.selectedVars.includes(v)) p.selectedVars.push(v);
  state._perfilAddingVar = false;
  saveState();
  renderOnboarding(document.getElementById('content'));
}

function togglePerfilVar(v) {
  const p = state.explorationProfile;
  if(!p) return;
  if(!p.selectedVars) p.selectedVars = [...(p.variables||[]).slice(0,3)];
  const idx = p.selectedVars.indexOf(v);
  if(idx > -1) p.selectedVars.splice(idx,1);
  else p.selectedVars.push(v);
  saveState();
  renderOnboarding(document.getElementById('content'));
}

function iniciarRutaA() {
  if(!state.explorationText.trim()) return;
  state.paso0Mode = 'A';
  state.explorationLoading = true;
  state.explorationHypotheses = null;
  state.explorationHypothesisIdx = -1;
  renderOnboarding(document.getElementById('content'));
  setTimeout(() => procesarRutaA(), 50);
}

function iniciarRutaB() {
  state.paso0Mode = 'B';
  state.guidedStep = 0;
  state.guidedAnswers = {};
  state.guidedExpanded = {};
  state.explorationLoading = false;
  renderOnboarding(document.getElementById('content'));
}

function iniciarRutaC() {
  // Go directly to step 0 (Area) with no preselection
  state.modoExploracion = false;
  state.explorationProfile = null;
  state.step = 0;
  saveState();
  render();
}

async function procesarRutaA() {
  const texto = state.explorationText;
  const areaIds = 'clinica|educativa|organizacional|social|deporte|consumidor|juridica|ambiental|positiva|pareja-familia|salud|desarrollo|neuropsicologia|adicciones|digital|emergencias|transcultural';
  const prompt = `Analiza esta inquietud de investigación en psicología: "${texto}"

Genera EXACTAMENTE 3 posibles enfoques de investigación. Devuelve SOLO JSON sin texto adicional:
[{"fenomeno":"fenómeno a estudiar máx 8 palabras","area":"Psicología X","areaId":"${areaIds}","poblacion":"descripción población máx 6 palabras","variables":["var1","var2","var3"]}]`;

  try {
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = (data.choices?.[0]?.message?.content)||(data.content?.map(b=>b.text||'').join(''))||'';

    }
  } catch(e) {
    iniciarRutaC(); return;
  }

  saveState();
  renderOnboarding(document.getElementById('content'));
}

  const ans = state.guidedAnswers;
  const areaIds = 'clinica|educativa|organizacional|social|deporte|consumidor|juridica|ambiental|positiva|pareja-familia|salud|desarrollo|neuropsicologia|adicciones|digital|emergencias|transcultural';

1. ¿A quién estudiarías?: "${q1}"
2. ¿En qué contexto?: "${q2}"
3. ¿Qué le preocupa?: "${q3}"

Genera UN perfil de investigación. Devuelve SOLO JSON sin texto adicional:
{"fenomeno":"fenómeno máx 8 palabras","area":"Psicología X","areaId":"${areaIds}","poblacion":"descripción población máx 6 palabras","variables":["var1","var2","var3","var4"]}`;

  try {
    const res = await fetch('/api/chat', {

function confirmarHipotesis() {
  const idx = state.explorationHypothesisIdx;
  const hyps = state.explorationHypotheses || [];
  if(idx < 0 || !hyps[idx]) return;
  const hp = {...hyps[idx]};
  if(hp.variables) hp._originalVars = [...hp.variables];
  state.explorationProfile = hp;
  state.paso0Mode = 'perfil';
  renderOnboarding(document.getElementById('content'));
}

function confirmarPerfil() {
  const p = state.explorationProfile;
  if(!p) { iniciarRutaC(); return; }
  // Apply profile to state
  state.modoExploracion = true;
  // Set area
  if(p.areaId && typeof AREAS !== 'undefined') {
    const found = AREAS.find(a => a.id === p.areaId);
    if(found) state.area = p.areaId;
  }
  // Set problema (fuzzy match to closest existing)
  if(p.fenomeno && state.area && typeof PROBLEMAS !== 'undefined') {
    const probs = PROBLEMAS[state.area] || [];
    const fenLow = p.fenomeno.toLowerCase();
    let best = null, bestScore = 0;
    probs.forEach(pr => {
      const words = fenLow.split(' ').filter(w=>w.length>3);
      const score = words.filter(w=>pr.toLowerCase().includes(w)).length;
      if(score > bestScore) { bestScore=score; best=pr; }
    });
    if(best && bestScore > 0) { state.problema = best; }
    else { state.problema = 'otro'; state.problemaOtro = p.fenomeno; }
  }
  // Set poblacion (fuzzy match)
  if(p.poblacion && state.area && typeof POBLACIONES !== 'undefined') {
    const pobs = POBLACIONES[state.area] || [];
    const pobLow = p.poblacion.toLowerCase();
    let bestP = null, bestSc = 0;
    pobs.forEach(pb => {
      const words = pobLow.split(' ').filter(w=>w.length>3);
      const score = words.filter(w=>pb.toLowerCase().includes(w)).length;
      if(score > bestSc) { bestSc=score; bestP=pb; }
    });
    if(bestP && bestSc > 0) { state.poblacion = bestP; }
    else { state.poblacion = 'otro'; state.poblacionOtro = p.poblacion; }
  }
  // Set variables (from selectedVars or first 3)
  const selVars = p.selectedVars || (p.variables||[]).slice(0,3);
  if(selVars.length) {
    state.variables = selVars;
  }
  // Skip steps 0-2 — area, población and variables are already set from profile
  // Go directly to step 3 (Metodología)
  state.step = 3;
  saveState();
  render();
}

function updateNav(){
  const bb = document.getElementById("btn-back");
  const nb = document.getElementById("btn-next");
  if(state.step === -1) {
    bb.style.display = "none";
    nb.style.display = "none";
    return;
  }
  bb.style.display = "block";
  bb.disabled = false;
  nb.disabled = !canNext();
  nb.style.display = state.step === 4 ? "none" : "block";
  // En paso 4 (Metodología): "Verificar y continuar" si hubo alertas previas
  if(state.step===3) {
    const tieneAlertas = state.aiValidation && state.aiValidation.alertas && state.aiValidation.alertas.length > 0;
    const coherenciaBaja = state.aiValidation && state.aiValidation.nivel_coherencia !== 'alta';
    nb.textContent = (tieneAlertas || coherenciaBaja) ? 'Verificar y continuar →' : 'Siguiente →';
  } else {
    nb.textContent = 'Siguiente →';
  }
}

function render(){
  renderStepsBar();
  renderContent();
  updateNav();
}

function nextStep(){
  if(canNext()&&state.step<4){
    state.step++;
    render();
    saveState();
    // Validate at step 4: always re-run if coming from step 3 with prior alerts
    if(state.step===4) {
      const tieneAlertasPrevias = state.aiValidation && (
        state.aiValidation.alertas?.length > 0 ||
        state.aiValidation.nivel_coherencia !== 'alta'
      );
      // Re-validar si: nunca se validó, o si había alertas (usuario pudo haber cambiado algo)
      if(!state.aiValidation || tieneAlertasPrevias) {
        state.aiValidation = null;
        state._validationAttempted = false;
        validateCoherence();
      }
    }
    // AI poblaciones: disabled auto-trigger to reduce API calls
    // If user arrives at step 4 with context filled → refresh AI poblaciones if not done yet
    // setTimeout(() => prefetchAIPoblaciones(), 1000); // on-demand only via button
  }
}

// ── ADVERTENCIAS PREVENTIVAS ──────────────────────────────────────
function getWarnings(variablesList, tecnica, nivel, enfoque) {
  const warnings = [];
  const nv = variablesList.length;

  // Técnicas de mediación necesitan exactamente 3 variables (X, M, Y)
  if(tecnica === 'mediacion' || tecnica === 'sem-mediacion') {
    if(nv < 3) warnings.push(`⚠️ La mediación requiere exactamente 3 variables: X (predictor), M (mediador) e Y (criterio). Actualmente tienes ${nv}. Regresa al paso 3 y agrega las variables necesarias.`);
    if(nv > 3) warnings.push(`⚠️ Tienes ${nv} variables pero la mediación simple usa solo 3 (X, M, Y). Las variables extra no serán usadas en el modelo. Considera mediación múltiple o SEM completo.`);
  }
  // Moderación necesita exactamente 3 variables (X, W, Y)
  if(tecnica === 'moderacion' || tecnica === 'sem-moderacion') {
    if(nv < 3) warnings.push(`⚠️ La moderación requiere exactamente 3 variables: X (predictor), W (moderador) e Y (criterio). Actualmente tienes ${nv}.`);
    if(nv > 3) warnings.push(`⚠️ La moderación simple (${tecnica === 'sem-moderacion' ? 'SEM con latentes — LMS' : 'PROCESS Modelo 1'}) requiere exactamente 3 variables: X (predictor), W (moderador) e Y (criterio). Tienes ${nv} — la variable extra NO será incluida en el modelo. Opciones: (a) elimina una variable, (b) cambia a Mediación moderada si quieres 4 roles (X, M, W, Y), (c) cambia a Path Analysis o Regresión múltiple si las variables son observadas, o (d) SEM completo si son latentes.`);
  }
  // Mediación moderada necesita 4 variables
  if(tecnica === 'mediacion-moderada') {
    if(nv < 4) warnings.push(`⚠️ La mediación moderada requiere 4 variables: X, M (mediador), Y y W (moderador). Actualmente tienes ${nv}. Regresa al paso 3 y agrega la variable faltante.`);
  }
  // Regresión múltiple necesita al menos 3 variables (2 predictores + Y)
  if(tecnica === 'regresion-simple') {
    if(nv < 2) warnings.push(`⚠️ La regresión simple requiere exactamente 2 variables: 1 predictor (X) y 1 criterio (Y). Actualmente tienes ${nv}.`);
    if(nv > 2) warnings.push(`⚠️ La regresión simple predice Y con UN solo predictor X. Tienes ${nv} variables — las extra no serán usadas. Si quieres múltiples predictores, cambia a Regresión múltiple.`);
  }
  if(tecnica === 'regresion-multiple') {
    if(nv < 3) warnings.push(`⚠️ La regresión múltiple requiere al menos 2 predictores y 1 variable dependiente (mínimo 3 variables). Actualmente tienes ${nv}.`);
  }
  // SEM con latentes: cada variable necesita ≥3 indicadores (advertencia conceptual)
  if(['sem-mediacion','sem-moderacion','sem-completo','path-analysis'].includes(tecnica)) {
    warnings.push(`📌 Recuerda: Para SEM con variables latentes, cada constructo debe medirse con al menos 3 indicadores observables (ítems de escala). Las variables que seleccionaste serán los constructos latentes del modelo.`);
  }
  // Correlación con más de 2 variables
  if(tecnica === 'correlacion' && nv > 2) {
    warnings.push(`💡 Tienes ${nv} variables. La correlación de Pearson/Spearman mide pares de variables. Para múltiples correlaciones simultáneas considera una matriz de correlaciones o regresión múltiple.`);
  }
  // Nivel descriptivo con técnica avanzada (no debería pasar, pero por si acaso)
  if((nivel === 'descriptivo' || nivel === 'exploratorio') && tecnica && tecnica !== '') {
    warnings.push(`⚠️ El nivel ${nivel} no es compatible con técnicas de análisis inferencial. Considera cambiar el nivel a correlacional o explicativo.`);
  }
  // Path analysis / SEM correlacional (incoherente)
  if(['path-analysis','sem-mediacion','sem-moderacion','sem-completo'].includes(tecnica) && nivel==='correlacional'){
    warnings.push(`⚠️ Las técnicas SEM/Path Analysis requieren nivel explicativo, no correlacional. Regresa al paso 3 y cambia el nivel.`);
  }
  // Cualitativo con nivel correlacional o explicativo (error metodológico)
  if(enfoque === 'Cualitativo' && (nivel === 'correlacional' || nivel === 'explicativo')) {
    warnings.push(`⚠️ Error metodológico: el enfoque cualitativo NO admite nivel correlacional ni explicativo/causal. Regresa al paso 4 y selecciona nivel "Exploratorio" o "Descriptivo" (Hernández et al., 2014).`);
  }
  return warnings;
}

    let parsed = null; try { parsed = safeParseJSON(text); } catch(_pe) { console.warn("[TesisProLab] JSON parse failed:", _pe.message); }
    if(Array.isArray(parsed) && parsed.length >= 3) {
      state.aiNextSteps = parsed;
      saveState();
      if(state.step === 4 && state.result) renderContent();
    }
  } catch(e) {
    console.error('generateNextSteps error:', e);
    if(!state._nextStepsRetried) {
      state._nextStepsRetried = true;
      setTimeout(async () => {
        state._nextStepsRetried = false;
        await generateNextSteps();
      }, 10000);
    }

}

  async function attemptFetch(prompt, maxTokens) {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: maxTokens,
        messages: [{role: 'user', content: prompt}]
      })
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    return (data.choices?.[0]?.message?.content) || (data.content?.map(b => b.text || '').join('')) || '';
  }

  try {
    // Attempt 1: full prompt (up to 2 tries with 2s gap)
    let text = '';
    let lastErr = null;
    for(let attempt = 0; attempt < 2; attempt++) {
      try {
        text = await attemptFetch(varPrompt, 1200);
        if(text) break;
      } catch(e) {
        lastErr = e;
        if(attempt < 1) await new Promise(r => setTimeout(r, 2000));
      }
    }
    if(!text && lastErr) throw lastErr;
    let parsed = null;
    try { parsed = safeParseJSON(text); } catch(pe) { console.warn('[TesisProLab] parse error on main prompt:', pe.message); }

    // If main prompt returned too few results, retry with a simpler prompt
    if(!parsed || !Array.isArray(parsed) || parsed.length < 2) {
      console.warn('[TesisProLab] Main prompt returned few/no results, retrying with simpler prompt...');
      const simplePrompt = `Lista exactamente 8 variables psicológicas para estudiar "${problema}" en "${poblacion}" (área: ${area}).
Devuelve SOLO JSON, sin texto adicional:
[{"nombre":"Variable 1"},{"nombre":"Variable 2"},{"nombre":"Variable 3"},{"nombre":"Variable 4"},{"nombre":"Variable 5"},{"nombre":"Variable 6"},{"nombre":"Variable 7"},{"nombre":"Variable 8"}]`;
      try {
        const res2 = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            max_tokens: 400,
            messages: [{role: 'user', content: simplePrompt}]
          })
        });
        if(res2.ok) {
          const data2 = await res2.json();
          const text2 = (data2.choices?.[0]?.message?.content) || (data2.content?.map(b=>b.text||'').join('')) || '';
          try { parsed = safeParseJSON(text2); } catch(pe2) { console.warn('[TesisProLab] parse error on simple prompt:', pe2.message); }
        }
      } catch(e2) { console.warn('[TesisProLab] Simple retry also failed:', e2?.message); }
    }

    if(Array.isArray(parsed) && parsed.length >= 2) {
      // Accept both old string format and new object format
      state.aiVars = parsed.map(v => {
        if(typeof v === 'string') return {nombre: v.trim(), referencia: '', antecedente: ''};
        return {nombre: String(v.nombre||'').trim(), referencia: String(v.referencia||''), antecedente: String(v.antecedente||'')};
      }).filter(v => v.nombre);
      // Guardar en historial para no repetir en siguientes intentos
      if(!state._varsHistorial) state._varsHistorial = [];
      state._varsHistorial.push(state.aiVars.map(v => v.nombre));
    }
  } catch(e) {
    console.error('[TesisProLab] prefetchAIVars error:', e?.message || e);
    state.aiVarsError = true;
  } finally {
    // If AI returned nothing useful, mark error so we don't infinite-loop
    if(!state.aiVarsError && state.aiVars.length === 0) {
      state.aiVarsError = true;
    }
    state.aiVarsLoading = false;
    if(state.step === 2) renderContent();
    // Save state but WITHOUT aiVarsError — so a page reload always retries fresh
    const errorBackup = state.aiVarsError;
    state.aiVarsError = false;
    saveState();
    state.aiVarsError = errorBackup;
  }
}
